<!DOCTYPE html>
<hnptml lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채팅방 입장 | KU GONGGU</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ku-crimson: #8A1538;
            --bg-color: #F8F9FA;
            --surface-color: #FFFFFF;
            --border-color: #EAECEF;
            --text-primary: #1A1A1A;
            --text-secondary: #4A5056;
            --text-tertiary: #818991;
            --text-dark: #222222; /* 헤더 호버 색상 추가 */
            --shadow-md: 0 4px 16px rgba(138, 21, 56, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-top: 100px; /* 고정 헤더(70px)를 고려하여 여백 증가 */
        }

        /* ==========================================
           main_login.html과 완벽히 동일한 헤더 CSS
           ========================================== */
        header {
            background-color: var(--ku-crimson);
            backdrop-filter: blur(8px);
            height: 70px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .nav-inner {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        .logo {
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        nav a.menu-link {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a.menu-link:hover {
            color: var(--text-dark);
        }

        .btn-login-nav {
            background: var(--ku-crimson);
            color: white !important;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(138, 21, 56, 0.3);
            border: 2px solid white;
            cursor: pointer;
        }

        .btn-login-nav:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(138, 21, 56, 0.4);
        }
        /* ========================================== */

        .container {
            max-width: 500px; /* 채팅 연결 페이지는 컴팩트하게 */
            margin: auto;
            padding: 20px;
            width: 100%;
        }

        .chat-card {
            background: var(--surface-color);
            border-radius: 24px;
            box-shadow: var(--shadow-md);
            padding: 40px 30px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.02);
        }

        /* 상단 아이콘/이미지 */
        .icon-box {
            width: 80px;
            height: 80px;
            background-color: #FDF2F4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .icon-box svg {
            width: 40px;
            height: 40px;
            fill: var(--ku-crimson);
        }

        .welcome-text {
            font-size: 0.95rem;
            color: var(--ku-crimson);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .chat-title {
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1.4;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .chat-desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        /* 입장 버튼 */
        .enter-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background-color: #FEE500; /* 카카오 노란색 */
            color: #191919;
            text-decoration: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            transition: all 0.2s ease;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(254, 229, 0, 0.2);
        }

        .enter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(254, 229, 0, 0.3);
            background-color: #fada00;
        }

        .enter-btn svg {
            width: 24px;
            height: 24px;
        }

        /* 안내 문구 */
        .info-section {
            text-align: left;
            background: var(--bg-color);
            padding: 20px;
            border-radius: 16px;
            margin-top: 10px;
        }

        .info-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-list {
            list-style: none;
        }

        .info-list li {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px; /* 줄바꿈 후 간격을 위해 살짝 늘림 */
            line-height: 1.5; /* 줄바꿈 시 가독성 확보 */
            padding-left: 12px;
            position: relative;
        }

        .info-list li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--ku-crimson);
            font-weight: bold;
        }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--text-tertiary);
            text-decoration: none;
            border-bottom: 1px solid var(--text-tertiary);
            padding-bottom: 2px;
        }

        .back-link:hover {
            color: var(--text-secondary);
            border-color: var(--text-secondary);
        }

    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container">
        <div class="chat-card">
            <div class="icon-box">
                <svg viewBox="0 0 24 24">
                    <path d="M20,2H4C2.9,2,2,2.9,2,4v18l4-4h14c1.1,0,2-0.9,2-2V4C22,2.9,21.1,2,20,2z"/>
                </svg>
            </div>
            
            <p class="welcome-text">공동구매 참여 완료!</p>
            <h1 class="chat-title">아이패드 필름 공구<br>실시간 채팅방</h1>
            <p class="chat-desc">호스트 및 다른 학우들과<br>입금 및 수령 장소를 조율해보세요.</p>

            <a href="#" class="enter-btn" id="kakao-chat-btn">
                <svg viewBox="0 0 24 24" fill="#191919">
                    <path d="M12 3C6.477 3 2 6.48 2 10.78c0 2.747 1.832 5.153 4.603 6.548l-1.168 4.275c-.105.385.344.69.664.477l5.12-3.398c.253.024.51.038.771.038 5.523 0 10-3.48 10-7.78S17.523 3 12 3z"/>
                </svg>
                카카오톡 채팅방 입장하기
            </a>

            <div class="info-section">
                <div class="info-title">⚠️ 안전한 거래를 위한 안내</div>
                <ul class="info-list">
                    <li>입장 시 <b>'학과/학번/닉네임'</b>으로 설정해주세요.<br>예) 컴퓨터학과 26학번 어흥이</li>
                    <li>모르는 링크는 클릭하지 않도록 주의하세요.</li>
                    <li>가급적 사람이 많은 학생회관 등에서 대면 수령하세요.</li>
                    <li>금전 거래 전 상대방의 크림슨 지수를 다시 한번 확인하세요.</li>
                </ul>
            </div>

            <a href="product.html" class="back-link">상품 상세 페이지로 돌아가기</a>
        </div>
    </div>

    <script>
        // 1. URL에서 상품 ID 가져오기 (예: chat.html?id=2)
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));

        // 2. products.json 데이터를 불러와 화면 업데이트하기
        if (productId) {
            fetch('http://localhost:3000/products')
                .then(response => {
                    if (!response.ok) throw new Error('네트워크 응답이 정상이 아닙니다.');
                    return response.json();
                })
                .then(products => {
                    // ID가 일치하는 상품 찾기
                   const product = products.find(p => p.id == productId);
                    if (product) {
                        // 제목 업데이트
                        const chatTitle = document.querySelector('.chat-title');
                        chatTitle.innerHTML = `${product.title}<br>실시간 채팅방`;

                        // 오픈 채팅방 링크 업데이트
                        // 오픈 채팅방 링크 업데이트
const enterBtn = document.getElementById('kakao-chat-btn');

                        enterBtn.addEventListener('click', (e) => {
                            e.preventDefault();

                            console.log('상품:', product);
                            console.log('카카오 링크:', product.chatUrl);

                            if (!product.chatUrl || product.chatUrl.trim() === '') {
                                alert('등록된 오픈채팅방 링크가 없습니다.');
                                return;
                            }

                            window.open(product.chatUrl, '_blank');
                        });

                        // 뒤로가기 링크 업데이트 (해당 상품 상세 페이지로)
                        const backLink = document.querySelector('.back-link');
                        backLink.href = `product.html?id=${product.id}`;
                    } else {
                        alert('해당 상품 정보를 찾을 수 없습니다.');
                    }
                })
                .catch(error => {
                    console.error('데이터를 불러오는 중 오류 발생:', error);
                });
        } else {
            console.warn('상품 ID가 전달되지 않았습니다.');
        }

        // 헤더 불러오기 로직 (기존 코드 유지)
        fetch('header.html')
            .then(res => {
                if (!res.ok) throw new Error('header.html 파일을 찾을 수 없습니다.');
                return res.text();
            })
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                updateHeader(); 
            })
            .catch(err => console.error(err));

        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const authButtons = document.querySelectorAll('.auth-only');
            const guestButtons = document.querySelectorAll('.guest-only');

            if (isLoggedIn) {
                authButtons.forEach(btn => btn.style.display = 'inline-block');
                guestButtons.forEach(btn => btn.style.display = 'none');
            } else {
                authButtons.forEach(btn => btn.style.display = 'none');
                guestButtons.forEach(btn => btn.style.display = 'inline-block');
            }
        }

        document.addEventListener('click', function(e) {
            if(e.target && e.target.id === 'logout-btn') {
                localStorage.removeItem('isLoggedIn');
                alert('로그아웃 되었습니다.');
                location.href = 'main_login.html'; 
            }
        });
    </script>
</body>
</hnptml>
