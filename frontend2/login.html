<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 대학생 공동구매</title>
    <style>
        /* 보내주신 디자인 그대로 유지 */
        @import url('https://cdn.jsdelivr.net/gh/joungkyun/font-d2coding/d2coding.css');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'D2Coding', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #ffe3e3 100%);
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(138, 21, 56, 0.08);
            width: 100%;
            max-width: 400px;
            border-top: 4px solid #8a1538;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #8a1538;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #555555;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            background-color: #fafafa;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'D2Coding', 'Malgun Gothic', sans-serif;
            color: #333333;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #8a1538;
            box-shadow: 0 0 5px rgba(138, 21, 56, 0.2);
            background-color: #ffffff;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: #8a1538;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #6b0f2a;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-signup {
            background-color: #ffffff;
            border: 1px solid #8a1538;
            color: #8a1538;
            margin-top: 15px;
        }

        .btn-signup:hover {
            background-color: #fdf0f3;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            margin-top: 20px;
            color: #777777;
        }

        .options label {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-weight: normal;
        }

        .options a {
            color: #8a1538;
            text-decoration: none;
            transition: color 0.3s;
        }

        .options a:hover {
            color: #6b0f2a;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>LOGIN</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="user-id">학교 이메일</label>
                <input type="text" id="user-id" placeholder="이메일 입력 (@korea.ac.kr 제외)" required>
            </div>

            <div class="form-group">
                <label for="user-pw">비밀번호</label>
                <input type="password" id="user-pw" placeholder="비밀번호 입력" required>
            </div>
            
            <!-- ✅ onclick 함수명을 아래 script와 동일하게 loginToServer()로 수정했습니다. -->
            <button type="button" class="btn" onclick="loginToServer()">로그인</button>
        </form>

        <button type="button" class="btn btn-signup" onclick="location.href='signup.html'">회원가입</button>

        <div class="options">
            <label><input type="checkbox"> 로그인 유지</label>
            <a href="forgotPw.html">비밀번호를 잊으셨나요?</a>
        </div>
    </div>

    <script>
        async function loginToServer() {
            const emailId = document.getElementById('user-id').value;
            const password = document.getElementById('user-pw').value;
            
            // 회원가입 시 저장된 이메일 형식에 맞춰 @korea.ac.kr를 붙입니다.
            const fullEmail = `${emailId}@korea.ac.kr`; 

            if (!emailId || !password) {
                alert("아이디와 비밀번호를 입력해주세요.");
                return;
            }

            try {
                // 🚀 백엔드 서버(auth.js)와 통신
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: fullEmail, 
                        password: password 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert(`${data.nickname}님 환영합니다!`);
                    
                    // ⭐ [중요] 나중에 공구 페이지에서 작성자/참여자 구분을 위해 로컬스토리지 저장
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userNickname', data.nickname); // 내 닉네임 저장
                    localStorage.setItem('userEmail', fullEmail);       // 내 고유 ID 저장
                    
                    // 메인 페이지로 이동
                    location.href = 'main_login.html'; 
                } else {
                    // 서버에서 보낸 에러 메시지 (비번 틀림 등)
                    alert(data.message);
                }
            } catch (error) {
                console.error("서버 통신 에러:", error);
                alert("서버와 연결할 수 없습니다. 백엔드(server.js)가 켜져 있는지 확인하세요!");
            }
        }
    </script>
</body>
</html>
