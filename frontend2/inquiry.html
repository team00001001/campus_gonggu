<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1:1 문의하기 | KU GONGGU</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/inquiry.css">
    <link rel="stylesheet" href="css_mobile/inquiry_mobile.css" media="(max-width: 768px)">
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">1:1 문의하기</h1>
            <p class="page-subtitle">서비스 이용 중 불편하신 점이나 건의사항을 남겨주세요.</p>
        </div>

        <div class="inquiry-card">
            <form id="inquiryForm">
                <div class="form-group">
                <label class="form-label required">문의 유형</label>
                
                <div class="custom-select" id="customSelect">
                    <div class="select-selected">문의 유형을 선택해주세요</div>
                    <div class="select-items select-hide">
                        <div data-value="usage">공구 이용 문의</div>
                        <div data-value="account">계정 관련 문의</div>
                        <div data-value="bug">오류 신고</div>
                        <div data-value="suggestion">서비스 건의</div>
                        <div data-value="other">기타</div>
                    </div>
                </div>
    
    <input type="hidden" id="category" name="category" required>
</div>

                <div class="form-group">
                    <label for="title" class="form-label required">제목</label>
                    <input type="text" id="title" class="form-control" placeholder="문의 제목을 입력해주세요." required>
                </div>

                <div class="form-group">
                    <label for="content" class="form-label required">문의 내용</label>
                    <textarea id="content" class="form-control" placeholder="문의하실 내용을 상세히 적어주세요. (최대 1,000자)" required></textarea>
                </div>

                <button type="submit" class="btn-submit">문의 접수하기</button>
            </form>
        </div>
    </div>

    <script>
        // 1. 공통 헤더 불러오기 (help.html 로직 동일)
        fetch('header.html')
            .then(res => {
                if (!res.ok) throw new Error('header.html 파일을 찾을 수 없습니다.');
                return res.text();
            })
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                updateHeader();
            })
            .catch(err => console.error(err));

        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const authButtons = document.querySelectorAll('.auth-only');
            const guestButtons = document.querySelectorAll('.guest-only');

            if (isLoggedIn) {
                authButtons.forEach(btn => btn.style.display = 'inline-block');
                guestButtons.forEach(btn => btn.style.display = 'none');
            } else {
                authButtons.forEach(btn => btn.style.display = 'none');
                guestButtons.forEach(btn => btn.style.display = 'inline-block');
            }
        }

        // 로그아웃 이벤트 처리
        document.addEventListener('click', function(e) {
            if(e.target && e.target.id === 'logout-btn') {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('userNickname');
                localStorage.removeItem('userEmail');
                localStorage.removeItem('userId');
                alert('로그아웃 되었습니다.');
                location.href = 'main_login.html'; 
            }
        });

        // 커스텀 셀렉트 동작 로직
        const customSelect = document.getElementById("customSelect");
        const selected = customSelect.querySelector(".select-selected");
        const items = customSelect.querySelector(".select-items");
        const hiddenInput = document.getElementById("category");
        const itemDivs = items.querySelectorAll("div");

        // 1. 선택창 클릭 시 리스트 열기/닫기
        selected.addEventListener("click", function(e) {
            e.stopPropagation(); // 클릭 이벤트가 문서 전체로 퍼지는 것 방지
            items.classList.toggle("select-hide");
            this.classList.toggle("select-arrow-active");
            
            // 열렸을 때 테두리 색상 진하게 (포커스 효과)
            if (!items.classList.contains("select-hide")) {
                this.style.borderColor = "var(--ku-crimson)";
                this.style.boxShadow = "0 0 0 3px rgba(138, 21, 56, 0.1)";
            } else {
                this.style.borderColor = "var(--border-light)";
                this.style.boxShadow = "none";
            }
        });

        // 2. 리스트 항목 클릭 시 값 변경
        itemDivs.forEach(function(item) {
            item.addEventListener("click", function() {
                // 화면에 보이는 텍스트 변경
                selected.innerHTML = this.innerHTML;
                // 폼 제출을 위한 숨김 input에 값(data-value) 저장
                hiddenInput.value = this.getAttribute("data-value");
                
                // 리스트 닫고 스타일 원상복구
                items.classList.add("select-hide");
                selected.classList.remove("select-arrow-active");
                selected.style.borderColor = "var(--border-light)";
                selected.style.boxShadow = "none";
            });
        });

        // 3. 화면의 다른 빈 공간을 클릭하면 열려있던 리스트 닫기
        document.addEventListener("click", function() {
            items.classList.add("select-hide");
            selected.classList.remove("select-arrow-active");
            selected.style.borderColor = "var(--border-light)";
            selected.style.boxShadow = "none";
        });

        // 2. 폼 제출 처리
        document.getElementById('inquiryForm').addEventListener('submit', function(e) {
            e.preventDefault(); // 페이지 새로고침 방지

            const category = document.getElementById('category').value;
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;

            // 실제 개발 시에는 여기서 Python/JSON 기반 백엔드 API로 데이터를 전송합니다.
            // 예: fetch('/api/inquiry', { method: 'POST', body: JSON.stringify({ category, title, content }) })
            
            console.log("문의 접수 데이터:", { category, title, content });
            
            alert('문의가 성공적으로 접수되었습니다. 빠르게 확인 후 답변드리겠습니다.');
            location.href = 'help.html'; // 접수 후 도움말 페이지로 복귀
        });
    </script>
</body>
</html>
