<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>대학생 공동구매 - 회원가입</title>
    <link rel="stylesheet" href="css/signup.css">
    <link rel="stylesheet" href="css_mobile/signup_mobile.css" media="(max-width: 768px)">
</head>
<body>

    <div class="signup-container">
        <h2>학생 인증 및 회원가입</h2>
        <form id="signup-form">
            
            <!-- 학교 이메일 인증 -->
            <div class="form-group">
                <label>학교 이메일</label>
                <div class="email-input-group">
                    <input type="text" id="email-id" placeholder="이메일 아이디" required>
                    <select id="email-domain">
                        <option value="korea.ac.kr">@ korea.ac.kr</option>
                        <option value="gmail.com">@ gmail.com</option>
                        <option value="naver.com">@ naver.com</option>
                        <option value="kakao.com">@ kakao.com</option>
                        <option value="direct">직접 입력</option>
                    </select>
                </div>
                <!-- 직접 입력 선택 시 나타나는 입력창 (기본 숨김) -->
                <input type="text" id="custom-domain" class="hidden" placeholder="예: univ.ac.kr" style="margin-bottom: 10px;">
                <button type="button" class="btn btn-secondary" id="btn-send-code">인증번호 전송</button>
            </div>

            <!-- 인증번호 입력 (처음엔 숨김 처리) -->
            <div class="form-group hidden" id="verification-section">
                <label>인증번호</label>
                <div class="verification-group">
                    <input type="text" id="verification-code" placeholder="6자리 숫자 입력">
                    <button type="button" class="btn" id="btn-verify-code">확인</button>
                </div>
                <span class="msg" id="verification-msg"></span>
            </div>

            <!-- 닉네임 -->
            <div class="form-group">
                <label for="nickname">닉네임</label>
                <input type="text" id="nickname" placeholder="사용할 닉네임을 입력하세요" required>
            </div>

            <!-- 비밀번호 -->
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="8자리 이상 영문, 숫자 조합" required>
            </div>

            <!-- 비밀번호 확인 -->
            <div class="form-group">
                <label for="password-confirm">비밀번호 확인</label>
                <input type="password" id="password-confirm" placeholder="비밀번호를 다시 입력하세요" required>
                <span class="msg" id="pw-match-msg"></span>
            </div>

            <button type="submit" class="btn">가입 완료하기</button>
        </form>
    </div>

    <script>
        const emailDomainSelect = document.getElementById('email-domain');
        const customDomainInput = document.getElementById('custom-domain');
        const btnSendCode = document.getElementById('btn-send-code');
        const verificationSection = document.getElementById('verification-section');
        const btnVerifyCode = document.getElementById('btn-verify-code');
        const verificationMsg = document.getElementById('verification-msg');
        
        const passwordInput = document.getElementById('password');
        const passwordConfirmInput = document.getElementById('password-confirm');
        const pwMatchMsg = document.getElementById('pw-match-msg');

        // 1. 도메인 직접 입력 처리
        emailDomainSelect.addEventListener('change', (e) => {
            if (e.target.value === 'direct') {
                customDomainInput.classList.remove('hidden');
                customDomainInput.focus();
            } else {
                customDomainInput.classList.add('hidden');
            }
        });

        // 2. 인증번호 전송 버튼 클릭 로직
        btnSendCode.addEventListener('click', async () => {
    const emailId = document.getElementById('email-id').value;
    let domain = emailDomainSelect.value;

    if (domain === 'direct') {
        domain = customDomainInput.value;
    }

if (!emailId || !domain) {
    alert('이메일을 정확히 입력해주세요.');
    return;
}


    const email = `${emailId}@${domain}`;

    try {
        const response = await fetch('https://campusgonggu-production.up.railway.app/api/send-auth-email', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email })
        });

        const result = await response.json();

        if (!response.ok) {
            alert(result.message || '인증번호 전송 실패');
            return;
        }

        alert(result.message);

        verificationSection.classList.remove('hidden');

    } catch (error) {
        console.error(error);
        alert('서버 연결 실패');
    }
});
        // 3. 인증번호 확인 로직 (가상의 하드코딩된 로직)   
       btnVerifyCode.addEventListener('click', async () => {
    const code = document.getElementById('verification-code').value;

    const emailId = document.getElementById('email-id').value;
    let domain = emailDomainSelect.value;

    if (domain === 'direct') {
        domain = customDomainInput.value;
    }

    const email = `${emailId}@${domain}`;

    try {
        const response = await fetch('https://campusgonggu-production.up.railway.app/api/verify-auth-code', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                email,
                code
            })
        });

        const result = await response.json();

        if (!response.ok) {
            verificationMsg.textContent = result.message;
            verificationMsg.className = 'msg error';
            return;
        }

        verificationMsg.textContent = result.message;
        verificationMsg.className = 'msg success';

        document.getElementById('verification-code').readOnly = true;
        btnVerifyCode.disabled = true;

    } catch (error) {
        console.error(error);

        verificationMsg.textContent = '서버 연결 실패';
        verificationMsg.className = 'msg error';
    }
});

        // 4. 비밀번호 일치 여부 실시간 확인 로직
        function checkPasswordMatch() {
            const pw = passwordInput.value;
            const pwConfirm = passwordConfirmInput.value;

            if (pwConfirm === '') {
                pwMatchMsg.textContent = '';
                return;
            }

            if (pw === pwConfirm) {
                pwMatchMsg.textContent = '비밀번호가 일치합니다.';
                pwMatchMsg.className = 'msg success';
            } else {
                pwMatchMsg.textContent = '비밀번호가 일치하지 않습니다.';
                pwMatchMsg.className = 'msg error';
            }
        }

        passwordInput.addEventListener('input', checkPasswordMatch);
        passwordConfirmInput.addEventListener('input', checkPasswordMatch);

        // 5. 폼 제출 로직
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    if (passwordInput.value !== passwordConfirmInput.value) {
        alert('비밀번호가 일치하지 않습니다. 다시 확인해주세요.');
        return;
    }

    const emailId = document.getElementById('email-id').value;
    let domain = emailDomainSelect.value;

    if (domain === 'direct') {
        domain = customDomainInput.value;
    }

    const userData = {
        emailId: emailId,
        emailDomain: domain,
        nickname: document.getElementById('nickname').value,
        password: document.getElementById('password').value
    };

    try {
        const response = await fetch('https://campusgonggu-production.up.railway.app/api/signup', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(userData)
        });

                const result = await response.json();

                if (!response.ok) {
                    alert(result.error || '회원가입 실패');
                    return;
                }

                alert('회원가입이 완료되었습니다!');
                location.href = 'login.html';

            } catch (error) {
                console.error(error);
                alert('서버 연결 실패. 백엔드 서버가 켜져 있는지 확인해줘.');
            }
        });
    </script>
</body>
</html>
