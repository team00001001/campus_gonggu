<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공동구매 글 수정 | KU GONGGU</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquareRound@1.0/nanumsquareround.css">
    <link rel="stylesheet" href="css/edit.css">
    <link rel="stylesheet" href="css_mobile/edit_mobile.css" media="(max-width: 768px)">
    <style>
        .info-text {
            font-size: 0.85rem;
            color: #888;
            font-weight: normal;
            margin-left: 8px;
        }
        .time-display {
            font-size: 0.9rem;
            color: #ff5a5a;
            margin-top: 5px;
            font-weight: bold;
        }
        .price-type-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .price-type-btn {
            padding: 6px 18px;
            border-radius: 20px;
            border: 1.5px solid #ccc;
            background: white;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: #888;
            transition: all 0.18s;
        }
        .price-type-btn.active {
            border-color: #8A1538;
            background: #8A1538;
            color: white;
        }
        .calc-result-box {
            margin-top: 10px;
            padding: 12px 16px;
            background: #fff5f7;
            border: 1.5px solid #f5c0cc;
            border-radius: 10px;
            font-size: 0.92rem;
            color: #8A1538;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <a href="javascript:history.back()" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>
        <div class="header-title">공고 글 수정하기</div>
    </header>

    <main>
        <form class="write-form" id="edit-form">
            <div class="input-group">
                <label for="category" class="required">카테고리 선택</label>
                <select id="category" name="category">
                    <option value="food">🍊 식재료 / 배달</option>
                    <option value="living">🧴 자취 / 생필품</option>
                    <option value="study">📚 전공 / 문구</option>
                    <option value="etc">📦 기타 물품</option>
                </select>
            </div>

            <div class="input-group">
                <label for="productName" class="required">상품명</label>
                <input type="text" id="productName" placeholder="예) 유기농 햇감자 3kg 나눌 분!" required>
            </div>
            
            <div class="input-group short-input">
                <label for="people" class="required">모집 인원 (본인 포함)</label>
                <input type="number" id="people" placeholder="예) 5" min="2" required oninput="updateCalc()">
            </div>

            <div class="input-group">
                <label class="required">상품 가격 (원)</label>
                <div class="price-type-row">
                    <button type="button" id="btn-total" class="price-type-btn" onclick="setPriceType('total')">전체 가격</button>
                    <button type="button" id="btn-per" class="price-type-btn active" onclick="setPriceType('per')">개당 가격</button>
                </div>
                <input type="number" id="productPrice" placeholder="예) 25000" min="0" required oninput="updateCalc()">
            </div>

            <div class="input-group short-input">
                <label for="shippingFee">배송비 (원) <span class="info-text">없으면 0</span></label>
                <input type="number" id="shippingFee" placeholder="예) 3000" min="0" value="0" oninput="updateCalc()">
            </div>

            <div class="calc-result-box" id="calc-result-box" style="display:none;">
                인당 예상 금액: <strong id="calc-amount">0원</strong>
                <span id="calc-formula" style="font-weight:400; color:#aaa; font-size:0.8rem; margin-left:8px;"></span>
            </div>

            <div class="input-group">
                <label for="periodValue" class="required">모집 기간 변경 (최대 1년)</label>
                <div style="width: 100%; display: flex; gap: 0.5rem;">
                    <input type="number" id="periodValue" placeholder="예) 3" min="0" value="0" required style="flex: 1;">
                    <select id="periodUnit" style="flex: 1;">
                        <option value="minute">분</option>
                        <option value="hour">시간</option>
                        <option value="day" selected>일</option>
                        <option value="month">개월</option>
                    </select>
                    <select id="periodAction" style="flex: 1;">
                        <option value="extend">연장</option>
                        <option value="shorten">단축</option>
                    </select>
                </div>
                <div id="remaining-time-display" class="time-display">현재 남은 시간: 불러오는 중...</div>
            </div>

            <div class="input-group">
                <label for="location" class="required">수령/배분 장소</label>
                <input type="text" id="location" placeholder="예) 정보관 1층 라운지" required>
            </div>

            <div class="input-group">
                <label for="productUrl">상품 URL <span class="info-text">(온라인 구매 상품인 경우 작성)</span></label>
                <input type="url" id="productUrl" placeholder="예) https://...">
            </div>

            <div class="input-group">
                <label>상품 이미지 (선택)</label>
                <div id="upload-area" style="border:2px dashed #ddd; border-radius:12px; padding:24px; text-align:center; cursor:pointer; transition:border-color 0.2s;" onclick="document.getElementById('imageFile').click()" onmouseover="this.style.borderColor='#8A1538'" onmouseout="this.style.borderColor='#ddd'">
                    <div id="upload-placeholder">
                        <div style="font-size:2rem;">📷</div>
                        <div style="font-size:0.9rem; font-weight:600; margin-top:6px;">클릭하여 이미지 변경</div>
                        <div style="font-size:0.78rem; color:#bbb; margin-top:4px;">JPG · PNG · WEBP</div>
                    </div>
                    <img id="image-preview" src="" style="display:none; max-width:100%; max-height:220px; border-radius:8px; object-fit:cover;">
                </div>
                <input type="file" id="imageFile" accept="image/*" style="display:none" onchange="uploadImage(this)">
                <input type="hidden" id="imageUrl">
                <div id="upload-status" style="font-size:0.83rem; margin-top:6px; color:#888;"></div>
            </div>

            <div class="input-group">
                <label for="description" class="required">상세 설명</label>
                <textarea id="description" placeholder="어떤 상품인지, 왜 같이 사고 싶은지 자세히 적어주세요!" required></textarea>
            </div>

            <button type="submit" class="submit-btn">수정 완료하기</button>
        </form>
    </main>

    <script>
        // ✅ Cloudinary 설정 (writefront.html과 동일하게 맞춰주세요)
        const CLOUDINARY_CLOUD_NAME = 'YOUR_CLOUD_NAME';
        const CLOUDINARY_UPLOAD_PRESET = 'YOUR_UPLOAD_PRESET';

        async function uploadImage(input) {
            const file = input.files[0];
            if (!file) return;

            const statusEl = document.getElementById('upload-status');
            const previewEl = document.getElementById('image-preview');
            const placeholderEl = document.getElementById('upload-placeholder');

            statusEl.textContent = '⏳ 업로드 중...';
            statusEl.style.color = '#888';

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

            try {
                const res = await fetch(
                    `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`,
                    { method: 'POST', body: formData }
                );
                const data = await res.json();

                if (data.secure_url) {
                    document.getElementById('imageUrl').value = data.secure_url;
                    previewEl.src = data.secure_url;
                    previewEl.style.display = 'block';
                    placeholderEl.style.display = 'none';
                    statusEl.textContent = '✅ 업로드 완료';
                    statusEl.style.color = '#8A1538';
                } else {
                    statusEl.textContent = '업로드 실패: ' + (data.error?.message || '알 수 없는 오류');
                    statusEl.style.color = '#e00';
                }
            } catch (err) {
                console.error(err);
                statusEl.textContent = 'Cloudinary 설정을 확인해주세요.';
                statusEl.style.color = '#e00';
            }
        }

        let priceType = 'per';

        function setPriceType(type) {
            priceType = type;
            document.getElementById('btn-total').classList.toggle('active', type === 'total');
            document.getElementById('btn-per').classList.toggle('active', type === 'per');
            updateCalc();
        }

        function updateCalc() {
            const price = Number(document.getElementById('productPrice').value) || 0;
            const shipping = Number(document.getElementById('shippingFee').value) || 0;
            const people = Number(document.getElementById('people').value) || 1;

            const box = document.getElementById('calc-result-box');
            const amountEl = document.getElementById('calc-amount');
            const formulaEl = document.getElementById('calc-formula');

            if (price <= 0) { box.style.display = 'none'; return; }
            box.style.display = 'block';

            let perPerson;
            if (priceType === 'total') {
                perPerson = Math.ceil((price + shipping) / people);
                formulaEl.textContent = `(${price.toLocaleString()} + 배송비${shipping.toLocaleString()}) ÷ ${people}명`;
            } else {
                perPerson = Math.ceil(price + shipping / people);
                formulaEl.textContent = `개당 ${price.toLocaleString()} + 배송비${shipping.toLocaleString()} ÷ ${people}명`;
            }
            amountEl.textContent = perPerson.toLocaleString() + '원';
        }

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (!productId) {
            alert('잘못된 접근입니다.');
            location.href = 'my_products.html';
        }

        let currentExpireAt = 0;

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch(`https://campusgonggu-production.up.railway.app/products/${productId}`);
                if (!response.ok) throw new Error('상품 정보를 불러오지 못했습니다.');

                const product = await response.json();

                const myUserId = localStorage.getItem('userId');
                if (product.user_id != myUserId) {
                    alert('수정 권한이 없습니다.');
                    location.href = 'my_products.html';
                    return;
                }

                const nowSec = Math.floor(Date.now() / 1000);
                const isClosed = product.isClosed || product.currentCount >= product.targetCount || Number(product.duration) <= nowSec;
                if (isClosed) {
                    alert('이미 마감된 공고는 수정할 수 없습니다.');
                    location.href = `product.html?id=${productId}`;
                    return;
                }

                document.getElementById('productName').value = product.title;
                document.getElementById('people').value = product.targetCount;
                document.getElementById('productPrice').value = product.price;
                document.getElementById('shippingFee').value = product.shipping_fee || 0;
                document.getElementById('location').value = product.location;

                // 가격 타입 복원
                setPriceType(product.price_type || 'per');
                updateCalc();

                // 기존 이미지 미리보기
                const existingUrl = product.imageUrl;
                const isValidUrl = existingUrl && existingUrl !== 'none' && existingUrl !== 'null' && existingUrl.trim() !== '';
                if (isValidUrl) {
                    document.getElementById('imageUrl').value = existingUrl;
                    document.getElementById('image-preview').src = existingUrl;
                    document.getElementById('image-preview').style.display = 'block';
                    document.getElementById('upload-placeholder').style.display = 'none';
                    document.getElementById('upload-status').textContent = '기존 이미지 (클릭하여 변경)';
                }
                document.getElementById('productUrl').value = product.productUrl || '';
                document.getElementById('imageUrl').value = product.imageUrl || '';
                document.getElementById('description').value = product.description;

                const categoryReverseMap = {
                    '식재료 / 배달': 'food',
                    '자취 / 생필품': 'living',
                    '전공 / 문구': 'study',
                    '기타 물품': 'etc'
                };
                if (categoryReverseMap[product.category]) {
                    document.getElementById('category').value = categoryReverseMap[product.category];
                }

                currentExpireAt = Number(product.duration);
                const diffSec = currentExpireAt - nowSec;
                
                const timeDisplay = document.getElementById('remaining-time-display');
                if (diffSec <= 0) {
                    timeDisplay.textContent = '현재 남은 시간: 마감됨';
                    timeDisplay.style.color = '#888';
                } else {
                    const days = Math.floor(diffSec / 86400);
                    const hours = Math.floor((diffSec % 86400) / 3600);
                    const mins = Math.floor((diffSec % 3600) / 60);
                    timeDisplay.textContent = `현재 남은 시간: ${days}일 ${hours}시간 ${mins}분`;
                }

            } catch (error) {
                console.error(error);
                alert('서버 연결 실패. 백엔드 서버가 켜져 있는지 확인해주세요.');
            }
        });

        document.getElementById('edit-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const categoryMap = {
                food: '식재료 / 배달',
                living: '자취 / 생필품',
                study: '전공 / 문구',
                etc: '기타 물품'
            };

            const pValue = Number(document.getElementById('periodValue').value);
            const pUnit = document.getElementById('periodUnit').value; 
            const pAction = document.getElementById('periodAction').value;

            const nowSec = Math.floor(Date.now() / 1000);
            
            let baseTime = currentExpireAt < nowSec ? nowSec : currentExpireAt;
            let baseDate = new Date(baseTime * 1000);

            if (pAction === 'shorten') {
                if (pUnit === 'minute') baseDate.setMinutes(baseDate.getMinutes() - pValue);
                else if (pUnit === 'hour') baseDate.setHours(baseDate.getHours() - pValue);
                else if (pUnit === 'day') baseDate.setDate(baseDate.getDate() - pValue);
                else if (pUnit === 'month') {
                    baseDate.setMonth(baseDate.getMonth() - pValue);
                    // 단축할 때도 똑같이 하루 빼기 적용
                    if (pValue > 0) baseDate.setDate(baseDate.getDate() - 1); 
                }

            } else if (pAction === 'extend') {
                if (pUnit === 'minute') baseDate.setMinutes(baseDate.getMinutes() + pValue);
                else if (pUnit === 'hour') baseDate.setHours(baseDate.getHours() + pValue);
                else if (pUnit === 'day') baseDate.setDate(baseDate.getDate() + pValue);
                else if (pUnit === 'month') {
                    // 정확한 달력 계산 후
                    baseDate.setMonth(baseDate.getMonth() + pValue);
                    // ✅ 요청하신 대로 '딱 하루만' 빼는 코드 복구!
                    if (pValue > 0) baseDate.setDate(baseDate.getDate() - 1); 
                }
            }

            let newExpireAt = Math.floor(baseDate.getTime() / 1000);

            if (pAction === 'shorten' && newExpireAt < nowSec && pValue !== 0) {
                alert('단축하려는 시간이 현재 남은 시간보다 큽니다. 더 적게 입력해주세요.');
                return;
            }
            const oneYearSec = 365 * 86400;
            if (pAction === 'extend' && (newExpireAt - nowSec) > oneYearSec) {
                alert('총 모집 기간은 현재 시점부터 최대 1년을 초과할 수 없습니다.');
                return;
            }

            const updatedData = {
                title: document.getElementById('productName').value,
                category: categoryMap[document.getElementById('category').value],
                targetCount: Number(document.getElementById('people').value),
                price: Number(document.getElementById('productPrice').value),
                shipping_fee: Number(document.getElementById('shippingFee').value) || 0,
                price_type: priceType,
                duration: newExpireAt,
                location: document.getElementById('location').value,
                productUrl: document.getElementById('productUrl').value || '',
                imageUrl: document.getElementById('imageUrl').value,
                description: document.getElementById('description').value,
                user_id: localStorage.getItem('userId')
            };

            try {
                const response = await fetch(`https://campusgonggu-production.up.railway.app/products/${productId}`, {
                    method: 'PUT', 
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updatedData)
                });

                if (!response.ok) {
                    const result = await response.json();
                    alert(result.error || '수정 실패');
                    return;
                }

                alert('수정이 완료되었습니다!');
                location.href = `product.html?id=${productId}`;

            } catch (error) {
                console.error(error);
                alert('서버 에러가 발생했습니다.');
            }
        });
    </script>
</body>
</html>
