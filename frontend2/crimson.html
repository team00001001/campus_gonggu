<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU GONGGU</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* [기존 스타일 유지 - 절대 수정 금지] */
        :root {
            --ku-crimson: #8A1538;
            --ku-blue: #007AFF; /* 음수일 때 사용할 파란색 */
            --text-dark: #222222;
            --bg-color: #F7F8FA;
            --border-light: #EAECEF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--bg-color); padding-top: 70px; }
        header {
            background-color: var(--ku-crimson); height: 70px; display: flex;
            align-items: center; position: fixed; top: 0; left: 0; width: 100%;
            z-index: 1000; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }
        .nav-inner {
            width: 100%; max-width: 1200px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center; padding: 0 24px;
        }
        .logo { color: white; font-size: 1.6rem; font-weight: 800; text-decoration: none; }
        nav { display: flex; gap: 30px; align-items: center; }
        nav a.menu-link { color: #ffffff; text-decoration: none; font-weight: 600; font-size: 0.95rem; }
        .btn-login-nav {
            background: var(--ku-crimson); color: white !important;
            padding: 10px 24px; border-radius: 30px; font-weight: 700;
            border: 2px solid white; cursor: pointer;
        }

        /* [크림슨 지수 섹션] */
        .content-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .crimson-card {
            background: white;
            border-radius: 40px;
            padding: 50px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
        }

        .trend-badge {
            background: #FFF0F3;
            color: var(--ku-crimson);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 24px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .main-title {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 15px;
            color: var(--text-dark);
        }
        .main-title span { color: var(--ku-crimson); }

        .sub-desc {
            color: #888;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* 지수 비주얼 영역 */
        .index-visual {
            width: 100%;
            background: #F7F8FA;
            border-radius: 30px;
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .emoji-box {
            font-size: 4rem;
            background: white;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .score-info { flex: 1; }
        .score-info h4 { font-size: 1.4rem; font-weight: 800; margin-bottom: 5px; }
        .score-num { font-size: 2.5rem; font-weight: 900; }
        .score-num span { font-size: 1rem; color: #aaa; margin-left: 5px; }

        /* 게이지 바 스타일 제어 */
        .gauge-bar-bg {
            width: 100%;
            height: 12px;
            background: #EAECEF;
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
            display: flex; /* 내부 바 정렬을 위해 필요 */
        }

        .gauge-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease, background-color 0.5s ease;
        }

        /* [네가 요청한 음수 UI 로직] */
        .fill-positive { background: var(--ku-crimson); margin-right: auto; }
        .fill-negative { background: var(--ku-blue); margin-left: auto; }

        .next-msg { font-size: 0.85rem; color: #666; margin-top: 10px; font-weight: 600; }

        /* 기준 안내 그리드 */
        .criteria-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            width: 100%;
        }

        .criteria-item {
            background: #ffffff;
            border: 1px solid var(--border-light);
            padding: 20px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .criteria-item .label { font-size: 0.85rem; color: #888; font-weight: 600; }
        .criteria-item .point { font-size: 1.1rem; font-weight: 800; }
        .criteria-item .point.plus { color: #2D6A4F; }

        @media (max-width: 768px) {
            .index-visual { flex-direction: column; text-align: center; }
            .crimson-card { padding: 40px 24px; }
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="content-container">
        <section class="crimson-card">
            <div class="trend-badge" id="trend-badge">🔥 나의 신뢰 지수</div>
            
            <h1 class="main-title">
                학우님의 활동으로 쌓인<br>
                <span id="index-title-color">크림슨 지수</span>를 확인하세요.
            </h1>
            
            <p class="sub-desc">
                공정하고 매너 있는 공동구매 문화를 위해<br>
                참여도와 신뢰도를 점수로 산출합니다.
            </p>

            <div class="index-visual">
                <div class="emoji-box" id="user-emoji">🐯</div>
                <div class="score-info">
                    <h4 id="user-grade">늠름한 호랑이</h4>
                    <div class="score-num" id="display-score">50<span>pts</span></div>
                    <div class="gauge-bar-bg">
                        <div id="gauge-fill" class="gauge-bar-fill"></div>
                    </div>
                    <p class="next-msg" id="next-message">다음 등급까지 50점 남았어요!</p>
                </div>
            </div>

            <div class="criteria-grid">
                <div class="criteria-item">
                    <span class="label">참여자 확인</span>
                    <span class="point plus">+3 pts</span>
                </div>
                <div class="criteria-item">
                    <span class="label">방장 거래성공</span>
                    <span class="point plus">+10 pts</span>
                </div>
                <div class="criteria-item">
                    <span class="label">참여자 거래성공</span>
                    <span class="point plus">+2 pts</span>
                </div>
                <div class="criteria-item" style="background: #FFF5F5; border-color: #FFE0E0;">
                    <span class="label" style="color: #E53E3E;">참여자 노쇼</span>
                    <span class="point" style="color: #E53E3E;">-10 pts</span>
                </div>
                <div class="criteria-item" style="background: #FFF5F5; border-color: #FFE0E0;">
                    <span class="label" style="color: #E53E3E;">방장 신고</span>
                    <span class="point" style="color: #E53E3E;">-15 pts</span>
                </div>
            </div>
        </section>
    </main>

    <script>
        // -------------------------------------------------------------------
        // [임시 데이터 설정 공간] - 여기서 점수를 바꿔가며 테스트해 보세요!
        // -------------------------------------------------------------------
        // const trustScore = user.trustScore; // 나중에 DB에서 이렇게 가져옴
        const trustScore = -50; // <--- 이 숫자를 -100 ~ 100 사이에서 바꿔보세요.
        // -------------------------------------------------------------------

        function updateCrimsonIndex(score) {
            const emojiEl = document.getElementById('user-emoji');
            const gradeEl = document.getElementById('user-grade');
            const scoreNumEl = document.getElementById('display-score');
            const gaugeFill = document.getElementById('gauge-fill');
            const nextMsg = document.getElementById('next-message');
            const titleColor = document.getElementById('index-title-color');
            const badge = document.getElementById('trend-badge');

            // 점수 텍스트 업데이트
            scoreNumEl.innerHTML = `${score}<span>pts</span>`;

            // 1. 등급 및 이모지 로직
            let gradeName = "";
            let emoji = "";
            let nextGoal = "";

            if (score >= 81) {
                gradeName = "전설의 수호신"; emoji = "🏛️"; nextGoal = "최고 등급입니다!";
            } else if (score >= 61) {
                gradeName = "지배하는 호랑이"; emoji = "👑"; nextGoal = `수호신까지 ${81 - score}점!`;
            } else if (score >= 41) {
                gradeName = "늠름한 호랑이"; emoji = "🐯"; nextGoal = `지배자까지 ${61 - score}점!`;
            } else if (score >= 21) {
                gradeName = "용맹한 사자"; emoji = "🦁"; nextGoal = `호랑이까지 ${41 - score}점!`;
            } else if (score >= 0) {
                gradeName = "시작하는 아기냥"; emoji = "🐱"; nextGoal = `사자까지 ${21 - score}점!`;
            } else if (score >= -30) {
                gradeName = "흔들리는 날개"; emoji = "🌑"; nextGoal = "다시 아기냥이 되어보세요!";
            } else if (score >= -70) {
                gradeName = "방황하는 독수리"; emoji = "🦅"; nextGoal = "매너 거래가 필요합니다.";
            } else {
                gradeName = "얼어붙은 그림자"; emoji = "❄️"; nextGoal = "서비스 이용 주의 단계입니다.";
            }

            emojiEl.innerText = emoji;
            gradeEl.innerText = gradeName;
            nextMsg.innerHTML = nextGoal;

            // 2. UI 색상 및 바 방향 제어 (네가 원한 - UI 합치기)
            if (score >= 0) {
                // 양수일 때: 크림슨 색상, 왼쪽 정렬
                gaugeFill.className = "gauge-bar-fill fill-positive";
                gaugeFill.style.width = (score / 100 * 100) + "%";
                scoreNumEl.style.color = "var(--ku-crimson)";
                titleColor.style.color = "var(--ku-crimson)";
                badge.style.background = "#FFF0F3";
                badge.style.color = "var(--ku-crimson)";
            } else {
                // 음수일 때: 파란 색상, 오른쪽 정렬
                gaugeFill.className = "gauge-bar-fill fill-negative";
                gaugeFill.style.width = (Math.abs(score) / 100 * 100) + "%";
                scoreNumEl.style.color = "var(--ku-blue)";
                titleColor.style.color = "var(--ku-blue)";
                badge.style.background = "#EBF5FF";
                badge.style.color = "var(--ku-blue)";
            }
        }

        // 초기화 실행
        updateCrimsonIndex(trustScore);

        // [기존 헤더 불러오기 스크립트]
        fetch('header.html')
            .then(res => {
                if (!res.ok) throw new Error('header.html 찾을 수 없음');
                return res.text();
            })
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                updateHeader();
            })
            .catch(err => console.error(err));

        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const authElements = document.querySelectorAll('.auth-only');
            const guestElements = document.querySelectorAll('.guest-only');
            if (isLoggedIn) {
                authElements.forEach(el => el.style.display = 'flex');
                guestElements.forEach(el => el.style.display = 'none');
            } else {
                authElements.forEach(el => el.style.display = 'none');
                guestElements.forEach(el => el.style.display = 'block');
            }
        }
    </script>
</body>
</html>
