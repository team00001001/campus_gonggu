<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KU GONGGU - 마이페이지</title>

    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/mypage.css">
    <link rel="stylesheet" href="css_mobile/mypage_mobile.css" media="(max-width: 768px)">

    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert('로그인이 필요한 서비스입니다.');
            window.location.replace('login.html'); // 뒤로가기 방지하며 이동
        }
    </script>
</head>
<body>

<div id="header-placeholder"></div>

<div class="container">
    <div class="sidebar">
        <div class="card profile-card">
            <div class="profile-circle" id="profile-circle">?</div>
            <div class="user-name" id="user-name">사용자</div>
            <div class="user-handle" id="user-handle">@username</div>
            
            <div class="crimson-index-section">
                <div class="index-header">
                    <span style="font-size: 0.8rem; font-weight: bold;">크림슨 지수</span>
                    <span id="crimson-index-value" style="font-size: 0.8rem; font-weight: bold; color: var(--crimson);">0</span>
                </div>
                <div class="index-bar"><div id="index-fill" class="index-fill fill-positive" style="width: 0%;"></div></div>
            </div>
            
            <button onclick="location.href='changeProfile.html'" style="width: 100%; margin-top: 20px; padding: 10px; background: white; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 0.85rem;">프로필 수정</button>
        </div>

        <div class="card" style="padding: 10px 25px;">
            <a href="crimson.html" class="menu-item">⭐ 크림슨 지수</a>
            <a href="mychats.html" class="menu-item">💬 내 채팅방</a>
            <a href="help.html" class="menu-item">❓도움말</a>
        </div>
    </div>

    <div class="main-content">
        <div class="top-stats">
            <div class="stat-card" onclick="location.href='my_products.html'">
                <span class="stat-label">올린 공고</span>
                <span class="stat-value" id="my-post-count">0 건</span>
            </div>

            <div class="stat-card" onclick="location.href='joined_products.html'">
                <span class="stat-label">참여 중</span>
                <span class="stat-value" id="joined-count">0 건</span>
            </div>

            <div class="stat-card" onclick="location.href='success_products.html'">
                <span class="stat-label">성공 공구</span>
                <span class="stat-value" id="success-count">0 건</span>
            </div>
        </div>

        <div class="section-title">최근 참여 내역 
            <span onclick="location.href='joined_products.html'" style="font-size: 0.8rem; color: #aaa; font-weight: normal; cursor: pointer;">전체보기 〉</span>
        </div>
        
        <div class="gonggu-grid" id="recent-participation-grid"></div>

        <div class="section-title">내가 올린 공고
            <span onclick="location.href='my_products.html'" style="font-size: 0.8rem; color: #aaa; font-weight: normal; cursor: pointer;">전체보기 〉</span>
        </div>
        
        <div class="gonggu-grid" id="my-products-grid"></div>
    </div>
</div>

<script>
    async function updateHeaderNotificationBadge() {
        const userId = localStorage.getItem('userId');
        const badge = document.querySelector('.noti-badge');
        if (!badge || !userId) return;
        try {
            const res = await fetch(`https://campusgonggu-production.up.railway.app/notifications/${userId}`);
            const notifications = await res.json();
            const hasUnread = notifications.some(n => Number(n.is_read) === 0);
            badge.style.display = hasUnread ? 'block' : 'none';
        } catch (err) {
            badge.style.display = 'none';
        }
    }

    // 1. 페이지 열리자마자 헤더 가져오기
    fetch('header.html')
        .then(res => {
            if (!res.ok) throw new Error('header.html 파일을 찾을 수 없습니다.');
            return res.text();
        })
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
            updateHeader();
            updateHeaderNotificationBadge();
        })
        .catch(err => console.error(err));

    function updateHeader() {
        const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
        
        const authButtons = document.querySelectorAll('.auth-only');
        const guestButtons = document.querySelectorAll('.guest-only');

        if (isLoggedIn) {
            authButtons.forEach(btn => btn.style.display = 'inline-block');
            guestButtons.forEach(btn => btn.style.display = 'none');
        } else {
            authButtons.forEach(btn => btn.style.display = 'none');
            guestButtons.forEach(btn => btn.style.display = 'inline-block');
        }
    }

    function updateProfileCard() {
        const nickname = localStorage.getItem('userNickname');
        const email = localStorage.getItem('userEmail');
        const profileCircle = document.getElementById('profile-circle');
        const userName = document.getElementById('user-name');
        const userHandle = document.getElementById('user-handle');

        // (비로그인 차단 로직이 상단에 있으므로 여긴 도달하지 않겠지만 방어 코드 유지)
        if (!nickname || !email) return;

        userName.textContent = nickname;
        // 💡 이메일에서 @ 앞의 아이디 부분만 추출해서 보여줌
        const emailId = email.split('@')[0] || email;
        userHandle.textContent = '@' + emailId;
        // 프사 이니셜은 닉네임 첫 글자로 고정
        profileCircle.textContent = nickname[0] ? nickname[0].toUpperCase() : 'K';
    }

    // ==========================================
    // 크림슨 지수 동적 렌더링 함수
    // ==========================================
    function updateCrimsonIndexUI(score) {
        const indexValueText = document.getElementById('crimson-index-value');
        const indexFill = document.getElementById('index-fill');

        // 텍스트 업데이트
        indexValueText.innerText = score;

        // 길이를 위한 절대값 계산 (최대 100%)
        const absScore = Math.abs(score);
        const percent = Math.min(absScore, 100); 

        indexFill.style.width = `${percent}%`;

        if (score >= 0) {
            // 양수: 크림슨 색상, 왼쪽부터 채워짐
            indexValueText.style.color = 'var(--crimson)';
            indexFill.className = 'index-fill fill-positive';
        } else {
            // 음수: 파란색 색상, 오른쪽부터 채워짐
            indexValueText.style.color = '#003876'; // yonsei-blue
            indexFill.className = 'index-fill fill-negative';
        }
    }

    // 3. 로그아웃 기능
    document.addEventListener('click', function(e) {
        if(e.target && e.target.id === 'logout-btn') {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('userNickname');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userId');
            alert('로그아웃 되었습니다.');
            location.href = 'main_login.html'; 
        }
    });

    updateProfileCard();
    const userId = localStorage.getItem('userId');

    async function fetchUserTrustScore() {
        if (!userId) return;

        try {
            const res = await fetch(`https://campusgonggu-production.up.railway.app/participants/trust-score/${userId}`);
            
            if (res.ok) {
                const data = await res.json();
                updateCrimsonIndexUI(data.trust_score || 0);
            } else {
                updateCrimsonIndexUI(0);
            }
        } catch (e) {
            console.error("네트워크 에러 발생:", e);
            updateCrimsonIndexUI(0);
        }
    }

    fetchUserTrustScore();

    // 올린 공고 수 카운트
    fetch('https://campusgonggu-production.up.railway.app/products')
        .then(res => res.json())
        .then(allProducts => {
            const myProducts = allProducts.filter(p => p.user_id == userId);
            document.getElementById('my-post-count').innerText = `${myProducts.length} 건`;
        })
        .catch(err => console.error('내 공고 개수 로드 실패:', err));

    // 참여 중 건수 카운트
    Promise.all([
        fetch(`https://campusgonggu-production.up.railway.app/chats/my/${userId}`).then(res => res.json()),
        fetch('https://campusgonggu-production.up.railway.app/products').then(res => res.json())
    ]).then(([chats, allProducts]) => {
        const myCreatedProducts = allProducts.filter(p => String(p.user_id) === String(userId));
        const joinedProductIds = chats.map(c => String(c.product_id));

        let uniqueCount = chats.length;
        
        myCreatedProducts.forEach(p => {
            if (!joinedProductIds.includes(String(p.id))) {
                uniqueCount++;
            }
        });
        
        document.getElementById('joined-count').innerText = `${uniqueCount} 건`;
    }).catch(err => console.error('참여 공구 개수 로드 실패:', err));

    // 성공 공구 수 카운트
    Promise.all([
        fetch(`https://campusgonggu-production.up.railway.app/chats/my/${userId}`).then(res => res.json()),
        fetch('https://campusgonggu-production.up.railway.app/products').then(res => res.json())
    ]).then(([chats, allProducts]) => {
        const joinedIds = chats.map(c => String(c.product_id));
        const myCreatedIds = allProducts.filter(p => String(p.user_id) === String(userId)).map(p => String(p.id));

        const successProducts = allProducts.filter(p => {
            const isMineOrJoined = joinedIds.includes(String(p.id)) || myCreatedIds.includes(String(p.id));
            const isSuccess = p.status === 'success'; 
            return isMineOrJoined && isSuccess;
        });
        
        document.getElementById('success-count').innerText = `${successProducts.length} 건`;
    }).catch(err => console.error('성공 공구 개수 로드 실패:', err));

    // 최근 참여 내역 로드
    async function loadRecentParticipations() {
        const grid = document.getElementById('recent-participation-grid');
        grid.innerHTML = '';

        try {
            const [chatsRes, productsRes] = await Promise.all([
                fetch(`https://campusgonggu-production.up.railway.app/chats/my/${userId}`),
                fetch('https://campusgonggu-production.up.railway.app/products')
            ]);

            let joinedProducts = await chatsRes.json();
            const allProducts = await productsRes.json();
            
            const myCreatedProducts = allProducts.filter(p => String(p.user_id) === String(userId));
            const joinedProductIds = joinedProducts.map(p => String(p.product_id));
            
            myCreatedProducts.forEach(myProduct => {
                if (!joinedProductIds.includes(String(myProduct.id))) {
                    joinedProducts.push({
                        ...myProduct,
                        product_id: myProduct.id
                    });
                }
            });

            joinedProducts.sort((a, b) => b.product_id - a.product_id);

            if (joinedProducts.length === 0) {
                grid.innerHTML = '<p style="color:#888;">최근 참여 내역이 없습니다.</p>';
                return;
            }

            joinedProducts.slice(0, 2).forEach(product => {
                const now = Math.floor(Date.now() / 1000);
                const isClosed = (Number(product.duration) <= now) || (product.currentCount >= product.targetCount);
                
                const badgeClass = isClosed ? 'success' : 'recruiting';
                const badgeText = isClosed ? '모집 마감' : '모집중';

                grid.insertAdjacentHTML('beforeend', `
                    <div class="gonggu-card"
                        onclick="location.href='product.html?id=${product.product_id}'"
                        style="cursor:pointer;">

                        <span class="badge ${badgeClass}">
                            ${badgeText}
                        </span>

                        <span class="gonggu-title">
                            ${product.title}
                        </span>

                        <div class="gonggu-info">
                            <span>📍 ${product.location || '교내'}</span>
                            <span>
                                👥 ${product.currentCount}
                                / ${product.targetCount} 명
                            </span>
                        </div>
                    </div>
                `);
            });

        } catch (error) {
            console.error(error);
            grid.innerHTML = '<p style="color:#888;">참여 내역을 불러오지 못했습니다.</p>';
        }
    }

    loadRecentParticipations();

    // 내가 올린 공고 로드
    async function loadMyProducts() {
        const grid = document.getElementById('my-products-grid');
        grid.innerHTML = '';

        try {
            const res = await fetch('https://campusgonggu-production.up.railway.app/products');
            const allProducts = await res.json();
            
            const myProducts = allProducts.filter(p => String(p.user_id) === String(userId));
            myProducts.sort((a, b) => b.id - a.id);

            if (myProducts.length === 0) {
                grid.innerHTML = '<p style="color:#888;">올린 공고가 없습니다.</p>';
                return;
            }

            myProducts.slice(0, 2).forEach(product => {
                const now = Math.floor(Date.now() / 1000);
                const isClosed = (Number(product.duration) <= now) || (product.currentCount >= product.targetCount);
                
                const badgeClass = isClosed ? 'success' : 'recruiting';
                const badgeText = isClosed ? '모집 마감' : '모집중';

                grid.insertAdjacentHTML('beforeend', `
                    <div class="gonggu-card"
                        onclick="location.href='product.html?id=${product.id}'"
                        style="cursor:pointer;">

                        <span class="badge ${badgeClass}">
                            ${badgeText}
                        </span>

                        <span class="gonggu-title">
                            ${product.title}
                        </span>

                        <div class="gonggu-info">
                            <span>📍 ${product.location || '교내'}</span>
                            <span>
                                👥 ${product.currentCount}
                                / ${product.targetCount} 명
                            </span>
                        </div>
                    </div>
                `);
            });

        } catch (error) {
            console.error(error);
            grid.innerHTML = '<p style="color:#888;">올린 공고를 불러오지 못했습니다.</p>';
        }
    }

    loadMyProducts();
</script>

</body>
</html>
