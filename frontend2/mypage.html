<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="stylesheet" href="mobile.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU GONGGU - 마이페이지</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* main_login.html과 동일한 컬러 변수 추가 */
            --ku-crimson: #8A1538;
            --text-dark: #222222;

            /* mypage.html 고유 변수 */
            --crimson: #8B0029;
            --bg-gray: #EDF0F3;
            --card-white: #FFFFFF;
            --text-main: #333333;
            --text-sub: #888888;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            color: var(--text-main);
        }

        /* ==========================================
        main_login.html과 완벽히 동일한 헤더 CSS
       ========================================== */
        header {
            background-color: var(--ku-crimson);
            backdrop-filter: blur(8px);
            height: 70px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .nav-inner {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        .logo {
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        nav a.menu-link {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a.menu-link:hover {
            color: var(--text-dark);
        }

        .btn-login-nav {
            background: var(--ku-crimson);
            color: white !important;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(138, 21, 56, 0.3);
            border: 2px solid white;
            cursor: pointer;
        }

        .btn-login-nav:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(138, 21, 56, 0.4);
        }
        /* ========================================== */

        .container {
            max-width: 1200px;
            /* 고정된 헤더 높이(70px)를 고려하여 상단 여백을 100px로 유지합니다. */
            margin: 100px auto 40px auto; 
            display: flex;
            gap: 25px;
            padding: 0 20px;
        }

        /* 공통 카드 스타일 */
        .card {
            background: var(--card-white);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 25px;
        }

        /* 왼쪽 사이드바 */
        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 20px; }
        
        .profile-card { text-align: center; }
        .profile-circle {
            width: 90px; height: 90px; background: var(--crimson); color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: bold; margin: 0 auto 15px;
        }
        .user-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 5px; }
        .user-handle { color: var(--text-sub); font-size: 0.85rem; margin-bottom: 20px; }

        /* ==========================================
           크림슨 지수 UI CSS 수정 (방향 및 색상 제어)
           ========================================== */
        .crimson-index-section {
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
            text-align: left;
        }
        .index-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        
        /* index-bar에 flex 적용 */
        .index-bar { 
            height: 6px; 
            background: #eee; 
            border-radius: 3px; 
            display: flex; 
            width: 100%;
        }
        
        .index-fill { 
            height: 100%; 
            border-radius: 3px; 
            transition: width 0.3s ease, background-color 0.3s ease; 
        }

        /* 양수일 때: 왼쪽부터 렌더링, 크림슨 색상 */
        .fill-positive {
            background: var(--crimson);
            margin-left: 0;
            margin-right: auto;
        }

        /* 음수일 때: 오른쪽부터 렌더링, 파란 색상 */
        .fill-negative {
            background: #007AFF;
            margin-left: auto;
            margin-right: 0;
        }

        .menu-list { list-style: none; padding: 0; margin: 0; }
        .menu-item {
            padding: 15px 0; border-bottom: 1px solid #f5f5f5;
            display: flex; align-items: center; color: var(--text-main);
            text-decoration: none; font-size: 0.95rem;
        }
        .menu-item:last-child { border: none; }

        /* 오른쪽 메인 컨텐츠 */
        .main-content { flex: 1; }
        
        .top-stats {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px;
        }
        .stat-card {
            background: white; padding: 20px; border-radius: 12px; text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            cursor: pointer;
        }
        .stat-card:hover { background: #f9f9f9; }
        .stat-label { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 10px; display: block; }
        .stat-value { font-size: 1.4rem; font-weight: 800; color: var(--text-main); }

        .section-title { font-size: 1rem; font-weight: 700; margin: 30px 0 15px; display: flex; justify-content: space-between; }
        
        .gonggu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .jjim-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .gonggu-card {
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative;
        }
        .badge {
            font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; font-weight: bold; margin-bottom: 10px; display: inline-block;
        }
        .badge.recruiting { background: #FFF0F3; color: var(--crimson); }
        .badge.success { background: #E8F5E9; color: #2E7D32; }

        .gonggu-title { font-weight: 700; font-size: 1rem; margin-bottom: 10px; display: block; }
        .gonggu-info { font-size: 0.85rem; color: var(--text-sub); display: flex; justify-content: space-between; }

    </style>
</head>
<body>

<div id="header-placeholder"></div>

<div class="container">
    <div class="sidebar">
        <div class="card profile-card">
            <div class="profile-circle" id="profile-circle">?</div>
            <div class="user-name" id="user-name">사용자</div>
            <div class="user-handle" id="user-handle">@username</div>
            
            <div class="crimson-index-section">
                <div class="index-header">
                    <span style="font-size: 0.8rem; font-weight: bold;">크림슨 지수</span>
                    <span id="crimson-index-value" style="font-size: 0.8rem; font-weight: bold; color: var(--crimson);">0</span>
                </div>
                <div class="index-bar"><div id="index-fill" class="index-fill fill-positive" style="width: 0%;"></div></div>
            </div>
            
            <button onclick="location.href='changeProfile.html'" style="width: 100%; margin-top: 20px; padding: 10px; background: white; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 0.85rem;">프로필 수정</button>
        </div>

        <div class="card" style="padding: 10px 25px;">
            <a href="crimson.html" class="menu-item">⭐ 크림슨 지수</a>
            <a href="mychats.html" class="menu-item">💬 내 채팅방</a>
            <a href="help.html" class="menu-item">❓도움말</a>
        </div>
    </div>

    <div class="main-content">
        <div class="top-stats">
            <div class="stat-card" onclick="location.href='my_products.html'">
                <span class="stat-label">올린 공고</span>
                <span class="stat-value" id="my-post-count">0 건</span>
            </div>

            <div class="stat-card" onclick="location.href='joined_products.html'">
                <span class="stat-label">참여 중</span>
                <span class="stat-value" id="joined-count">0 건</span>
            </div>

            <div class="stat-card" onclick="location.href='success_products.html'">
                <span class="stat-label">성공 공구</span>
                <span class="stat-value" id="success-count">0 건</span>
            </div>
        </div>

        <div class="section-title">최근 참여 내역 
            <span onclick="location.href='joined_products.html'" style="font-size: 0.8rem; color: #aaa; font-weight: normal; cursor: pointer;">전체보기 〉</span>
        </div>
        
        <div class="gonggu-grid" id="recent-participation-grid"></div>

        <div class="section-title">방금 찜한 공구 
            <span onclick="location.href='liked_products.html'" style="font-size: 0.8rem; color: #aaa; font-weight: normal; cursor: pointer;">더보기 〉</span>
        </div>
        
        <div class="jjim-grid" id="liked-products-grid"></div>
    </div>
</div>

<script>
    // 1. 페이지 열리자마자 헤더 가져오기
    fetch('header.html')
        .then(res => {
            if (!res.ok) throw new Error('header.html 파일을 찾을 수 없습니다.');
            return res.text();
        })
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
            updateHeader();
        })
        .catch(err => console.error(err));

    function updateHeader() {
        const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
        
        const authButtons = document.querySelectorAll('.auth-only');
        const guestButtons = document.querySelectorAll('.guest-only');

        if (isLoggedIn) {
            authButtons.forEach(btn => btn.style.display = 'inline-block');
            guestButtons.forEach(btn => btn.style.display = 'none');
        } else {
            authButtons.forEach(btn => btn.style.display = 'none');
            guestButtons.forEach(btn => btn.style.display = 'inline-block');
        }
    }

    function updateProfileCard() {
        const nickname = localStorage.getItem('userNickname');
        const email = localStorage.getItem('userEmail');
        const profileCircle = document.getElementById('profile-circle');
        const userName = document.getElementById('user-name');
        const userHandle = document.getElementById('user-handle');

        if (!nickname || !email) {
            userName.textContent = '로그인이 필요합니다.';
            userHandle.textContent = '@guest';
            profileCircle.textContent = 'G';
            return;
        }

        userName.textContent = nickname;
        const emailId = email.split('@')[0] || email;
        userHandle.textContent = '@' + emailId;
        profileCircle.textContent = nickname[0] ? nickname[0].toUpperCase() : emailId[0].toUpperCase();
    }

    // ==========================================
    // 크림슨 지수 동적 렌더링 함수
    // ==========================================
    function updateCrimsonIndexUI(score) {
        const indexValueText = document.getElementById('crimson-index-value');
        const indexFill = document.getElementById('index-fill');

        // 텍스트 업데이트
        indexValueText.innerText = score;

        // 길이를 위한 절대값 계산 (최대 100%)
        const absScore = Math.abs(score);
        const percent = Math.min(absScore, 100); 

        indexFill.style.width = `${percent}%`;

        if (score >= 0) {
            // 양수: 크림슨 색상, 왼쪽부터 채워짐
            indexValueText.style.color = 'var(--crimson)';
            indexFill.className = 'index-fill fill-positive';
        } else {
            // 음수: 파란색 색상, 오른쪽부터 채워짐
            indexValueText.style.color = '#003876'; // yonsei-blue
            indexFill.className = 'index-fill fill-negative';
        }
    }

    // 3. 로그아웃 기능
    document.addEventListener('click', function(e) {
        if(e.target && e.target.id === 'logout-btn') {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('userNickname');
            localStorage.removeItem('userEmail');
            alert('로그아웃 되었습니다.');
            location.href = 'main_login.html'; 
        }
    });

    updateProfileCard();
    const userId = localStorage.getItem('userId');

    // 유저 정보를 불러와 크림슨 지수 업데이트 (API 엔드포인트가 있다면 연동)
    async function fetchUserTrustScore() {
        try {
            // 백엔드에서 사용자 정보를 가져온다고 가정 (실제 API 주소에 맞게 수정 가능)
            const res = await fetch(`http://localhost:3000/users/${userId}`);
            if (res.ok) {
                const user = await res.json();
                updateCrimsonIndexUI(user.trust_score || 0);
            } else {
                updateCrimsonIndexUI(86); // 실패 시 임시 기본값 86 (테스트 시 -30 등으로 바꿔보세요)
            }
        } catch (e) {
            updateCrimsonIndexUI(86); // 임시 양수 테스트
            // updateCrimsonIndexUI(-20); // 음수 테스트를 원하시면 이 줄의 주석을 해제하세요
        }
    }
    fetchUserTrustScore();

    // 올린 공고 수 카운트
    fetch('http://localhost:3000/products')
        .then(res => res.json())
        .then(allProducts => {
            const myProducts = allProducts.filter(p => p.user_id == userId);
            document.getElementById('my-post-count').innerText = `${myProducts.length} 건`;
        })
        .catch(err => console.error('내 공고 개수 로드 실패:', err));

    // 참여 중 건수 카운트
    Promise.all([
        fetch(`http://localhost:3000/chats/my/${userId}`).then(res => res.json()),
        fetch('http://localhost:3000/products').then(res => res.json())
    ]).then(([chats, allProducts]) => {
        const myCreatedProducts = allProducts.filter(p => String(p.user_id) === String(userId));
        const joinedProductIds = chats.map(c => String(c.product_id));

        let uniqueCount = chats.length;
        
        myCreatedProducts.forEach(p => {
            if (!joinedProductIds.includes(String(p.id))) {
                uniqueCount++;
            }
        });
        
        document.getElementById('joined-count').innerText = `${uniqueCount} 건`;
    }).catch(err => console.error('참여 공구 개수 로드 실패:', err));

    // 성공 공구 수 카운트
    fetch('http://localhost:3000/products')
        .then(res => res.json())
        .then(products => {
            const successProducts = products.filter(
                p => p.currentCount >= p.targetCount
            );
            document.getElementById('success-count').innerText = `${successProducts.length} 건`;
        })
        .catch(err => console.error(err));

    // 최근 참여 내역 로드
    async function loadRecentParticipations() {
        const grid = document.getElementById('recent-participation-grid');
        grid.innerHTML = '';

        try {
            const [chatsRes, productsRes] = await Promise.all([
                fetch(`http://localhost:3000/chats/my/${userId}`),
                fetch('http://localhost:3000/products')
            ]);

            let joinedProducts = await chatsRes.json();
            const allProducts = await productsRes.json();
            
            const myCreatedProducts = allProducts.filter(p => String(p.user_id) === String(userId));
            const joinedProductIds = joinedProducts.map(p => String(p.product_id));
            
            myCreatedProducts.forEach(myProduct => {
                if (!joinedProductIds.includes(String(myProduct.id))) {
                    joinedProducts.push({
                        ...myProduct,
                        product_id: myProduct.id
                    });
                }
            });

            joinedProducts.sort((a, b) => b.product_id - a.product_id);

            if (joinedProducts.length === 0) {
                grid.innerHTML = '<p style="color:#888;">최근 참여 내역이 없습니다.</p>';
                return;
            }

            joinedProducts.slice(0, 2).forEach(product => {
                const isClosed = product.currentCount >= product.targetCount;
                const badgeClass = isClosed ? 'success' : 'recruiting';
                const badgeText = isClosed ? '배송 완료' : '모집중';

                grid.insertAdjacentHTML('beforeend', `
                    <div class="gonggu-card"
                        onclick="location.href='product.html?id=${product.product_id}'"
                        style="cursor:pointer;">

                        <span class="badge ${badgeClass}">
                            ${badgeText}
                        </span>

                        <span class="gonggu-title">
                            ${product.title}
                        </span>

                        <div class="gonggu-info">
                            <span>📍 ${product.location || '교내'}</span>
                            <span>
                                👥 ${product.currentCount}
                                / ${product.targetCount} 명
                            </span>
                        </div>
                    </div>
                `);
            });

        } catch (error) {
            console.error(error);
            grid.innerHTML = '<p style="color:#888;">참여 내역을 불러오지 못했습니다.</p>';
        }
    }

    loadRecentParticipations();

    // 찜 목록 로드 (준비 중)
    async function loadLikedProducts() {
        const grid = document.getElementById('liked-products-grid');
        grid.innerHTML = `<p style="color:#888;">찜한 공구 기능은 준비 중입니다.</p>`;
    }
    loadLikedProducts();
</script>

</body>
</html>
