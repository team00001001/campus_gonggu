    <!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="stylesheet" href="mobile.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 참여 공구 | KU GONGGU</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ku-crimson: #8A1538;
            --text-dark: #222222; 
            
            --bg-color: #F8F9FA;
            --surface-color: #FFFFFF;
            --border-color: #EAECEF;
            --text-primary: #1A1A1A;
            --text-secondary: #4A5056;
            --text-tertiary: #818991;
            --shadow-md: 0 4px 16px rgba(138, 21, 56, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding-top: 100px; 
            min-height: 100vh;
        }

        /* ==========================================
        mypage.html과 동일한 헤더 CSS
        ========================================== */
        header {
            background-color: var(--ku-crimson);
            backdrop-filter: blur(8px);
            height: 70px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .nav-inner {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        .logo {
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        nav a.menu-link {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a.menu-link:hover {
            color: var(--text-dark);
        }

        .btn-login-nav {
            background: var(--ku-crimson);
            color: white !important;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(138, 21, 56, 0.3);
            border: 2px solid white;
            cursor: pointer;
        }

        .btn-login-nav:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(138, 21, 56, 0.4);
        }
        /* ========================================== */

        /* 메인 컨텐츠 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 24px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title span {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--ku-crimson);
            background: #FDF2F4;
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* 채팅방 리스트 */
        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-card {
            background: var(--surface-color);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(0,0,0,0.02);
            transition: transform 0.2s;
        }

        .chat-card:hover {
            transform: translateY(-3px);
        }

        .product-img {
            width: 80px;
            height: 80px;
            border-radius: 14px;
            object-fit: cover;
            background-color: #eee;
        }

        .chat-info {
            flex: 1;
        }

        .chat-category {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }

        .chat-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        .chat-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            gap: 12px;
        }

        /* 버튼 스타일 */
        .enter-btn {
            background-color: var(--ku-crimson);
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .enter-btn:hover {
            background-color: #72112e;
        }

        /* 참여 중인 공구가 없을 때 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-tertiary);
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container">
        <h1 class="page-title">내 참여 채팅방 <span id="count-badge">0</span></h1>
        
        <div id="chat-list" class="chat-list">
        </div>

        <div id="empty-view" class="empty-state" style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <p>아직 참여 중인 공동구매가 없습니다.<br>새로운 공구에 참여해보세요!</p>
        </div>
    </div>

    <script>
        // 1. 페이지 열리자마자 헤더 가져오기 (mypage.html과 동일)
        fetch('header.html')
            .then(res => {
                if (!res.ok) throw new Error('header.html 파일을 찾을 수 없습니다.');
                return res.text();
            })
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                updateHeader(); // 로그인 상태에 따른 헤더 버튼 업데이트
            })
            .catch(err => console.error(err));

        // 헤더 로그인/로그아웃 상태 업데이트 함수
        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            
            const authButtons = document.querySelectorAll('.auth-only');
            const guestButtons = document.querySelectorAll('.guest-only');

            if (isLoggedIn) {
                authButtons.forEach(btn => btn.style.display = 'inline-block');
                guestButtons.forEach(btn => btn.style.display = 'none');
            } else {
                authButtons.forEach(btn => btn.style.display = 'none');
                guestButtons.forEach(btn => btn.style.display = 'inline-block');
            }
        }

        // 2. 로그아웃 기능 (버튼 클릭 감시 - mypage.html과 동일)
        document.addEventListener('click', function(e) {
            if(e.target && e.target.id === 'logout-btn') {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('userNickname');
                localStorage.removeItem('userEmail');
                alert('로그아웃 되었습니다.');
                location.href = 'main_login.html'; 
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
    const listContainer = document.getElementById('chat-list');
    const emptyView = document.getElementById('empty-view');
    const countBadge = document.getElementById('count-badge');

    const userId = localStorage.getItem('userId');

    if (!userId) {
        alert('로그인이 필요합니다.');
        location.href = 'login.html';
        return;
    }

    try {
        const response = await fetch(`http://localhost:3000/chats/my/${userId}`);
        const myChats = await response.json();

        countBadge.innerText = myChats.length;

        if (myChats.length === 0) {
            emptyView.style.display = 'block';
            return;
        }

        listContainer.innerHTML = '';

        myChats.forEach(chat => {
            const card = document.createElement('div');
            card.className = 'chat-card';

            card.innerHTML = `
                <img src="${chat.imageUrl || 'images/default-etc.png'}" alt="상품" class="product-img">
                <div class="chat-info">
                    <div class="chat-category">${chat.category || '기타'}</div>
                    <div class="chat-name">${chat.title}</div>
                    <div class="chat-meta">
                        <span>💰 ${Number(chat.price).toLocaleString()}원</span>
                        <span>📍 ${chat.location || '교내'}</span>
                        <span>👥 ${chat.currentCount}/${chat.targetCount}</span>
                    </div>
                </div>
                <a href="direct_chattings.html?id=${chat.product_id}" class="enter-btn">채팅방 입장</a>
            `;

            listContainer.appendChild(card);
        });

    } catch (error) {
        console.error('채팅방 목록 로드 실패:', error);
        alert('채팅방 목록을 불러오지 못했습니다.');
    }
});
    </script>
</body>
</html>
