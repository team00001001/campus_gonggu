<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="stylesheet" href="mobile.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 상세 | KU GONGGU</title>
    
    <link rel="stylesheet" href="product.css" media="(min-width: 769px)">
<link rel="stylesheet" href="mobile.css" media="(max-width: 768px)">
    
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="header-placeholder"></div>

    <div class="container">
        <section class="product-hero card">
            <div class="product-image-container">
                <span>이미지 준비중</span>
                <img src="" alt="상품 이미지" class="product-image" id="product-img">
            </div>
            
            <div class="product-info">
                <div class="badge-group">
                    <span class="category-badge tag-hot" id="badge-hot" style="display:none;">🔥 마감임박</span>
                    <span class="category-badge tag-official">✓ 신뢰도 인증</span>
                    <span class="category-badge" id="product-category">카테고리 불러오는 중...</span>
                </div>
                
                <h1 class="title" id="product-title">데이터를 불러오는 중입니다...</h1>
                
                <div class="price-box">
                    <div class="n-pay-row">
                        <span class="n-pay-label">공구 참여가 (인당)</span>
                        <div class="n-pay-price" id="product-price">0원 <span id="product-target-count">(0명 기준)</span></div>
                    </div>
                </div>

                <div class="progress-section">
                    <div class="status-header">
                        <span class="status-label">모집 현황</span>
                        <span class="status-count" id="status-count-text">현재 <strong>0명</strong> / 목표 0명</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-bg">
                            <div class="progress-fill" id="progress-fill" style="width: 0%;"></div> 
                        </div>
                        <div class="progress-percent" id="progress-percent">0%</div>
                    </div>
                    <div class="deadline-text" id="deadline-text">
                        <span>⏳</span> 남은 기간: -
                    </div>
                </div>

                <button class="join-btn" onclick="joinGroupBuy()">이 공구에 참여하기</button>
            </div>
        </section>

        <section class="details-section card">
            <div class="host-info-card">
                <div class="host-avatar">호</div>
                <div class="host-details">
                    <div class="host-name-row">
                        <span class="host-name" id="host-name">로딩중</span>
                        <span class="host-dept" id="host-dept">익명 학우</span>
                    </div>
                    <div class="host-trust-bar">
                        <span class="trust-icon">✓</span> 고대생 인증 완료 · 크림슨 지수 30
                    </div>
                </div>
            </div>

            <h2 class="content-title">공구 상세 내용</h2>
            <div class="content-body" id="product-description">
                데이터를 불러오는 중입니다...
            </div>
        </section>

        <section class="delivery-section card">
            <h2 class="content-title">📦 배송 현황 조회</h2>
            
            <div class="tracking-input-container">
                <select id="carrier-id" class="carrier-select">
                    <option value="">택배사 선택</option>
                    <option value="04">CJ대한통운</option>
                    <option value="01">우체국택배</option>
                    <option value="05">한진택배</option>
                    <option value="08">롯데택배</option>
                    <option value="06">로젠택배</option>
                </select>
                <input type="text" id="tracking-number" class="tracking-input" placeholder="- 제외 송장번호 입력">
                <button class="track-btn" onclick="fetchTrackingInfo()">조회하기</button>
            </div>

            <div id="tracking-result" class="tracking-result-container" style="display: none;">
                <div class="tracking-header">
                    <span id="delivery-status-badge" class="delivery-badge">조회 완료</span>
                    <span id="delivery-info-text" class="delivery-info"></span>
                </div>
                
                <div class="timeline-container">
                    <ul class="timeline" id="timeline-list">
                        </ul>
                </div>
            </div>
        </section>
    </div>

<script>
// ==========================================
// ⚙️ [1] 전역 설정 및 환경 변수
// ==========================================
const API_BASE_URL = 'http://localhost:3000';
const urlParams = new URLSearchParams(window.location.search);
const productId = urlParams.get('id') || urlParams.get('productId'); 
const currentUserId = localStorage.getItem('userId');
const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';

// ==========================================
// 🚀 [2] 페이지 초기화
// ==========================================
document.addEventListener('DOMContentLoaded', async () => {
    if (!productId) {
        alert('잘못된 접근입니다. 상품 ID가 없습니다.');
        return;
    }

    // 1. 헤더 로드 및 알림/마이페이지 UI 활성화
    await loadHeader();

    // 2. 전체 데이터 로드 및 UI 렌더링
    await initializeProductPage();
});

async function loadHeader() {
    try {
        const res = await fetch('header.html');
        const data = await res.text();
        document.getElementById('header-placeholder').innerHTML = data;
        
        const authElements = document.querySelectorAll('.auth-only');
        const guestElements = document.querySelectorAll('.guest-only');

        if (isLoggedIn) {
            authElements.forEach(el => el.style.display = 'inline-block');
            guestElements.forEach(el => el.style.display = 'none');
        } else {
            authElements.forEach(el => el.style.display = 'none');
            guestElements.forEach(el => el.style.display = 'inline-block');
        }
    } catch (err) { console.error('헤더 로드 실패:', err); }
}

document.addEventListener('click', (e) => {
    if(e.target && e.target.id === 'logout-btn') {
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('userId');
        localStorage.removeItem('joinedGroups');
        alert('로그아웃 되었습니다.');
        location.href = 'main_login.html'; 
    }
});

// ==========================================
// 📦 [3] 데이터 로드 및 상세 UI 렌더링
// ==========================================
async function initializeProductPage() {
    try {
        const [pRes, mRes] = await Promise.all([
            fetch(`${API_BASE_URL}/products/${productId}`),
            fetch(`${API_BASE_URL}/participants?productId=${productId}`)
        ]);

        if (!pRes.ok) throw new Error('상품 정보를 찾을 수 없습니다.');
        const product = await pRes.json();
        product.members = mRes.ok ? await mRes.json() : [];

        renderBasicInfo(product);
        setupActionButtons(product);
        renderCompletionSection(product);
        initDeliverySection(product);

    } catch (err) {
        console.error(err);
        document.getElementById('product-title').innerText = "데이터 로드 실패";
    }
}

function renderBasicInfo(product) {
    // 이미지 폴백 로직 (정아 님 기존 로직)
    const defaults = { '식재료 / 배달': 'images/default-food.png', '자취 / 생필품': 'images/default-living.png', '전공 / 문구': 'images/default-study.png' };
    const fallback = defaults[product.category] || 'images/default-etc.png';
    const imgEl = document.getElementById('product-img');
    imgEl.src = (product.imageUrl && product.imageUrl !== 'none') ? product.imageUrl : fallback;
    imgEl.onerror = () => { imgEl.src = fallback; };

    // 카테고리 태그 및 🔥 배지
    const categoryEl = document.getElementById('product-category');
    categoryEl.innerText = product.category;
    if (product.category.includes('식재료')) categoryEl.classList.add('tag-food');
    else if (product.category.includes('전공')) categoryEl.classList.add('tag-study');
    else if (product.category.includes('생필품')) categoryEl.classList.add('tag-living');
    
    if (product.targetCount - product.currentCount === 1) {
        document.getElementById('badge-hot').style.display = 'inline-block';
    }

    document.getElementById('product-title').innerText = product.title;
    document.getElementById('host-name').innerText = product.writer || '익명 학우';
    document.getElementById('product-price').innerHTML = `${Number(product.price).toLocaleString()}원 <span>(${product.targetCount}명 기준)</span>`;
    document.getElementById('status-count-text').innerHTML = `현재 <strong>${product.currentCount}명</strong> / 목표 ${product.targetCount}명`;
    
    const percent = Math.min(Math.round((product.currentCount / product.targetCount) * 100), 100);
    document.getElementById('progress-fill').style.width = `${percent}%`;
    document.getElementById('progress-percent').innerText = `${percent}%`;

    // 수령 장소 및 마감 일시 (상세보기 박스)
    const staticDate = formatStatic(product.duration);
    document.getElementById('product-description').innerHTML = `
        <div style="background:#f9f9f9; padding:15px; border-radius:10px; margin-bottom:20px; border-left:5px solid #ce152d;">
            <p style="margin:5px 0;">📍 <strong>수령 장소:</strong> ${product.location || '정보 없음'}</p>
            <p style="margin:5px 0;">⏰ <strong>마감 일시:</strong> ${staticDate}</p>
        </div>
        ${product.description.replace(/\n/g, '<br>')}
    `;

    startTimer(product.duration);
}

// ==========================================
// ⏰ [4] 시간/날짜 로직 (개월/주일 단위 복원)
// ==========================================

// [복원 완료] 정아 님의 원래 의도대로 개월, 주일 단위를 계산하는 함수
function formatDynamic(expireAt) {
    const expire = Number(expireAt);
    const now = Math.floor(Date.now() / 1000);
    const diff = expire - now;

    if (isNaN(expire) || diff <= 0) return "모집 마감";

    const m = 30 * 24 * 3600; // 한 달(30일)
    const w = 7 * 24 * 3600;  // 주일(7일)
    const d = 24 * 3600;      // 일
    const h = 3600;           // 시간
    const min = 60;           // 분

    if (diff >= m) {
        return `${Math.floor(diff / m)}개월 ${Math.floor((diff % m) / d)}일 남음`;
    } else if (diff >= w) {
        return `${Math.floor(diff / w)}주일 ${Math.floor((diff % w) / d)}일 남음`;
    } else if (diff >= d) {
        return `${Math.floor(diff / d)}일 ${Math.floor((diff % d) / h)}시간 남음`;
    } else if (diff >= h) {
        return `${Math.floor(diff / h)}시간 ${Math.floor((diff % h) / min)}분 남음`;
    } else {
        return `${Math.floor(diff / min)}분 ${diff % min}초 남음`;
    }
}

function formatStatic(exp) {
    const date = new Date(Number(exp) * 1000);
    if (isNaN(date.getTime())) return "정보 없음";
    return `${date.getMonth() + 1}월 ${date.getDate()}일 ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}까지`;
}

function startTimer(exp) {
    const el = document.getElementById('deadline-text');
    const timerId = setInterval(() => {
        const timeText = formatDynamic(exp);
        const diff = Number(exp) - Math.floor(Date.now() / 1000);
        
        // 10분 미만일 때 붉은색 강조 (기존 로직 보존)
        const isUrgent = diff > 0 && diff < 600;
        el.innerHTML = `<span>⏳</span> 남은 기간: <strong style="color: ${isUrgent ? '#b11226' : 'inherit'}">${timeText}</strong>`;
        
        if (timeText === "모집 마감") {
            clearInterval(timerId);
            const btn = document.querySelector('.join-btn');
            if (btn && btn.textContent === "이 공구에 참여하기") {
                btn.disabled = true;
                btn.style.backgroundColor = "#ccc";
                btn.textContent = "모집 마감";
            }
        }
    }, 1000);
}

// ==========================================
// 🖱️ [5] 버튼 및 액션 (참여/취소/삭제/신고)
// ==========================================

function setupActionButtons(product) {
    const infoArea = document.querySelector('.product-info');
    const joinBtn = infoArea.querySelector('.join-btn');
    const isHost = String(product.user_id) === String(currentUserId);
    const myMembership = product.members.find(m => String(m.user_id) === String(currentUserId) && m.status !== 'noshow');

    if (isHost) {
        joinBtn.outerHTML = `
            <div style="display:flex; flex-direction:column; gap:10px;">
                <button class="join-btn" style="background:#ce152d;" onclick="location.href='direct_chattings.html?id=${product.id}'">💬 채팅방 들어가기 (관리자)</button>
                <div style="display:flex; gap:10px;">
                    <button class="join-btn" style="background:#444; flex:1; font-size: 14px;" onclick="deleteProduct('${product.id}')">공구방 삭제</button>
                    <button class="join-btn" style="background:#666; flex:1; font-size: 14px;" onclick="location.href='edit.html?id=${product.id}'">내용 수정</button>
                </div>
            </div>`;
        renderHostMemberList(product);
    } else if (myMembership) {
        joinBtn.innerText = "참여 완료 (채팅방 가기)";
        joinBtn.style.background = "#ce152d";
        joinBtn.onclick = () => location.href = `direct_chattings.html?id=${product.id}`;
        
        if (!document.getElementById('guest-action-group')) {
            infoArea.insertAdjacentHTML('beforeend', `
                <div id="guest-action-group" style="display:flex; gap:10px; margin-top:10px;">
                    <button onclick="leaveGroup('${product.id}')" style="flex:1; padding:8px; border:none; border-radius:5px; cursor:pointer; background:#eee;">참여 취소</button>
                    <button onclick="reportHost()" style="flex:1; padding:8px; border:1px solid #ddd; background:none; border-radius:5px; color:#999; cursor:pointer;">신고하기</button>
                </div>`);
        }
    } else {
        joinBtn.innerText = "이 공구에 참여하기";
        joinBtn.style.background = "";
        joinBtn.onclick = () => joinGroup();
        const actionGroup = document.getElementById('guest-action-group');
        if (actionGroup) actionGroup.remove();
    }
}

async function joinGroup() {
    if (!confirm('참여하시겠습니까?')) return;
    try {
        const res = await fetch(`${API_BASE_URL}/participants/join`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ productId, userId: currentUserId })
        });
        if (res.ok) { alert('참여가 완료되었습니다.'); location.reload(); }
    } catch (e) { alert('서버 연결 실패'); }
}

async function leaveGroup(id) {
    if (!confirm("참여를 취소하시겠습니까?")) return;
    try {
        const res = await fetch(`${API_BASE_URL}/participants/cancel`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ productId: id, userId: currentUserId })
        });
        if (res.ok) { 
            let joined = JSON.parse(localStorage.getItem('joinedGroups') || '[]');
            localStorage.setItem('joinedGroups', JSON.stringify(joined.filter(g => String(g) !== String(id))));
            alert("참여가 취소되었습니다."); 
            location.reload(); 
        }
    } catch (e) { alert("취소 실패"); }
}

// ==========================================
// 🚚 [6] 배송 조회 및 타임라인 (기능 보존)
// ==========================================

async function initDeliverySection(product) {
    const isMember = product.members.some(m => String(m.user_id) === String(currentUserId));
    const isHost = String(product.user_id) === String(currentUserId);
    if (!isMember && !isHost) {
        const ds = document.querySelector('.delivery-section');
        if (ds) ds.style.display = 'none';
        return;
    }
    try {
        const res = await fetch(`${API_BASE_URL}/delivery/info/${productId}?userId=${currentUserId}`);
        const dbData = await res.json();
        if (dbData.exists) {
            document.querySelector('.tracking-input-container').style.display = 'none';
            autoFetchTrackingInfo(dbData.data.carrier_id, dbData.data.tracking_number);
        }
    } catch (e) { console.error('배송 정보 로드 에러'); }
}

function renderTimeline(carrierName, trackingNumber, dataList) {
    const resultContainer = document.getElementById('tracking-result');
    const infoText = document.getElementById('delivery-info-text');
    const timelineList = document.getElementById('timeline-list');
    infoText.innerText = `${carrierName} [${trackingNumber}]`;
    timelineList.innerHTML = '';
    dataList.forEach((item, index) => {
        const li = document.createElement('li');
        li.className = `timeline-item ${index === dataList.length - 1 ? 'active' : ''}`;
        li.innerHTML = `
            <div class="timeline-dot"></div>
            <span class="timeline-time">${item.time}</span>
            <div class="timeline-content">
                <strong>[${item.status}]</strong> ${item.location}<br>
                <span style="font-size:13px; color:#666;">${item.details}</span>
            </div>`;
        timelineList.prepend(li);
    });
    resultContainer.style.display = 'block';
}

// 기타 보조 함수들
function renderHostMemberList(product) {
    const detailArea = document.querySelector('.details-section');
    const html = `
        <div class="member-list card" style="margin-top:20px; padding:20px;">
            <h3>👥 참여자 관리 (방장 전용)</h3>
            <div id="member-items">
                ${(product.members.length > 0) ? product.members.filter(m => m.status !== 'noshow').map(m => `
                    <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee;">
                        <span>${m.nickname} 학우</span>
                        <div>
                            ${m.status === 'confirmed' ? '<span style="color:gray; font-weight:bold;">✅ 확인 완료</span>' : 
                            `<button onclick="markStatus(${m.participant_id}, ${m.user_id}, 'confirmed')" style="color:blue; border:none; background:none; cursor:pointer; font-weight:bold;">확인</button>
                             <button onclick="markStatus(${m.participant_id}, ${m.user_id}, 'noshow')" style="color:red; border:none; background:none; margin-left:10px; cursor:pointer; font-weight:bold;">노쇼</button>`}
                        </div>
                    </div>`).join('') : '<p style="color:#999;">아직 참여자가 없습니다.</p>'}
            </div>
        </div>`;
    detailArea.insertAdjacentHTML('beforeend', html);
}

function renderCompletionSection(product) {
    const detailArea = document.querySelector('.details-section');
    if (parseInt(product.currentCount) < parseInt(product.targetCount)) return;
    const isHost = String(product.user_id) === String(currentUserId);
    const myInfo = product.members.find(m => String(m.user_id) === String(currentUserId));
    if (!isHost && !myInfo) return;
    const confirmedCount = product.members.filter(m => m.is_received).length;
    const btnHtml = isHost ? `<p style="color:#ce152d; font-size:13px;">* 모든 참여자가 수령 확인을 완료하면 거래가 종료됩니다.</p>` : 
        (myInfo.is_received ? `<button class="join-btn" style="background:#ccc;" disabled>✅ 수령 확인 완료</button>` : 
        `<button class="join-btn" onclick="guestReceiveItem('${product.id}')">📦 물건 수령 확인</button>`);
    detailArea.insertAdjacentHTML('beforeend', `<div class="completion-card" style="margin-top:30px; border:2px solid #ce152d; padding:20px; border-radius:10px;">
        <h4 style="color:#ce152d; margin:0 0 10px 0;">거래 완료 인증</h4><p>수령 확인 인원: <strong>${confirmedCount}</strong> / ${product.currentCount}명</p>${btnHtml}</div>`);
}

async function deleteProduct(id) { if(confirm("공구방을 삭제하시겠습니까?")) { await fetch(`${API_BASE_URL}/products/${id}`, { method: 'DELETE' }); location.href='main_login.html'; } }
async function reportHost() { if(confirm("방장을 신고하시겠습니까?")) alert("접수되었습니다."); }
async function guestReceiveItem(pid) { await fetch(`${API_BASE_URL}/participants/receive`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ productId: pid, userId: currentUserId }) }); alert("확인되었습니다!"); location.reload(); }
async function markStatus(pid, uid, status) { await fetch(`${API_BASE_URL}/participants/status`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ participantId: pid, userId: uid, status, productId }) }); location.reload(); }
async function autoFetchTrackingInfo(cId, tNo) {
    const res = await fetch(`${API_BASE_URL}/delivery/tracking?carrierId=${cId}&trackId=${tNo}`);
    const data = await res.json();
    if (data.trackingDetails) {
        const formatted = data.trackingDetails.map(d => ({ time: d.timeString, location: d.where, status: d.kind, details: d.telno || '' }));
        const carriers = { '04': 'CJ대한통운', '01': '우체국택배', '05': '한진택배', '08': '롯데택배', '06': '로젠택배' };
        renderTimeline(carriers[cId] || '택배', tNo, formatted);
    }
}
async function fetchTrackingInfo() {
    const cId = document.getElementById('carrier-id').value;
    const tNo = document.getElementById('tracking-number').value.replace(/[^0-9]/g, '');
    if (!cId || !tNo) return alert('정보 입력');
    await fetch(`${API_BASE_URL}/delivery/${productId}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ carrierId: cId, trackingNumber: tNo }) });
    location.reload();
}
</script>
</body>
</html>
