<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 상세 | KU GONGGU</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 메인 컬러 */
            --ku-crimson: #8A1538;
            --ku-crimson-light: #FDF2F4; 
            
            /* UI 컬러 */
            --bg-color: #F8F9FA; 
            --surface-color: #FFFFFF; 
            --border-color: #EAECEF; 
            
            /* 텍스트 컬러 */
            --text-primary: #1A1A1A; 
            --text-secondary: #4A5056; 
            --text-tertiary: #818991; 
            --text-dark: #222222; 
            
            /* 카테고리 파스텔 톤 */
            --color-food: #FFF3E0;
            --color-living: #E3F2FD;
            --color-study: #E8F5E9;
            --color-etc: #F3E5F5;
            
            /* 그림자 */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(138, 21, 56, 0.06); 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
            padding-top: 100px; 
        }

        /* ==========================================
           헤더 CSS
           ========================================== */
        header {
            background-color: var(--ku-crimson);
            backdrop-filter: blur(8px);
            height: 70px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .nav-inner {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        .logo {
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        nav a.menu-link {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a.menu-link:hover {
            color: var(--text-dark);
        }

        .btn-login-nav {
            background: var(--ku-crimson);
            color: white !important;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(138, 21, 56, 0.3);
            border: 2px solid white;
            cursor: pointer;
        }

        .btn-login-nav:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(138, 21, 56, 0.4);
        }

        .container {
            max-width: 940px; 
            margin: 0 auto;
            padding: 0px 20px 100px; 
        }

        .card {
            background: var(--surface-color);
            border-radius: 24px; 
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(0,0,0,0.03); 
        }

        /* ==========================================
           상품 상단 요약
           ========================================== */
        .product-hero {
            display: flex;
            gap: 40px; 
            padding: 40px;
            margin-bottom: 30px;
            align-items: flex-start;
        }

        .product-image-container {
            flex: 0 0 360px; 
            width: 360px;
            height: 360px;
            border-radius: 16px;
            overflow: hidden;
            background-color: #F1F3F5;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            font-size: 0.9rem;
            position: relative;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0; left: 0;
        }
        
        .product-image[src="none"], .product-image[src=""] {
            display: none; 
        }

        .product-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-top: 8px;
        }

        .badge-group {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .category-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .tag-hot { background-color: #FFF0F0; color: #FF4B4B; }
        .tag-official { background-color: #E8F2FF; color: #007AFF; }
        .tag-study { background-color: var(--color-study); color: #2E7D32; }
        .tag-food { background-color: #FFF8E1; color: #F57F17; }
        .tag-living { background-color: var(--color-living); color: #1565C0; }
        .tag-etc { background-color: var(--color-etc); color: #6A1B9A; }

        .title {
            font-size: 1.75rem; 
            font-weight: 700;
            line-height: 1.3;
            color: var(--text-primary);
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .price-box {
            margin-bottom: 24px;
            padding: 20px;
            background-color: var(--bg-color); 
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .original-price-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .n-pay-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .n-pay-label {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .n-pay-price {
            font-size: 1.8rem; 
            font-weight: 800;
            color: var(--ku-crimson);
            letter-spacing: -0.5px;
        }

        .n-pay-price span {
            font-size: 0.95rem;
            color: var(--text-tertiary);
            font-weight: 400;
            margin-left: 2px;
        }

        .progress-section {
            margin-bottom: 28px;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .status-label {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .status-count {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .status-count strong {
            color: var(--ku-crimson);
            font-weight: 700;
            font-size: 1rem;
        }

        .progress-bar-container {
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-bar-bg {
            flex: 1;
            height: 10px; 
            background-color: var(--border-color);
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--ku-crimson); 
            border-radius: 5px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            width: 0%; /* 초기값 */
        }
        
        .progress-percent {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--ku-crimson);
            width: 35px;
            text-align: right;
        }

        .deadline-text {
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--text-tertiary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .join-btn {
            margin-top: auto;
            width: 100%;
            background: var(--ku-crimson); 
            color: white;
            border: none;
            padding: 18px; 
            font-size: 1.05rem; 
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(138, 21, 56, 0.2);
        }

        .join-btn:hover {
            background-color: #72112e; 
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(138, 21, 56, 0.25);
        }

        /* ==========================================
           호스트 정보 및 상세 설명
           ========================================== */
        .details-section {
            padding: 40px;
        }

        .host-info-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            background: var(--bg-color);
            border-radius: 14px;
            margin-bottom: 32px;
            border: 1px solid var(--border-color);
        }

        .host-avatar {
            width: 48px;
            height: 48px;
            background-color: #EAECEF; 
            color: var(--text-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .host-details {
            flex: 1;
        }

        .host-name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .host-name {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-primary);
        }
        
        .host-dept {
            font-size: 0.85rem;
            color: var(--text-tertiary);
        }

        .host-trust-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #83485a;
            font-weight: 600;
        }

        .content-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 18px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            letter-spacing: -0.3px;
        }

        .content-body {
            font-size: 0.98rem; 
            line-height: 1.8; 
            color: var(--text-secondary);
            white-space: pre-line;
            letter-spacing: -0.1px;
        }

    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container">
        <section class="product-hero card">
            <div class="product-image-container">
                <span>이미지 준비중</span>
                <img src="" alt="상품 이미지" class="product-image" id="product-img">
            </div>
            
            <div class="product-info">
                <div class="badge-group">
                    <span class="category-badge tag-hot" id="badge-hot" style="display:none;">🔥 마감임박</span>
                    <span class="category-badge tag-official">✓ 신뢰도 인증</span>
                    <span class="category-badge" id="product-category">카테고리 불러오는 중...</span>
                </div>
                
                <h1 class="title" id="product-title">데이터를 불러오는 중입니다...</h1>
                
                <div class="price-box">
                    <div class="n-pay-row">
                        <span class="n-pay-label">공구 참여가 (인당)</span>
                        <div class="n-pay-price" id="product-price">0원 <span id="product-target-count">(0명 기준)</span></div>
                    </div>
                </div>

                <div class="progress-section">
                    <div class="status-header">
                        <span class="status-label">모집 현황</span>
                        <span class="status-count" id="status-count-text">현재 <strong>0명</strong> / 목표 0명</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-bg">
                            <div class="progress-fill" id="progress-fill" style="width: 0%;"></div> 
                        </div>
                        <div class="progress-percent" id="progress-percent">0%</div>
                    </div>
                    <div class="deadline-text" id="deadline-text">
                        <span>⏳</span> 남은 기간: -
                    </div>
                </div>

                <button class="join-btn" onclick="joinGroupBuy()">이 공구에 참여하기</button>
            </div>
        </section>

        <section class="details-section card">
            <div class="host-info-card">
                <div class="host-avatar">호</div>
                <div class="host-details">
                    <div class="host-name-row">
                        <span class="host-name" id="host-name">로딩중</span>
                        <span class="host-dept" id="host-dept">익명 학우</span>
                    </div>
                    <div class="host-trust-bar">
                        <span class="trust-icon">✓</span> 고대생 인증 완료 · 크림슨 지수 30
                    </div>
                </div>
            </div>

            <h2 class="content-title">공구 상세 내용</h2>
            <div class="content-body" id="product-description">
                데이터를 불러오는 중입니다...
            </div>
        </section>
    </div>

    <script>
        // ==========================================
        // 1. 헤더 및 로그인 스크립트
        // ==========================================
        fetch('header.html')
            .then(res => {
                if (!res.ok) throw new Error('header.html 파일을 찾을 수 없습니다.');
                return res.text();
            })
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                updateHeader(); 
            })
            .catch(err => console.error(err));

        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const authButtons = document.querySelectorAll('.auth-only');
            const guestButtons = document.querySelectorAll('.guest-only');

            if (isLoggedIn) {
                authButtons.forEach(btn => btn.style.display = 'inline-block');
                guestButtons.forEach(btn => btn.style.display = 'none');
            } else {
                authButtons.forEach(btn => btn.style.display = 'none');
                guestButtons.forEach(btn => btn.style.display = 'inline-block');
            }
        }

        document.addEventListener('click', function(e) {
            if(e.target && e.target.id === 'logout-btn') {
                localStorage.removeItem('isLoggedIn');
                alert('로그아웃 되었습니다.');
                location.href = 'main_login.html'; 
            }
        });

        function joinGroupBuy() {
            localStorage.setItem('isLoggedIn', 'true'); 
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            
            if(!isLoggedIn) {
                alert("로그인이 필요한 서비스입니다. 로그인 페이지로 이동합니다.");
                location.href = "login.html"; 
            } else {
                if(confirm("정말로 이 공동구매에 참여하시겠습니까?\n참여 후 취소는 어려울 수 있습니다.")) {
                    
                // 👉 여기서부터 추가된 부분: 참여한 상품 ID를 기억해둡니다!
                const urlParams = new URLSearchParams(window.location.search);
                const currentId = urlParams.get('id');
                    
                let joinedGroups = JSON.parse(localStorage.getItem('joinedGroups') || '[]');
                if(currentId && !joinedGroups.includes(currentId)) {
                    joinedGroups.push(currentId);
                    localStorage.setItem('joinedGroups', JSON.stringify(joinedGroups));
                }
                // 👉 추가된 부분 끝
                    
                alert("참여가 완료되었습니다! 호스트와의 채팅방으로 이동합니다.");
                location.href = `chat.html?id=${currentId}`;
            }
        }
    }

        // ==========================================
        // 2. 상품 데이터 동적 로드 스크립트
        // ==========================================
        document.addEventListener('DOMContentLoaded', async () => {
            // URL에서 상품 ID 가져오기 (예: product.html?id=1)
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!productId) {
                alert('잘못된 접근입니다. 상품 ID가 없습니다.');
                return;
            }

            try {
                // main_login.html과 동일한 json-server 사용 가정
                // json-server를 안 쓰신다면 'products.json'으로 경로를 수정하세요.
                const response = await fetch('http://localhost:3000/products');
                const products = await response.json();
                
                // ID에 맞는 상품 찾기
                const product = products.find(p => p.id == productId);

                if (!product) {
                    alert('해당 상품을 찾을 수 없습니다.');
                    return;
                }

                // 이미지 업데이트
                const imgEl = document.getElementById('product-img');
                if (product.imageUrl) {
                    imgEl.src = product.imageUrl;
                    imgEl.style.display = 'block'; // 이미지가 있을 때만 노출
                }

                // 카테고리 태그 및 색상 설정
                const categoryEl = document.getElementById('product-category');
                categoryEl.innerText = product.category;
                categoryEl.className = 'category-badge'; // 기본 클래스 초기화
                
                if (product.category.includes('식재료')) categoryEl.classList.add('tag-food');
                else if (product.category.includes('전공') || product.category.includes('스터디')) categoryEl.classList.add('tag-study');
                else if (product.category.includes('생필품') || product.category.includes('의류')) categoryEl.classList.add('tag-living');
                else categoryEl.classList.add('tag-etc');

                // 마감 임박 태그 띄우기 (목표 인원에 1명 남았을 경우)
                if (product.targetCount - product.currentCount === 1) {
                    document.getElementById('badge-hot').style.display = 'inline-block';
                }

                // 제목 업데이트
                document.getElementById('product-title').innerText = product.title;
                // 작성자 업데이트
                document.getElementById('host-name').innerText =
                    product.writer || '익명 학우';

                document.getElementById('host-dept').innerText =
                    '작성자';

                // 가격 업데이트
                document.getElementById('product-price').innerHTML = `${product.price.toLocaleString()}원 <span>(${product.targetCount}명 기준)</span>`;

                // 모집 현황 업데이트
                document.getElementById('status-count-text').innerHTML = `현재 <strong>${product.currentCount}명</strong> / 목표 ${product.targetCount}명`;
                
                // 프로그래스바 게이지 계산 (최대 100%)
                const percent = Math.min(Math.round((product.currentCount / product.targetCount) * 100), 100);
                setTimeout(() => {
                    // 애니메이션 효과를 위해 약간의 딜레이 후 넓이 적용
                    document.getElementById('progress-fill').style.width = `${percent}%`;
                }, 100);
                document.getElementById('progress-percent').innerText = `${percent}%`;

                // 마감일(duration) 업데이트
                document.getElementById('deadline-text').innerHTML = `<span>⏳</span> 남은 기간: ${product.duration}`;

                // 상세 설명 (Location과 Description 결합)
                const descHtml = `
                    📌 <strong>수령 장소</strong>: ${product.location}<br>
                    📌 <strong>남은 기간</strong>: ${product.duration}<br><br>
                    ${product.description.replace(/\n/g, '<br>')}
                `;
                document.getElementById('product-description').innerHTML = descHtml;

            } catch (error) {
                console.error('상품 데이터를 불러오는 중 오류 발생:', error);
                document.getElementById('product-title').innerText = "데이터를 불러오는 데 실패했습니다.";
                document.getElementById('product-description').innerText = "서버가 켜져 있는지 확인해주세요 (json-server).";
            }
        });
    </script>
    <script>
document.addEventListener('DOMContentLoaded', async () => {
    // 1. 초기 설정 및 유저 정보 가져오기
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    const currentUserId = localStorage.getItem('userId'); // 내 ID
    const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';

    if (!productId) {
        alert('상품 ID가 없습니다.');
        location.href = 'product_list.html';
        return;
    }

    // 헤더 불러오기 (기존 로직 유지)
    fetch('header.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
            if(typeof updateHeader === 'function') updateHeader();
        });

    try {
        // 2. 서버에서 상품 상세 데이터 가져오기
        // 주의: 서버에서 응답 줄 때 참여자 명단(members)이 포함되어야 합니다.
        const response = await fetch(`http://localhost:3000/products/${productId}`);
        const product = await response.json();

        if (!response.ok) throw new Error('상품 정보를 불러오지 못했습니다.');

        // 3. 공통 데이터 렌더링 (제목, 가격, 인원 등)
        renderProductInfo(product);

        // 4. 권한별 버튼 및 리스트 생성
        const infoArea = document.querySelector('.product-info');
        const detailArea = document.querySelector('.details-section');

        // 👉 [중요] 작성자인지 확인 (서버의 user_id와 내 userId 비교)
        const isHost = String(product.user_id) === String(currentUserId);

        if (isHost) {
            // A. 작성자(방장)일 때
            renderHostUI(infoArea, detailArea, product);
        } else {
            // B. 참여자(학우)일 때
            renderGuestUI(infoArea, product, currentUserId);
        }

    } catch (error) {
        console.error(error);
        alert('데이터를 불러오는데 실패했습니다.');
    }
});

// --- UI 렌더링 함수들 ---

function renderProductInfo(product) {
    document.getElementById('product-title').innerText = product.title;
    document.getElementById('product-price').innerHTML = `${Number(product.price).toLocaleString()}원 <span>(${product.targetCount}명 기준)</span>`;
    document.getElementById('status-count-text').innerHTML = `현재 <strong>${product.currentCount}명</strong> / 목표 ${product.targetCount}명`;
    document.getElementById('product-description').innerHTML = product.description.replace(/\n/g, '<br>');
    
    const percent = Math.min(Math.round((product.currentCount / product.targetCount) * 100), 100);
    document.getElementById('progress-fill').style.width = `${percent}%`;
    document.getElementById('progress-percent').innerText = `${percent}%`;
    
    if (product.imageUrl) document.getElementById('product-img').src = product.imageUrl;
}

// [방장 전용 화면]
function renderHostUI(infoArea, detailArea, product) {
    // 1. 참여하기 버튼을 관리 버튼으로 교체
    const joinBtn = infoArea.querySelector('.join-btn');
    joinBtn.outerHTML = `
        <div style="display:flex; gap:10px;">
            <button class="join-btn" style="background:#444;" onclick="deleteProduct('${product.id}')">공구방 삭제</button>
            <button class="join-btn" onclick="location.href='edit.html?id=${product.id}'">수정하기</button>
        </div>
    `;

    // 2. 참여자 명단 및 노쇼 체크 리스트 추가
    const memberSection = `
        <div class="member-list card" style="margin-top:20px; padding:20px;">
            <h3>👥 참여자 관리 (방장 전용)</h3>
            <div id="member-items">
                ${(product.members || []).map(m => `
                    <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee;">
                        <span>${m.nickname} 학우</span>
                        <div>
                            <button onclick="markStatus('${m.id}', 'success')" style="color:blue; border:none; background:none;">확인</button>
                            <button onclick="markStatus('${m.id}', 'noshow')" style="color:red; border:none; background:none;">노쇼</button>
                        </div>
                    </div>
                `).join('') || '<p style="color:#999;">아직 참여자가 없습니다.</p>'}
            </div>
        </div>
    `;
    detailArea.insertAdjacentHTML('beforeend', memberSection);
}

// [참여자 전용 화면]
function renderGuestUI(infoArea, product, currentUserId) {
    const joinBtn = infoArea.querySelector('.join-btn');
    
    // 이미 참여했는지 확인
    const joinedGroups = JSON.parse(localStorage.getItem('joinedGroups') || '[]');
    const isAlreadyJoined = joinedGroups.includes(String(product.id));

    if (isAlreadyJoined) {
        joinBtn.innerText = "참여 완료 (채팅방 가기)";
        joinBtn.style.background = "#ce152d"; // 고대색
        joinBtn.onclick = () => location.href = `chat.html?id=${product.id}`;

        // 취소 및 신고 버튼 추가
        infoArea.insertAdjacentHTML('beforeend', `
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="leaveGroup('${product.id}')" style="flex:1; padding:8px; border:none; border-radius:5px;">참여 취소</button>
                <button onclick="reportHost()" style="flex:1; padding:8px; border:1px solid #ddd; background:none; border-radius:5px; color:#999;">신고하기</button>
            </div>
        `);
    }
}
