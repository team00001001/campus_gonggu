<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 상세 | KU GONGGU</title>

    <link rel="stylesheet" href="product.css" media="(min-width: 769px)">
    <link rel="stylesheet" href="mobile.css" media="(max-width: 768px)">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="header-placeholder"></div>

    <div class="container">
        <section class="product-hero card">
            <div class="product-image-container">
                <img src="" alt="상품 이미지" class="product-image" id="product-img">
                <div id="detail-no-image-overlay" class="detail-no-image-overlay">등록된 사진이 없습니다</div>
            </div>

            <div class="product-info">
                <div class="badge-group">
                    <span class="category-badge tag-hot" id="badge-hot" style="display:none;">🔥 마감임박</span>
                    <span class="category-badge tag-official">✓ 신뢰도 인증</span>
                    <span class="category-badge" id="product-category">카테고리 불러오는 중...</span>
                </div>

                <h1 class="title" id="product-title">데이터를 불러오는 중입니다...</h1>

                <div class="price-box">
                    <div class="n-pay-row">
                        <span class="n-pay-label">공구 참여가 (인당)</span>
                        <div class="n-pay-price" id="product-price">0원 <span id="product-target-count">(0명 기준)</span></div>
                    </div>
                </div>

                <div class="progress-section">
                    <div class="status-header">
                        <span class="status-label">모집 현황</span>
                        <span class="status-count" id="status-count-text">현재 <strong>0명</strong> / 목표 0명</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-bg">
                            <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
                        </div>
                        <div class="progress-percent" id="progress-percent">0%</div>
                    </div>
                    <div class="deadline-text" id="deadline-text">
                        <span>⏳</span> 남은 기간: -
                    </div>
                </div>

                <div id="action-button-area">
                    <button class="join-btn" onclick="joinGroupBuy()">이 공구에 참여하기</button>
                </div>
            </div>
        </section>

        <section class="details-section card">
            <div class="host-info-card">
                <div class="host-avatar">호</div>
                <div class="host-details">
                    <div class="host-name-row">
                        <span class="host-name" id="host-name">로딩중</span>
                        <span class="host-dept" id="host-dept">작성자</span>
                    </div>
                    <div class="host-trust-bar">
                        <span class="trust-icon">✓</span> 고대생 인증 완료 · 크림슨 지수 30
                    </div>
                </div>
            </div>

            <h2 class="content-title">공구 상세 내용</h2>
            <div class="content-body" id="product-description">
                데이터를 불러오는 중입니다...
            </div>
            
            <div id="member-management-area"></div>
            <div id="completion-section-area"></div>
        </section>

        <section class="delivery-section card">
            <h2 class="content-title">📦 배송 현황 조회</h2>
            <div class="tracking-input-container">
                <select id="carrier-id" class="carrier-select">
                    <option value="">택배사 선택</option>
                    <option value="04">CJ대한통운</option>
                    <option value="01">우체국택배</option>
                    <option value="05">한진택배</option>
                    <option value="08">롯데택배</option>
                    <option value="06">로젠택배</option>
                </select>
                <input type="text" id="tracking-number" class="tracking-input" placeholder="- 제외 송장번호 입력">
                <button class="track-btn" onclick="fetchTrackingInfo()">조회하기</button>
            </div>

            <div id="tracking-result" class="tracking-result-container" style="display: none;">
                <div class="tracking-header">
                    <span id="delivery-status-badge" class="delivery-badge">조회 완료</span>
                    <span id="delivery-info-text" class="delivery-info"></span>
                </div>
                <div class="timeline-container">
                    <ul class="timeline" id="timeline-list"></ul>
                </div>
            </div>
        </section>
    </div>

    <script>
        // 전역 상수 및 상태
        const API_BASE_URL = 'http://localhost:3000';
        const currentUserId = localStorage.getItem('userId');
        const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';

        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!productId) {
                alert('상품 ID가 없습니다.');
                location.href = 'main_login.html';
                return;
            }

            // 1. 헤더 로드
            loadHeader();

            try {
                // 2. 상품 및 참여자 정보 가져오기
                const [pRes, mRes] = await Promise.all([
                    fetch(`${API_BASE_URL}/products/${productId}`),
                    fetch(`${API_BASE_URL}/participants?productId=${productId}`)
                ]);

                if (!pRes.ok) throw new Error('상품 정보를 불러오지 못했습니다.');
                
                const product = await pRes.json();
                product.members = mRes.ok ? await mRes.json() : [];

                // 3. UI 렌더링 시작
                renderProductBasicInfo(product);
                renderUserSpecificUI(product);
                initDeliveryTracking(productId, currentUserId);

            } catch (error) {
                console.error(error);
                document.getElementById('product-title').innerText = "데이터 로딩 실패";
            }
        });

        // --- 공통 데이터 렌더링 (참여자든 아니든 무조건 보임) ---
        function renderProductBasicInfo(product) {
            document.getElementById('product-title').innerText = product.title;
            document.getElementById('host-name').innerText = product.writer || '익명 학우';
            
            // 카테고리 배지 업데이트 (이모티콘 및 컬러 적용)
            const categoryMap = {
                '식재료 / 배달': { emoji: '🍊', className: 'tag-food' },
                '자취 / 생필품': { emoji: '🧴', className: 'tag-living' },
                '전공 / 문구': { emoji: '📚', className: 'tag-study' },
                '기타 물품': { emoji: '📦', className: 'tag-etc' }
            };
            const catInfo = categoryMap[product.category] || { emoji: '📦', className: 'tag-etc' };
            const catBadge = document.getElementById('product-category');
            catBadge.innerText = `${catInfo.emoji} ${product.category}`;
            catBadge.className = `category-badge ${catInfo.className}`;

            document.getElementById('product-price').innerHTML = `${Number(product.price).toLocaleString()}원 <span>(${product.targetCount}명 기준)</span>`;
            document.getElementById('status-count-text').innerHTML = `현재 <strong>${product.currentCount}명</strong> / 목표 ${product.targetCount}명`;

            // 프로그래스바
            const percent = Math.min(Math.round((product.currentCount / product.targetCount) * 100), 100);
            document.getElementById('progress-fill').style.width = `${percent}%`;
            document.getElementById('progress-percent').innerText = `${percent}%`;

            // 이미지 처리 (기본 이미지 매핑)
            const defaultImages = {
                '식재료 / 배달': 'images/default-food.png',
                '자취 / 생필품': 'images/default-living.png',
                '전공 / 문구': 'images/default-study.png',
                '기타 물품': 'images/default-etc.png'
            };

            const imgEl = document.getElementById('product-img');
            
            // 1. 방어 로직: DB에서 넘어온 값이 문자열 "null", "undefined", 공백인지 깐깐하게 체크
            const isValidImageUrl = product.imageUrl && 
                                product.imageUrl !== 'none' && 
                                product.imageUrl !== 'null' && 
                                product.imageUrl !== 'undefined' && 
                                product.imageUrl.trim() !== '';

            if (isValidImageUrl) {
                imgEl.src = product.imageUrl;
                document.getElementById('detail-no-image-overlay').style.display = 'none';
                
                // 2. 방어 로직: URL은 정상인 것 같아서 시도했는데, 막상 이미지가 깨져있을 경우 (onerror)
                imgEl.onerror = function() {
                    imgEl.src = defaultImages[product.category] || defaultImages['기타 물품'];
                    // 무한 루프 방지를 위해 onerror 핸들러 초기화
                    imgEl.onerror = null; 
                };
            } else {
                imgEl.src = defaultImages[product.category] || defaultImages['기타 물품'];
                document.getElementById('detail-no-image-overlay').style.display = 'none';
            }

            // [핵심] 수령 장소 및 마감 일시는 여기서 무조건 렌더링 (누구에게나 보임)
            const staticDate = formatStatic(product.duration);
            
            // CSS에서 분리한 클래스를 사용하여 렌더링
            const descHtml = `
                <div class="product-meta-info">
                    📍 <strong>수령 장소</strong>: ${product.location}<br>
                    ⏰ <strong>마감 일시</strong>: ${staticDate}
                </div>
                ${product.description.replace(/\n/g, '<br>')}
            `;
            document.getElementById('product-description').innerHTML = descHtml;

            // 타이머 작동
            startTimer(product.duration);
        }

        // --- 권한별(방장/참여자/비참여자) UI 렌더링 ---
        function renderUserSpecificUI(product) {
            const actionArea = document.getElementById('action-button-area');
            const isHost = String(product.user_id) === String(currentUserId);
            const myInfo = product.members.find(m => String(m.user_id) === String(currentUserId));
            const isParticipant = !!myInfo;

            if (isHost) {
                // [방장 UI]
                actionArea.innerHTML = `
                    <div style="display:flex; flex-direction:column; gap:10px;">
                        <button class="join-btn" style="background-color: #ce152d;" onclick="location.href='direct_chattings.html?id=${product.id}'">💬 채팅방 들어가기 (방장)</button>
                        <div style="display:flex; gap:10px;">
                            <button class="join-btn" style="background:#444; flex:1; font-size: 14px;" onclick="deleteProduct('${product.id}')">공구방 삭제</button>
                            <button class="join-btn" style="background:#666; flex:1; font-size: 14px;" onclick="location.href='edit.html?id=${product.id}'">내용 수정</button>
                        </div>
                    </div>
                `;
                renderHostMemberManagement(product);
            } else if (isParticipant) {
                // [참여자 UI]
                actionArea.innerHTML = `
                    <div style="display:flex; flex-direction:column; gap:10px;">
                        <button class="join-btn" style="background-color: #ce152d;" onclick="location.href='direct_chattings.html?id=${product.id}'">💬 채팅방 가기 (참여중)</button>
                        <div style="display:flex; gap:10px;">
                            <button class="join-btn" style="background:#eee; color:#666; flex:1; font-size: 14px;" onclick="leaveGroup('${product.id}')">참여 취소</button>
                            <button class="join-btn" style="background:none; border:1px solid #ddd; color:#999; flex:1; font-size: 14px;" onclick="reportHost()">신고하기</button>
                        </div>
                    </div>
                `;
            }

            // 거래 인증 섹션 렌더링 (인원 충족 혹은 기간 만료 시)
            renderCompletionSection(product, isHost, myInfo);
        }

        // --- 방장 전용 참여자 관리 리스트 ---
        function renderHostMemberManagement(product) {
            const mgmtArea = document.getElementById('member-management-area');
            const validMembers = product.members.filter(m => m.status !== 'noshow');

            let html = `
                <div class="member-list card" style="margin-top:30px; padding:20px; border:1px solid #eee;">
                    <h3 style="margin-bottom:15px;">👥 참여자 관리 (방장 전용)</h3>
                    <div id="member-items">
            `;

            if (validMembers.length === 0) {
                html += `<p style="color:#999;">아직 참여자가 없습니다.</p>`;
            } else {
                validMembers.forEach(m => {
                    const isConfirmed = m.status === 'confirmed';
                    html += `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #f5f5f5;">
                            <span><strong>${m.nickname}</strong> 학우</span>
                            <div>
                                ${isConfirmed ? 
                                    '<span style="color:#28a745; font-weight:bold;">✅ 확인 완료</span>' : 
                                    `<button onclick="markStatus(${m.participant_id}, ${m.user_id}, 'confirmed')" style="color:#007bff; border:1px solid #007bff; background:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:13px; font-weight:bold;">확인</button>
                                    <button onclick="markStatus(${m.participant_id}, ${m.user_id}, 'noshow')" style="color:#dc3545; border:1px solid #dc3545; background:none; padding:4px 8px; border-radius:4px; margin-left:5px; cursor:pointer; font-size:13px; font-weight:bold;">노쇼</button>`
                                }
                            </div>
                        </div>
                    `;
                });
            }
            html += `</div></div>`;
            mgmtArea.innerHTML = html;
        }

        // --- 거래 완료 인증 섹션 ---
        function renderCompletionSection(product, isHost, myParticipantInfo) {
            const sectionArea = document.getElementById('completion-section-area');
            const now = Math.floor(Date.now() / 1000);
            const isFull = parseInt(product.currentCount) >= parseInt(product.targetCount);
            const isExpired = Number(product.duration) <= now;

            // 조건: 꽉 찼거나 만료되었을 때 + (방장이거나 참여자일 때)
            if (!(isFull || isExpired)) return;
            if (!isHost && !myParticipantInfo) return;

            const confirmedCount = product.members.filter(m => m.is_received == 1 || m.status === 'confirmed').length;
            const hasUncheckedMembers = product.members.some(m => m.status === 'joined');

            let btnHtml = '';
            if (isHost) {
                if (hasUncheckedMembers) {
                    btnHtml = `<button class="join-btn" style="background-color: #ccc; cursor: not-allowed;" disabled>⚠️ 참여자 관리 리스트에서 모두 '확인'을 눌러주세요</button>`;
                } else {
                    btnHtml = `<button class="join-btn" onclick="hostCloseProduct('${product.id}')">공구 최종 완료 및 방 닫기 (방장)</button>`;
                }
            } else if (myParticipantInfo) {
                if (myParticipantInfo.status === 'noshow') {
                    btnHtml = `<button class="join-btn" style="background-color: #ccc;" disabled>방장에 의해 노쇼 처리되었습니다</button>`;
                } else if (myParticipantInfo.is_received == 1) {
                    btnHtml = `<button class="join-btn" style="background-color: #28a745;" disabled>✅ 수령 확인 완료</button>`;
                } else {
                    btnHtml = `<button class="join-btn" onclick="guestReceiveItem('${product.id}')">📦 물건 수령 확인</button>`;
                }
            }

            sectionArea.innerHTML = `
                <div class="completion-card" style="margin-top:20px; border: 2px solid #ce152d; padding:20px; border-radius:10px; background-color: #fff;">
                    <h4 style="color:#ce152d; margin-top:0;">✅ 수령 및 거래 완료 인증</h4>
                    <p style="font-size: 0.9rem; color: #666; margin-bottom: 10px;">모집이 종료되어 거래 인증 단계가 시작되었습니다.</p>
                    <div style="margin: 10px 0; font-weight: bold; font-size: 1.1rem;">
                        현재 수령 확인 인원: <span style="color:#ce152d;">${confirmedCount}</span> / ${product.currentCount}명
                    </div>
                    ${btnHtml}
                </div>
            `;
        }

        // --- 액션 함수들 ---

        // 방장: 확인/노쇼 처리
        async function markStatus(pId, uId, status) {
            const confirmMsg = status === 'noshow' 
                ? "정말로 이 학우를 '노쇼' 처리하시겠습니까?\n(인원수가 줄어들며, 해당 학우는 방에서 나가집니다.)" 
                : "해당 학우가 물건을 전달받은 것을 확인하셨습니까?";
            
            if (!confirm(confirmMsg)) return;

            try {
                const res = await fetch(`${API_BASE_URL}/participants/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ participantId: pId, userId: uId, status: status, productId: new URLSearchParams(window.location.search).get('id') })
                });

                if (res.ok) {
                    alert(status === 'noshow' ? "노쇼 처리가 완료되었습니다." : "확인 처리가 완료되었습니다.");
                    location.reload();
                } else {
                    const err = await res.json();
                    alert(err.message || "처리 실패");
                }
            } catch (e) {
                alert("서버 연결 실패");
            }
        }

        // 참여자: 수령 확인
        async function guestReceiveItem(productId) {
            if (!confirm("물건을 확실히 수령하셨나요?\n확인 후에는 취소가 불가능하며 신뢰도가 반영됩니다.")) return;

            try {
                const res = await fetch(`${API_BASE_URL}/participants/receive`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId, userId: currentUserId })
                });

                if (res.ok) {
                    const result = await res.json();
                    alert(result.isSuccess ? "🎉 전원 수령 완료! 신뢰도가 상승했습니다." : "✅ 수령 확인이 등록되었습니다.");
                    location.reload();
                }
            } catch (e) { alert("서버 연결 실패"); }
        }

        // 공구 참여
        async function joinGroupBuy() {
            if (!isLoggedIn) { alert('로그인이 필요합니다.'); location.href='login.html'; return; }
            const productId = new URLSearchParams(window.location.search).get('id');
            if (!confirm('이 공동구매에 참여하시겠습니까?')) return;

            try {
                const res = await fetch(`${API_BASE_URL}/participants/join`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId, userId: currentUserId })
                });
                if (res.ok) {
                    let joined = JSON.parse(localStorage.getItem('joinedGroups') || '[]');
                    if (!joined.includes(productId)) joined.push(productId);
                    localStorage.setItem('joinedGroups', JSON.stringify(joined));
                    alert('참여 완료!');
                    location.reload();
                } else {
                    const err = await res.json();
                    alert(err.message || "참여 실패");
                }
            } catch (e) { alert("서버 오류"); }
        }

        // 공구 참여 취소
        async function leaveGroup(productId) {
            if (!confirm("정말로 이 공구 참여를 취소하시겠습니까?")) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/participants/cancel`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        productId: productId,
                        userId: currentUserId
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    alert(result.message || '참여 취소 실패');
                    return;
                }

                alert("참여가 취소되었습니다.");
                
                // 로컬 스토리지에 저장된 참여 목록에서도 제거 (메인화면 상태 동기화용)
                let joined = JSON.parse(localStorage.getItem('joinedGroups') || '[]');
                joined = joined.filter(id => id !== productId);
                localStorage.setItem('joinedGroups', JSON.stringify(joined));

                // 새로고침하여 바뀐 상태(비참여자 UI) 반영
                location.reload();

            } catch (error) {
                console.error(error);
                alert("서버 연결 실패");
            }
        }

        // 호스트(방장) 신고하기
        async function reportHost() {
            if (!isLoggedIn) { 
                alert('로그인이 필요한 서비스입니다.'); 
                location.href = 'login.html'; 
                return; 
            }

            const productId = new URLSearchParams(window.location.search).get('id');
            const reason = prompt("신고 사유를 입력해주세요.\n(허위 신고 시 서비스 이용에 제한이 있을 수 있습니다.)");

            if (reason === null) return; // 취소 버튼 클릭 시
            if (reason.trim() === "") {
                alert("신고 사유를 입력해야 합니다.");
                return;
            }

            if (!confirm("정말로 이 공구를 신고하시겠습니까?")) return;

            try {
                const res = await fetch(`${API_BASE_URL}/reports`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        productId: productId,
                        reporterId: currentUserId,
                        reason: reason,
                        timestamp: new Date().toISOString()
                    })
                });

                if (res.ok) {
                    alert("신고가 정상적으로 접수되었습니다. 운영진 확인 후 조치될 예정입니다.");
                } else {
                    const err = await res.json();
                    alert(err.message || "신고 접수에 실패했습니다.");
                }
            } catch (e) {
                console.error(e);
                alert("서버 연결 실패");
            }
        }

        // --- 기타 유틸리티 ---
        function loadHeader() {
            fetch('header.html').then(res => res.text()).then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                updateHeader();
            });
        }

        function updateHeader() {
            const authButtons = document.querySelectorAll('.auth-only');
            const guestButtons = document.querySelectorAll('.guest-only');
            if (isLoggedIn) {
                authButtons.forEach(btn => btn.style.display = 'inline-block');
                guestButtons.forEach(btn => btn.style.display = 'none');
            } else {
                authButtons.forEach(btn => btn.style.display = 'none');
                guestButtons.forEach(btn => btn.style.display = 'inline-block');
            }
        }

        function formatStatic(expireAt) {
            const date = new Date(Number(expireAt) * 1000);
            if (isNaN(date.getTime())) return "정보 없음";
            return `${date.getMonth() + 1}월 ${date.getDate()}일 ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}까지`;
        }

        function startTimer(expireAt) {
            const el = document.getElementById('deadline-text');
            const timer = setInterval(() => {
                const now = Math.floor(Date.now() / 1000);
                const diff = Number(expireAt) - now;
                if (diff <= 0) {
                    el.innerHTML = `<span>⏳</span> 남은 기간: <strong style="color:#ce152d;">모집 마감</strong>`;
                    clearInterval(timer);
                    return;
                }
                const d = Math.floor(diff / 86400);
                const h = Math.floor((diff % 86400) / 3600);
                const m = Math.floor((diff % 3600) / 60);
                const s = diff % 60;
                let text = d > 0 ? `${d}일 ${h}시간` : h > 0 ? `${h}시간 ${m}분` : `${m}분 ${s}초`;
                el.innerHTML = `<span>⏳</span> 남은 기간: <strong>${text} 남음</strong>`;
            }, 1000);
        }

        // 배송 및 삭제 등 나머지 함수들은 기존 로직과 동일하게 유지...
        async function deleteProduct(id) {
            if (confirm("정말로 삭제하시겠습니까? 참여자들에게 알림이 전송됩니다.")) {
                await fetch(`${API_BASE_URL}/products/${id}`, { method: 'DELETE' });
                location.href = 'main_login.html';
            }
        }
        
        async function hostCloseProduct(productId) {
            if (!confirm("모든 거래가 완료되었나요? 공구방을 최종 폐쇄합니다.")) return;
            const res = await fetch(`${API_BASE_URL}/products/close`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ productId })
            });
            if (res.ok) { alert("공구가 성공적으로 종료되었습니다."); location.href = 'main_login.html'; }
        }

        async function initDeliveryTracking(productId, userId) {
            try {
                const res = await fetch(`${API_BASE_URL}/delivery/info/${productId}?userId=${userId}`);
                const dbData = await res.json();
                if (!dbData.isParticipant) { document.querySelector('.delivery-section').style.display = 'none'; return; }
                if (dbData.exists) {
                    document.querySelector('.tracking-input-container').style.display = 'none';
                    autoFetchTrackingInfo(dbData.data.carrier_id, dbData.data.tracking_number);
                }
            } catch (e) {}
        }
        
        async function autoFetchTrackingInfo(cId, tNum) {
            const res = await fetch(`${API_BASE_URL}/delivery/tracking?carrierId=${cId}&trackId=${tNum}`);
            const data = await res.json();
            if (data.trackingDetails) renderTimeline(getCarrierName(cId), tNum, data.trackingDetails.map(d => ({time: d.timeString, location: d.where, status: d.kind, details: d.telno})));
        }

        function renderTimeline(name, num, list) {
            const resCon = document.getElementById('tracking-result');
            document.getElementById('delivery-info-text').innerText = `${name} [${num}]`;
            const listEl = document.getElementById('timeline-list');
            listEl.innerHTML = list.map((item, i) => `
                <li class="timeline-item ${i === list.length-1 ? 'active' : ''}">
                    <div class="timeline-dot"></div>
                    <span class="timeline-time">${item.time}</span>
                    <div class="timeline-content"><strong>[${item.status}]</strong> ${item.location}</div>
                </li>`).reverse().join('');
            resCon.style.display = 'block';
        }
        function getCarrierName(code) { return { '04': 'CJ대한통운', '01': '우체국택배', '05': '한진택배', '08': '롯데택배', '06': '로젠택배' }[code] || '택배'; }
    </script>
</body>
