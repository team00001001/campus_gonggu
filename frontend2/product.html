<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 상세 | KUgether</title>

    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/product.css">
    <link rel="stylesheet" href="css_mobile/product_mobile.css" media="(max-width: 768px)">
</head>

<body>
    <div id="header-placeholder"></div>

    <div class="container">
        <section class="product-hero card">
            <div class="product-image-container">
                <img src="" alt="상품 이미지" class="product-image" id="product-img">
                <div id="detail-no-image-overlay" class="detail-no-image-overlay">등록된 사진이 없습니다</div>
            </div>

            <div class="product-info">
                <div class="badge-group">
                    <span class="category-badge tag-hot" id="badge-hot" style="display:none;">🔥 마감임박</span>
                    <span class="category-badge tag-official">✓ 신뢰도 인증</span>
                    <span class="category-badge" id="product-category">카테고리 불러오는 중...</span>
                </div>

                <h1 class="title" id="product-title">데이터를 불러오는 중입니다...</h1>

                <div class="price-box">
                    <div class="n-pay-row">
                        <span class="n-pay-label">공구 참여가 (인당)</span>
                        <div class="n-pay-price" id="product-price">0원 <span id="product-target-count">(0명 기준)</span>
                        </div>
                    </div>
                </div>

                <div class="progress-section">
                    <div class="status-header">
                        <span class="status-label">모집 현황</span>
                        <span class="status-count" id="status-count-text">현재 <strong>0명</strong> / 목표 0명</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-bg">
                            <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
                        </div>
                        <div class="progress-percent" id="progress-percent">0%</div>
                    </div>
                    <div class="deadline-text" id="deadline-text">
                        <span>⏳</span> 남은 기간: -
                    </div>
                </div>

                <div id="action-button-area">
                    <button class="join-btn" onclick="joinGroupBuy()">이 공구에 참여하기</button>
                </div>
            </div>
        </section>
        

        <section class="details-section card">
            <div class="host-info-card">
                <div class="host-avatar" id="host-avatar-icon" style="display:flex; align-items:center; justify-content:center; background:#fff; box-shadow:0 2px 6px rgba(0,0,0,0.1); font-size:1.6rem;">호</div>
                <div class="host-details">
                    <div class="host-name-row">
                        <span class="host-name" id="host-name" style="cursor:pointer; text-decoration:underline; text-underline-offset:3px;" onclick="goToHostProfile()">로딩중</span>
                        <span class="host-dept" id="host-dept">작성자</span>
                    </div>
                    <div class="host-trust-bar">
                        <span class="trust-icon">✓</span> 고대생 인증 완료 · <span id="trust-score-container">크림슨 지수 <span id="host-trust-score">-</span></span>
                    </div>
                </div>
            </div>

            <h2 class="content-title">공구 상세 내용</h2>
            <div class="content-body" id="product-description">
                데이터를 불러오는 중입니다...
            </div>

            <div id="member-management-area"></div>
            <div id="completion-section-area"></div>
        </section>

        <section class="delivery-section card">
            <h2 class="content-title">📦 배송 현황 조회</h2>
            <div class="tracking-input-container">
                <select id="carrier-id" class="carrier-select">
                    <option value="">택배사 선택</option>
                    <option value="04">CJ대한통운</option>
                    <option value="01">우체국택배</option>
                    <option value="05">한진택배</option>
                    <option value="08">롯데택배</option>
                    <option value="06">로젠택배</option>
                </select>
                <input type="text" id="tracking-number" class="tracking-input" placeholder="- 제외 송장번호 입력">
                <button class="track-btn" onclick="fetchTrackingInfo()">조회하기</button>
            </div>
            <div id="tracking-guest-msg" style="display:none; padding: 14px 0; color: #888; font-size: 0.92rem; text-align: center;">
                🚚 방장이 송장번호를 등록하면 배송 현황을 확인할 수 있습니다.
            </div>

            <div id="tracking-result" class="tracking-result-container" style="display: none;">
                <div class="tracking-header">
                    <span id="delivery-status-badge" class="delivery-badge">조회 완료</span>
                    <span id="delivery-info-text" class="delivery-info"></span>
                </div>
                <div class="timeline-container">
                    <ul class="timeline" id="timeline-list"></ul>
                </div>
            </div>
        </section>
    </div>

    <script>
        // 전역 상수 및 상태
        const API_BASE_URL = 'https://campusgonggu-production.up.railway.app';
        const currentUserId = localStorage.getItem('userId');
        const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
        let currentProductData = null;

        // 크림슨 지수에 따라 이모티콘을 반환하는 함수 추가
        function getGradeEmoji(score) {
            if (score >= 86) return "🏛️"; 
            if (score >= 61) return "👑"; 
            if (score >= 31) return "🐯"; 
            if (score >= 0)  return "🐱"; 
            if (score >= -30) return "🐥"; 
            if (score >= -70) return "🦅"; 
            return "❄️";                 
        }

        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!productId) {
                alert('상품 ID가 없습니다.');
                location.href = 'main_login.html';
                return;
            }

            // 1. 헤더 로드
            loadHeader();

            try {
                // 2. 상품 및 참여자 정보 가져오기
                const [pRes, mRes] = await Promise.all([
                    fetch(`${API_BASE_URL}/products/${productId}`),
                    fetch(`${API_BASE_URL}/participants?productId=${productId}`)
                ]);

                if (pRes.status === 404) {
                    alert('해당 상품을 찾을 수 없습니다. 삭제되었거나 존재하지 않는 공구입니다.');
                    location.href = 'main_login.html';
                    return;
                }
                if (!pRes.ok) throw new Error('상품 정보를 불러오지 못했습니다.');

                const product = await pRes.json();
                product.members = mRes.ok ? await mRes.json() : [];
                currentProductData = product;

                // 3. UI 렌더링 시작
                renderProductBasicInfo(product);
                renderUserSpecificUI(product);

                // 🚀 배송 현황 초기화 호출
                initDeliveryTracking(productId, currentUserId);

            } catch (error) {
                console.error(error);
                alert('상품 정보를 불러오는 데 실패했습니다.');
                location.href = 'main_login.html';
            }
        });

        // --- 공통 데이터 렌더링 ---
        function renderProductBasicInfo(product) {
            document.getElementById('product-title').innerText = product.title;
            document.getElementById('host-name').innerText = product.writer || '익명 학우';
            
            // 💡 크림슨 지수 이모티콘 및 색상 적용 로직
            const score = parseInt(product.writer_trust_score ?? 0);
            const gradeEmoji = getGradeEmoji(score);
            
            const avatarIcon = document.getElementById('host-avatar-icon');
            if (avatarIcon) {
                avatarIcon.textContent = gradeEmoji;
            }

            const scoreContainer = document.getElementById('trust-score-container');
            document.getElementById('host-trust-score').innerText = score;
            
            // 점수에 따른 텍스트 색상 변경 (양수: 크림슨, 음수: 파란색)
            if (score < 0) {
                scoreContainer.style.color = '#2B6CB0';
                scoreContainer.style.fontWeight = '700';
            } else {
                scoreContainer.style.color = '#8A1538';
                scoreContainer.style.fontWeight = '700';
            }

            // 카테고리 배지 업데이트
            const categoryMap = {
                '식재료 / 배달': { emoji: '🍊', className: 'tag-food' },
                '자취 / 생필품': { emoji: '🧴', className: 'tag-living' },
                '전공 / 문구': { emoji: '📚', className: 'tag-study' },
                '기타 물품': { emoji: '📦', className: 'tag-etc' }
            };
            const catInfo = categoryMap[product.category] || { emoji: '📦', className: 'tag-etc' };
            const catBadge = document.getElementById('product-category');
            catBadge.innerText = `${catInfo.emoji} ${product.category}`;
            catBadge.className = `category-badge ${catInfo.className}`;

            document.getElementById('product-price').innerHTML = `${Number(product.price).toLocaleString()}원 <span>(${product.targetCount}명 기준)</span>`;
            document.getElementById('status-count-text').innerHTML = `현재 <strong>${product.currentCount}명</strong> / 목표 ${product.targetCount}명`;

            // 프로그래스바
            const percent = Math.min(Math.round((product.currentCount / product.targetCount) * 100), 100);
            document.getElementById('progress-fill').style.width = `${percent}%`;
            document.getElementById('progress-percent').innerText = `${percent}%`;

            // 이미지 처리
            const defaultImages = {
                '식재료 / 배달': 'images/default-food.png',
                '자취 / 생필품': 'images/default-living.png',
                '전공 / 문구': 'images/default-study.png',
                '기타 물품': 'images/default-etc.png'
            };

            const imgEl = document.getElementById('product-img');
            const isValidImageUrl = product.imageUrl &&
                product.imageUrl !== 'none' &&
                product.imageUrl !== 'null' &&
                product.imageUrl !== 'undefined' &&
                product.imageUrl.trim() !== '';

            if (isValidImageUrl) {
                imgEl.src = product.imageUrl;
                document.getElementById('detail-no-image-overlay').style.display = 'none';

                imgEl.onerror = function () {
                    imgEl.src = defaultImages[product.category] || defaultImages['기타 물품'];
                    imgEl.onerror = null;
                };
            } else {
                imgEl.src = defaultImages[product.category] || defaultImages['기타 물품'];
                imgEl.style.display = 'block';
                document.getElementById('detail-no-image-overlay').style.display = 'flex';
            }

            const staticDate = formatStatic(product.duration);

            // URL 존재 여부 체크 및 추가 HTML 생성
            let extraUrlsHtml = '';
            
            const isValidProductUrl = product.productUrl && product.productUrl !== 'none' && product.productUrl !== 'null' && product.productUrl !== 'undefined' && product.productUrl.trim() !== '';
            
            if (isValidProductUrl) {
                extraUrlsHtml += `<br>🔗 <strong>상품 URL</strong>: <a href="${product.productUrl}" target="_blank" style="color: #007bff; text-decoration: underline; word-break: break-all;">${product.productUrl}</a>`;
            }


            // 상세 설명에 URL 정보 합치기
            const descHtml = `
                <div class="product-meta-info" style="margin-bottom: 20px; line-height: 1.6;">
                    📍 <strong>수령 장소</strong>: ${product.location}<br>
                    ⏰ <strong>마감 일시</strong>: ${staticDate}
                    ${extraUrlsHtml}
                </div>
                <div style="line-height: 1.5;">
                    ${escapeHtml(product.description).replace(/\n/g, '<br>')}
                </div>
            `;
            document.getElementById('product-description').innerHTML = descHtml;

            startTimer(product.duration);
        }

        // --- 권한별 UI 렌더링 ---
        function renderUserSpecificUI(product) {
            const actionArea = document.getElementById('action-button-area');
            const isHost = isLoggedIn && (String(product.user_id) === String(currentUserId));
            const myInfo = product.members.find(m => String(m.user_id) === String(currentUserId));
            const isNoshow = isLoggedIn && !!myInfo && myInfo.status === 'noshow';
            const isParticipant = isLoggedIn && !!myInfo && myInfo.status !== 'noshow';

            const now = Math.floor(Date.now() / 1000);
            const isExpired = Number(product.duration) <= now;
            const isFull = parseInt(product.currentCount) >= parseInt(product.targetCount);
            const isClosed = isExpired || isFull;

            if (isHost) {
                actionArea.innerHTML = `
                    <div style="display:flex; flex-direction:column; gap:10px;">
                        <button class="join-btn" style="background-color: var(--ku-crimson);" onclick="location.href='direct_chattings.html?id=${product.id}'">💬 채팅방 들어가기 (방장)</button>

                        ${!isClosed ? `
                        <div style="display:flex; gap:10px;">
                            <button class="join-btn" style="background:#4A5056; flex:1; font-size: 14px;" onclick="location.href='edit.html?id=${product.id}'">내용 수정</button>
                            <button class="join-btn" style="background:#222222; flex:1; font-size: 14px;" onclick="earlyCloseProduct('${product.id}')">모집 조기 마감</button>
                        </div>` : ''}

                        <button class="join-btn" style="background:none; border:1px solid #EAECEF; color:#818991; padding: 12px; font-size: 14px;" onclick="deleteProduct('${product.id}')">공구방 삭제</button>
                    </div>
                `;
            } else if (isNoshow) {
                actionArea.innerHTML = `
                    <div style="padding: 15px; background-color: #f8d7da; border-radius: 8px; text-align: center; color: #721c24;">
                        ❌ 노쇼 처리된 공구입니다.
                    </div>
                `;
            } else if (isParticipant) {
                const canCancel = !isClosed && myInfo.status === 'joined';
                const isCompleted = myInfo.status === 'completed';
                actionArea.innerHTML = `
                    <div style="display:flex; flex-direction:column; gap:10px;">
                        <button class="join-btn" style="background-color: #ce152d;" onclick="location.href='direct_chattings.html?id=${product.id}'">💬 채팅방 가기 (참여중)</button>
                        <div style="display:flex; gap:10px;">
                            ${canCancel ? `<button class="join-btn" style="background:#eee; color:#666; flex:1; font-size: 14px;" onclick="leaveGroup('${product.id}')">참여 취소</button>` : ''}
                            <button class="join-btn" style="background:none; border:1px solid #ddd; color:#999; flex:1; font-size: 14px;" onclick="reportHost()">신고하기</button>
                        </div>
                        ${isCompleted ? `<button class="join-btn" id="review-btn" style="background:#fff5f7; color:#8A1538; border:1.5px solid #f5c0cc; font-size:14px;" onclick="openReviewModal('${product.id}', '${product.user_id}')">💬 방장에게 후기 남기기</button>` : ''}
                    </div>
                `;
                if (isCompleted) checkAlreadyReviewed(product.id);
            } else{
                if(isClosed){
                    actionArea.innerHTML = `
                        <div style="padding: 15px; background-color: #dee2e6;border-radius: 8px; text-align: center; color: #666;">
                            ⏳ 모집이 마감된 공구입니다.
                        </div>
                    `;
                } else {
                    actionArea.innerHTML = `
                        <button class="join-btn" onclick="joinGroupBuy()">이 공구에 참여하기</button>
                    `;
                }
            }

            if (isHost || isParticipant) {
                renderMemberList(product, isHost);
            }

            renderCompletionSection(product, isHost, myInfo);
        }

        function renderMemberList(product, isHost) {
            const mgmtArea = document.getElementById('member-management-area');
            const validMembers = product.members.filter(m => m.status !== 'noshow');

            const titleText = isHost ? '👥 참여자 관리 (방장 전용)' : '👥 참여자';
            const subText = isHost 
                ? '참여자가 송금하지 않은 경우 노쇼 버튼을 통해 참여자를 내보내는 것이 가능합니다.'
                : '송금하지 않은 경우 공구에서 내보내지는 노쇼 처리가 될 수 있습니다.';

            let html = `
                <div class="member-list card" style="margin-top:30px; padding:20px; border:1px solid #eee;">
                    <h3 style="margin-bottom:5px;">${titleText}</h3>
                    <p style="font-size:13px; color:#666; margin-top:0; margin-bottom:15px; word-break:keep-all;">${subText}</p>
                    <div id="member-items">
            `;

            html += `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #f5f5f5;">
                    <span><strong>${product.writer}</strong> 학우</span>
                    <span style="color:#8A1538; font-weight:bold; font-size:13px;">👑 방장</span>
                </div>
            `;

            if (validMembers.length === 0) {
                html += `<p style="color:#999; padding-top:12px;">추가 참여자가 없습니다.</p>`;
            } else {
                validMembers.forEach(m => {
                    const isConfirmed = m.status === 'confirmed' || m.status === 'completed';
                    
                    let actionHtml = '';
                    if (isConfirmed) {
                        actionHtml = '<span style="color:#28a745; font-weight:bold;">✅ 확인 완료</span>';
                    } else {
                        if (isHost) {
                            actionHtml = `
                                <button onclick="markStatus(${m.participant_id}, ${m.user_id}, 'confirmed')" style="color:#007bff; border:1px solid #007bff; background:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:13px; font-weight:bold;">확인</button>
                                <button onclick="markStatus(${m.participant_id}, ${m.user_id}, 'noshow')" style="color:#dc3545; border:1px solid #dc3545; background:none; padding:4px 8px; border-radius:4px; margin-left:5px; cursor:pointer; font-size:13px; font-weight:bold;">노쇼</button>
                            `;
                        } else {
                            actionHtml = '<span style="color:#999; font-weight:bold; font-size:13px;">⏳ 대기중</span>';
                        }
                    }

                    html += `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #f5f5f5;">
                            <span><strong>${m.nickname}</strong> 학우</span>
                            <div>${actionHtml}</div>
                        </div>
                    `;
                });
            }
            html += `</div></div>`;
            mgmtArea.innerHTML = html;
        }

        function renderCompletionSection(product, isHost, myParticipantInfo) {
            const sectionArea = document.getElementById('completion-section-area');
            
            if (product.status === 'success') {
                sectionArea.innerHTML = `
                    <div class="completion-card" style="margin-top:20px; border: 2px solid #28a745; padding:20px; border-radius:10px; background-color: #f8fff9; text-align: center;">
                        <h4 style="color:#28a745; margin:0;">🎊 최종 거래 완료 🎊</h4>
                        <p style="font-size: 0.9rem; color: #555; margin-top: 5px;">성공적으로 마무리된 공구입니다. 신뢰도 보상이 지급되었습니다.</p>
                    </div>
                `;
                return; 
            }

            if (!isHost && !myParticipantInfo) return;

            const guestReceivedCount = product.members.filter(m => m.is_received == 1 && String(m.user_id) !== String(product.user_id)).length;
            const validGuestCount = product.members.filter(m => String(m.user_id) !== String(product.user_id) && m.status !== 'noshow' && m.status !== 'cancelled').length;

            let btnHtml = '';
            
            if (isHost) {
                btnHtml = `<div style="padding: 10px; background-color: #f8f9fa; border-radius: 8px; text-align: center; color: #666; font-size: 0.95rem;">
                    ⏳ 모든 참여자가 수령 완료를 누르면 자동으로 거래가 성공 처리됩니다.
                </div>`;
            } else if (myParticipantInfo) {
                if (myParticipantInfo.status === 'noshow') {
                    btnHtml = `<button class="join-btn" style="background-color: #ccc;" disabled>방장에 의해 노쇼 처리되었습니다</button>`;
                } else if (myParticipantInfo.status === 'joined') {
                    btnHtml = `<button class="join-btn" style="background-color: #ccc;" disabled>⏳ 방장의 참여 확인 대기중</button>`;
                } else if (myParticipantInfo.is_received == 1) {
                    btnHtml = `<button class="join-btn" style="background-color: #28a745;" disabled>✅ 수령 확인 완료</button>`;
                } else {
                    btnHtml = `<button class="join-btn" onclick="guestReceiveItem('${product.id}')">📦 물건 수령 확인</button>`;
                }
            }

            sectionArea.innerHTML = `
                <div class="completion-card" style="margin-top:20px; border: 2px solid #ce152d; padding:20px; border-radius:10px; background-color: #fff;">
                    <h4 style="color:#ce152d; margin-top:0;">✅ 거래 최종 완료 단계</h4>
                    <p style="font-size: 0.9rem; color: #666; margin-bottom: 10px;">방장의 명단 처리 후, 물건 수령 확인이 가능합니다.</p>
                    <div style="margin: 10px 0; font-weight: bold; font-size: 1.1rem;">
                        참여자 수령 현황: <span style="color:#ce152d;">${guestReceivedCount}</span> / ${validGuestCount} 명
                    </div>
                    ${btnHtml}
                </div>
            `;
        }

        // --- 액션 함수들 ---
        async function markStatus(pId, uId, status) {
            const confirmMsg = status === 'noshow'
                ? "정말로 이 학우를 '노쇼' 처리하시겠습니까?\n(인원수가 줄어들며, 해당 학우는 방에서 나가집니다.)"
                : "해당 학우가 물건을 전달받은 것을 확인하셨습니까?";

            if (!confirm(confirmMsg)) return;

            try {
                const res = await fetch(`${API_BASE_URL}/participants/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ participantId: pId, userId: uId, status: status, productId: new URLSearchParams(window.location.search).get('id') })
                });

                if (res.ok) {
                    alert(status === 'noshow' ? "노쇼 처리가 완료되었습니다." : "확인 처리가 완료되었습니다.");
                    location.reload();
                } else {
                    const err = await res.json();
                    alert(err.message || "처리 실패");
                }
            } catch (e) {
                alert("서버 연결 실패");
            }
        }

        async function guestReceiveItem(productId) {
            if (!confirm("물건을 확실히 수령하셨나요?\n확인 후에는 취소가 불가능하며 신뢰도가 반영됩니다.")) return;

            try {
                const res = await fetch(`${API_BASE_URL}/participants/receive`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId, userId: currentUserId })
                });

                if (res.ok) {
                    const result = await res.json();
                    if (result.isFinalSuccess) {
                        alert("✅ 수령 확인이 등록되었습니다.\n모든 참여자가 수령하여 공구가 최종 성공 처리되었습니다! 🎉");
                    } else {
                        alert("✅ 수령 확인이 등록되었습니다.");
                    }
                    location.reload();
                } else {
                    const err = await res.json();
                    alert(err.message || "수령 처리에 실패했습니다.");
                }
            } catch (e) { alert("서버 연결 실패"); }
        }

        async function joinGroupBuy() {
            if (!isLoggedIn) { alert('로그인이 필요합니다.'); location.href = 'login.html'; return; }
            const productId = new URLSearchParams(window.location.search).get('id');

            const isLastSlot = currentProductData &&
                (parseInt(currentProductData.currentCount) + 1 >= parseInt(currentProductData.targetCount));
            const confirmMsg = isLastSlot
                ? '참여하면 모집 인원이 꽉 차 공구가 마감되며, 이후 취소가 불가능합니다.\n그래도 참여하시겠습니까?'
                : '이 공동구매에 참여하시겠습니까?';
            if (!confirm(confirmMsg)) return;

            try {
                const res = await fetch(`${API_BASE_URL}/participants/join`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId, userId: currentUserId })
                });
                if (res.ok) {
                    let joined = JSON.parse(localStorage.getItem('joinedGroups') || '[]');
                    if (!joined.includes(productId)) joined.push(productId);
                    localStorage.setItem('joinedGroups', JSON.stringify(joined));
                    alert('참여 완료!');
                    location.reload();
                } else {
                    const err = await res.json();
                    alert(err.message || "참여 실패");
                }
            } catch (e) { alert("서버 오류"); }
        }

        // 방장 프로필 이동
        function goToHostProfile() {
            if (!currentProductData) return;
            location.href = `profile.html?id=${currentProductData.user_id}`;
        }

        // 후기 이미 작성했는지 확인
        async function checkAlreadyReviewed(productId) {
            try {
                const res = await fetch(`${API_BASE_URL}/reviews/check/${productId}/${currentUserId}`);
                const data = await res.json();
                if (data.hasReviewed) {
                    const btn = document.getElementById('review-btn');
                    if (btn) { btn.textContent = '✅ 후기 작성 완료'; btn.disabled = true; btn.style.opacity = '0.6'; }
                }
            } catch(e) {}
        }

        // 후기 모달 열기
        function openReviewModal(productId, hostId) {
            const existing = document.getElementById('review-modal-overlay');
            if (existing) existing.remove();

            const overlay = document.createElement('div');
            overlay.id = 'review-modal-overlay';
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
            overlay.innerHTML = `
                <div style="background:#fff;border-radius:20px;padding:32px 28px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.18);">
                    <h3 style="font-size:1.1rem;font-weight:800;margin-bottom:6px;">💬 방장에게 후기 남기기</h3>
                    <p style="font-size:0.82rem;color:#888;margin-bottom:16px;">후기를 남기면 방장의 크림슨 지수가 1 올라갑니다.</p>
                    <textarea id="review-content" placeholder="공구 진행은 어땠나요? 솔직한 후기를 남겨주세요!" style="width:100%;height:120px;border:1.5px solid #eee;border-radius:12px;padding:12px;font-size:0.9rem;font-family:inherit;resize:none;outline:none;"></textarea>
                    <div style="display:flex;gap:10px;margin-top:14px;">
                        <button onclick="document.getElementById('review-modal-overlay').remove()" style="flex:1;padding:12px;border-radius:10px;border:1px solid #eee;background:#f7f8fa;cursor:pointer;font-weight:700;color:#666;">취소</button>
                        <button onclick="submitReview('${productId}','${hostId}')" style="flex:2;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#8A1538,#D32F2F);color:#fff;cursor:pointer;font-weight:700;">후기 등록</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
        }

        // 후기 제출
        async function submitReview(productId, hostId) {
            const content = document.getElementById('review-content')?.value.trim();
            if (!content) { alert('후기 내용을 입력해주세요.'); return; }
            try {
                const res = await fetch(`${API_BASE_URL}/reviews`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId, reviewerId: currentUserId, hostId, content })
                });
                const result = await res.json();
                if (!res.ok) { alert(result.message || '후기 등록 실패'); return; }
                document.getElementById('review-modal-overlay')?.remove();
                alert('후기가 등록되었습니다! 방장의 크림슨 지수가 올랐습니다 🔴');
                const btn = document.getElementById('review-btn');
                if (btn) { btn.textContent = '✅ 후기 작성 완료'; btn.disabled = true; btn.style.opacity = '0.6'; }
            } catch(e) { alert('서버 오류'); }
        }

        async function leaveGroup(productId) {
            if (!confirm("정말로 이 공구 참여를 취소하시겠습니까?")) return;

            try {
                const response = await fetch(`${API_BASE_URL}/participants/cancel`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        productId: productId,
                        userId: currentUserId
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    alert(result.message || '참여 취소 실패');
                    return;
                }

                alert("참여가 취소되었습니다.");

                let joined = JSON.parse(localStorage.getItem('joinedGroups') || '[]');
                joined = joined.filter(id => id !== productId);
                localStorage.setItem('joinedGroups', JSON.stringify(joined));

                location.reload();

            } catch (error) {
                console.error(error);
                alert("서버 연결 실패");
            }
        }

        async function reportHost() {
            if (!isLoggedIn) {
                alert('로그인이 필요한 서비스입니다.');
                location.href = 'login.html';
                return;
            }

            const productId = new URLSearchParams(window.location.search).get('id');

            if (!confirm("정말로 이 공구를 신고하시겠습니까?")) return;

            try {
                const res = await fetch(`${API_BASE_URL}/reports`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        productId: productId,
                        reporterId: currentUserId
                    })
                });

                if (res.ok) {
                    alert("신고가 정상적으로 접수되었습니다. 운영진 확인 후 조치될 예정입니다.");
                    location.reload();
                } else {
                    const err = await res.json();
                    alert(err.message || "신고 접수에 실패했습니다.");
                }
            } catch (e) {
                console.error(e);
                alert("서버 연결 실패");

        async function deleteProduct(id) {
            const response = await fetch(`${API_BASE_URL}/products/${id}`);
            const product = await response.json();

            if (product.currentCount > 1) {
                alert("현재 참여자가 있어 게시글을 삭제할 수 없습니다.");
                return; 
            }

            if (confirm("정말로 삭제하시겠습니까?")) {
                await fetch(`${API_BASE_URL}/products/${id}`, { method: 'DELETE' });
                location.href = 'main_login.html';
            }
        }
        
        async function earlyCloseProduct(productId) {
            if (!confirm("정말로 모집을 조기 마감하시겠습니까?\n마감 후에는 더 이상 새로운 참여자를 받을 수 없습니다.")) return;

            try {
                const res = await fetch(`${API_BASE_URL}/products/early-close`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId })
                });

                if (res.ok) {
                    alert("모집이 조기 마감되었습니다.");
                    location.reload();
                } else {
                    const err = await res.json();
                    alert(err.message || "마감 처리에 실패했습니다.");

        // --- 기타 유틸리티 ---
        function loadHeader() {
            fetch('header.html').then(res => res.text()).then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                updateHeader();
                updateHeaderNotificationBadge();
            });
        }

        async function updateHeaderNotificationBadge() {
            const userId = localStorage.getItem('userId');
            const badge = document.querySelector('.noti-badge');
            if (!badge || !userId) return;
            try {
                const res = await fetch(`${API_BASE_URL}/notifications/${userId}`);
                const notifications = await res.json();
                const hasUnread = notifications.some(n => Number(n.is_read) === 0);
                badge.style.display = hasUnread ? 'block' : 'none';
            } catch (err) {
                badge.style.display = 'none';
            }
        }

        function updateHeader() {
            const authButtons = document.querySelectorAll('.auth-only');
            const guestButtons = document.querySelectorAll('.guest-only');
            if (isLoggedIn) {
                authButtons.forEach(btn => btn.style.display = 'inline-block');
                guestButtons.forEach(btn => btn.style.display = 'none');
            } else {
                authButtons.forEach(btn => btn.style.display = 'none');
                guestButtons.forEach(btn => btn.style.display = 'inline-block');
            }
        }

        function formatStatic(expireAt) {
            const date = new Date(Number(expireAt) * 1000);
            if (isNaN(date.getTime())) return "정보 없음";
            return `${date.getMonth() + 1}월 ${date.getDate()}일 ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}까지`;
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function startTimer(expireAt) {
            const el = document.getElementById('deadline-text');
            let timer;

            function update() {
                const now = Math.floor(Date.now() / 1000);
                const diff = Number(expireAt) - now;
                if (diff <= 0) {
                    el.innerHTML = `<span>⏳</span> 남은 기간: <strong style="color:#ce152d;">모집 마감</strong>`;
                    clearInterval(timer);
                    return;
                }
                const d = Math.floor(diff / 86400);
                const h = Math.floor((diff % 86400) / 3600);
                const m = Math.floor((diff % 3600) / 60);
                const s = diff % 60;
                let text = d > 0 ? `${d}일 ${h}시간` : h > 0 ? `${h}시간 ${m}분` : `${m}분 ${s}초`;
                el.innerHTML = `<span>⏳</span> 남은 기간: <strong>${text} 남음</strong>`;
            }

            update();
            timer = setInterval(update, 1000);
        }

        // =========================================================
        // 🚀 배송 현황 조회
        // =========================================================
        async function initDeliveryTracking(productId, userId) {
            if (!productId || !userId) {
                hideDeliverySection();
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/delivery/info/${productId}?userId=${userId}`);
                const dbData = await response.json();

                if (!dbData.isParticipant) {
                    hideDeliverySection();
                    return;
                }

                const isHost = currentProductData && String(currentProductData.user_id) === String(userId);

                if (!isHost) {
                    document.querySelector('.tracking-input-container').style.display = 'none';
                    if (!dbData.exists) {
                        document.getElementById('tracking-guest-msg').style.display = 'block';
                    }
                }

                if (dbData.exists) {
                    document.getElementById('tracking-guest-msg').style.display = 'none';
                    await autoFetchTrackingInfo(dbData.data.carrier_id, dbData.data.tracking_number, productId);
                }
            } catch (error) {
                console.error('배송 정보 초기 로딩 에러:', error);
                hideDeliverySection();
            }
        }

        function hideDeliverySection() {
            const deliverySection = document.querySelector('.delivery-section');
            if (deliverySection) deliverySection.style.display = 'none';
        }

        async function autoFetchTrackingInfo(carrierId, trackingNumber, productId) {
            try {
                const response = await fetch(`${API_BASE_URL}/delivery/tracking?carrierId=${carrierId}&trackId=${trackingNumber}&productId=${productId}`);
                const data = await response.json();

                if (data.status === false || data.code) {
                    console.log('운송장은 등록되었으나 아직 이동 내역이 없습니다.');
                    return;
                }

                const trackingDetails = data.trackingDetails || [];
                const formattedData = trackingDetails.map(detail => ({
                    time: detail.timeString,
                    location: detail.where,
                    status: detail.kind,
                    details: detail.telno ? `연락처: ${detail.telno}` : ''
                }));

                const carrierName = getCarrierName(carrierId);
                renderTimeline(carrierName, trackingNumber, formattedData, data._cachedAt);
            } catch (error) {
                console.error('자동 배송 조회 에러:', error);
            }
        }

        async function fetchTrackingInfo() {
            const carrierId = document.getElementById('carrier-id').value;
            const trackingNumber = document.getElementById('tracking-number').value.replace(/[^0-9]/g, '');

            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!carrierId || !trackingNumber || !productId) {
                alert('택배사, 운송장 번호, 또는 상품 정보를 확인할 수 없습니다.');
                return;
            }

            const carrierName = document.getElementById('carrier-id').options[document.getElementById('carrier-id').selectedIndex].text;

            try {
                const saveResponse = await fetch(`${API_BASE_URL}/delivery/${productId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ carrierId, trackingNumber })
                });

                const saveResult = await saveResponse.json();

                if (!saveResponse.ok) {
                    alert('DB 저장에 실패했습니다: ' + saveResult.message);
                    return;
                }

                document.querySelector('.tracking-input-container').style.display = 'none';

                const response = await fetch(`${API_BASE_URL}/delivery/tracking?carrierId=${carrierId}&trackId=${trackingNumber}&productId=${productId}`);
                const data = await response.json();

                if (data.status === false || data.code) {
                    alert(data.msg || '조회할 수 없는 운송장 번호이거나 잘못된 택배사입니다.');
                    return;
                }

                const trackingDetails = data.trackingDetails || [];
                if (trackingDetails.length === 0) {
                    alert('운송장이 등록되었으나 아직 택배사에서 이동 내역을 제공하지 않습니다.');
                    return;
                }

                const formattedData = trackingDetails.map(detail => ({
                    time: detail.timeString,
                    location: detail.where,
                    status: detail.kind,
                    details: detail.telno ? `영업소/기사님 연락처: ${detail.telno}` : ''
                }));

                renderTimeline(carrierName, trackingNumber, formattedData, data._cachedAt);
            } catch (error) {
                console.error('배송 조회 및 등록 에러:', error);
                alert('서버와 통신하는 데 실패했습니다.');
            }
        }

        function renderTimeline(carrierName, trackingNumber, dataList, cachedAt) {
            const resultContainer = document.getElementById('tracking-result');
            const infoText = document.getElementById('delivery-info-text');
            const timelineList = document.getElementById('timeline-list');

            const cacheNote = cachedAt
                ? ` · 마지막 업데이트: ${new Date(Number(cachedAt) * 1000).toLocaleString()}`
                : '';
            infoText.innerText = `${carrierName} [${trackingNumber}]${cacheNote}`;
            timelineList.innerHTML = '';

            dataList.forEach((item, index) => {
                const isLastItem = (index === dataList.length - 1);
                const li = document.createElement('li');
                li.className = `timeline-item ${isLastItem ? 'active' : ''}`;
                li.innerHTML = `
                    <div class="timeline-dot"></div>
                    <span class="timeline-time">${item.time}</span>
                    <div class="timeline-content">
                        <strong>[${item.status}]</strong> ${item.location}<br>
                        <span style="font-size: 13px; color: #666; margin-top: 4px; display: inline-block;">${item.details}</span>
                    </div>
                `;
                timelineList.prepend(li);
            });

            resultContainer.style.display = 'block';
        }

        function getCarrierName(code) {
            const carriers = { '04': 'CJ대한통운', '01': '우체국택배', '05': '한진택배', '08': '롯데택배', '06': '로젠택배' };
            return carriers[code] || '알 수 없는 택배사';
        }

        document.addEventListener('click', function (e) {
            const logoutBtn = e.target.closest('#logout-btn');
            if (logoutBtn) {
                localStorage.removeItem('isLoggedIn');
                alert('로그아웃 되었습니다.');
                location.href = 'main_login.html';
            }
        });
    </script>
