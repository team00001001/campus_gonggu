<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="stylesheet" href="mobile.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 상세 | KU GONGGU</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 메인 컬러 */
            --ku-crimson: #8A1538;
            --ku-crimson-light: #FDF2F4; 
            
            /* UI 컬러 */
            --bg-color: #F8F9FA; 
            --surface-color: #FFFFFF; 
            --border-color: #EAECEF; 
            
            /* 텍스트 컬러 */
            --text-primary: #1A1A1A; 
            --text-secondary: #4A5056; 
            --text-tertiary: #818991; 
            --text-dark: #222222; 
            
            /* 카테고리 파스텔 톤 */
            --color-food: #FFF3E0;
            --color-living: #E3F2FD;
            --color-study: #E8F5E9;
            --color-etc: #F3E5F5;
            
            /* 그림자 */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(138, 21, 56, 0.06); 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
            padding-top: 100px; 
        }

        /* ==========================================
           헤더 CSS
           ========================================== */
        header {
            background-color: var(--ku-crimson);
            backdrop-filter: blur(8px);
            height: 70px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .nav-inner {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        .logo {
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        nav a.menu-link {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a.menu-link:hover {
            color: var(--text-dark);
        }

        .btn-login-nav {
            background: var(--ku-crimson);
            color: white !important;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(138, 21, 56, 0.3);
            border: 2px solid white;
            cursor: pointer;
        }

        .btn-login-nav:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(138, 21, 56, 0.4);
        }

        .container {
            max-width: 940px; 
            margin: 0 auto;
            padding: 0px 20px 100px; 
        }

        .card {
            background: var(--surface-color);
            border-radius: 24px; 
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(0,0,0,0.03); 
        }

        /* ==========================================
           상품 상단 요약
           ========================================== */
        .product-hero {
            display: flex;
            gap: 40px; 
            padding: 40px;
            margin-bottom: 30px;
            align-items: flex-start;
        }

        .product-image-container {
            flex: 0 0 360px; 
            width: 360px;
            height: 360px;
            border-radius: 16px;
            overflow: hidden;
            background-color: #F1F3F5;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            font-size: 0.9rem;
            position: relative;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0; left: 0;
        }
        
        .product-image[src="none"], .product-image[src=""] {
            display: none; 
        }

        .product-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-top: 8px;
        }

        .badge-group {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .category-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .tag-hot { background-color: #FFF0F0; color: #FF4B4B; }
        .tag-official { background-color: #E8F2FF; color: #007AFF; }
        .tag-study { background-color: var(--color-study); color: #2E7D32; }
        .tag-food { background-color: #FFF8E1; color: #F57F17; }
        .tag-living { background-color: var(--color-living); color: #1565C0; }
        .tag-etc { background-color: var(--color-etc); color: #6A1B9A; }

        .title {
            font-size: 1.75rem; 
            font-weight: 700;
            line-height: 1.3;
            color: var(--text-primary);
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .price-box {
            margin-bottom: 24px;
            padding: 20px;
            background-color: var(--bg-color); 
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .original-price-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .n-pay-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .n-pay-label {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .n-pay-price {
            font-size: 1.8rem; 
            font-weight: 800;
            color: var(--ku-crimson);
            letter-spacing: -0.5px;
        }

        .n-pay-price span {
            font-size: 0.95rem;
            color: var(--text-tertiary);
            font-weight: 400;
            margin-left: 2px;
        }

        .progress-section {
            margin-bottom: 28px;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .status-label {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .status-count {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .status-count strong {
            color: var(--ku-crimson);
            font-weight: 700;
            font-size: 1rem;
        }

        .progress-bar-container {
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-bar-bg {
            flex: 1;
            height: 10px; 
            background-color: var(--border-color);
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--ku-crimson); 
            border-radius: 5px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            width: 0%; /* 초기값 */
        }
        
        .progress-percent {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--ku-crimson);
            width: 35px;
            text-align: right;
        }

        .deadline-text {
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--text-tertiary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .join-btn {
            margin-top: auto;
            width: 100%;
            background: var(--ku-crimson); 
            color: white;
            border: none;
            padding: 18px; 
            font-size: 1.05rem; 
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(138, 21, 56, 0.2);
        }

        .join-btn:hover {
            background-color: #72112e; 
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(138, 21, 56, 0.25);
        }

        /* ==========================================
           호스트 정보 및 상세 설명
           ========================================== */
        .details-section {
            padding: 40px;
        }

        .host-info-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            background: var(--bg-color);
            border-radius: 14px;
            margin-bottom: 32px;
            border: 1px solid var(--border-color);
        }

        .host-avatar {
            width: 48px;
            height: 48px;
            background-color: #EAECEF; 
            color: var(--text-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .host-details {
            flex: 1;
        }

        .host-name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .host-name {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-primary);
        }
        
        .host-dept {
            font-size: 0.85rem;
            color: var(--text-tertiary);
        }

        .host-trust-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #83485a;
            font-weight: 600;
        }

        .content-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 18px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            letter-spacing: -0.3px;
        }

        .content-body {
            font-size: 0.98rem; 
            line-height: 1.8; 
            color: var(--text-secondary);
            white-space: pre-line;
            letter-spacing: -0.1px;
        }

        /* 배송 조회 섹션 전체 카드 (공구 상세 내용과 간격 띄우기) */
        .delivery-section {
            margin-top: 30px;
            padding: 20px;
        }

        /* 배송 조회 입력 폼 스타일 (겉 박스보다 작게 가운데 정렬) */
        .tracking-input-container {
            display: flex;
            gap: 10px;
            margin: 0 auto 25px auto;
            padding: 15px 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            width: 85%;
            max-width: 600px;
            box-sizing: border-box;
        }

        .carrier-select, .tracking-input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .carrier-select {
            width: 30%;
        }

        .tracking-input {
            flex-grow: 1;
        }

        .track-btn {
            padding: 10px 20px;
            background-color: #8b0029; /* 크림슨 컬러 포인트 */
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
            white-space: nowrap; /* 버튼 글씨 줄바꿈 방지 */
        }

        .track-btn:hover {
            background-color: #6a001f;
        }

        /* 배송 현황 타임라인 스타일 */
        .tracking-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .delivery-badge {
            background-color: #e3f2fd;
            color: #1976d2;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .delivery-info {
            font-size: 15px;
            font-weight: 500;
        }

        /* 세로 타임라인 그리기 */
        .timeline-container {
            padding: 10px 20px;
        }

        .timeline {
            list-style: none;
            padding: 0;
            margin: 0;
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 15px;
            width: 2px;
            background-color: #e0e0e0;
        }

        .timeline-item {
            position: relative;
            padding-left: 45px;
            margin-bottom: 25px;
        }

        .timeline-item:last-child {
            margin-bottom: 0;
        }

        .timeline-dot {
            position: absolute;
            left: 11px;
            top: 5px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #bdbdbd;
            border: 2px solid #fff;
            box-shadow: 0 0 0 2px #e0e0e0;
        }

        /* 가장 최근(마지막) 배송 상태는 색상을 다르게 강조 */
        .timeline-item.active .timeline-dot {
            background-color: #8b0029;
            box-shadow: 0 0 0 2px #f4d3db;
        }

        .timeline-item.active .timeline-content strong {
            color: #8b0029;
        }

        .timeline-time {
            font-size: 12px;
            color: #757575;
            margin-bottom: 4px;
            display: block;
        }

        .timeline-content {
            background-color: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <div class="container">
        <section class="product-hero card">
            <div class="product-image-container">
                <span>이미지 준비중</span>
                <img src="" alt="상품 이미지" class="product-image" id="product-img">
            </div>
            
            <div class="product-info">
                <div class="badge-group">
                    <span class="category-badge tag-hot" id="badge-hot" style="display:none;">🔥 마감임박</span>
                    <span class="category-badge tag-official">✓ 신뢰도 인증</span>
                    <span class="category-badge" id="product-category">카테고리 불러오는 중...</span>
                </div>
                
                <h1 class="title" id="product-title">데이터를 불러오는 중입니다...</h1>
                
                <div class="price-box">
                    <div class="n-pay-row">
                        <span class="n-pay-label">공구 참여가 (인당)</span>
                        <div class="n-pay-price" id="product-price">0원 <span id="product-target-count">(0명 기준)</span></div>
                    </div>
                </div>

                <div class="progress-section">
                    <div class="status-header">
                        <span class="status-label">모집 현황</span>
                        <span class="status-count" id="status-count-text">현재 <strong>0명</strong> / 목표 0명</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-bg">
                            <div class="progress-fill" id="progress-fill" style="width: 0%;"></div> 
                        </div>
                        <div class="progress-percent" id="progress-percent">0%</div>
                    </div>
                    <div class="deadline-text" id="deadline-text">
                        <span>⏳</span> 남은 기간: -
                    </div>
                </div>

                <button class="join-btn" onclick="joinGroupBuy()">이 공구에 참여하기</button>
            </div>
        </section>

        <section class="details-section card">
            <div class="host-info-card">
                <div class="host-avatar">호</div>
                <div class="host-details">
                    <div class="host-name-row">
                        <span class="host-name" id="host-name">로딩중</span>
                        <span class="host-dept" id="host-dept">익명 학우</span>
                    </div>
                    <div class="host-trust-bar">
                        <span class="trust-icon">✓</span> 고대생 인증 완료 · 크림슨 지수 30
                    </div>
                </div>
            </div>

            <h2 class="content-title">공구 상세 내용</h2>
            <div class="content-body" id="product-description">
                데이터를 불러오는 중입니다...
            </div>
        </section>

        <section class="delivery-section card">
            <h2 class="content-title">📦 배송 현황 조회</h2>
            
            <div class="tracking-input-container">
                <select id="carrier-id" class="carrier-select">
                    <option value="">택배사 선택</option>
                    <option value="04">CJ대한통운</option>
                    <option value="01">우체국택배</option>
                    <option value="05">한진택배</option>
                    <option value="08">롯데택배</option>
                    <option value="06">로젠택배</option>
                </select>
                <input type="text" id="tracking-number" class="tracking-input" placeholder="- 제외 송장번호 입력">
                <button class="track-btn" onclick="fetchTrackingInfo()">조회하기</button>
            </div>

            <div id="tracking-result" class="tracking-result-container" style="display: none;">
                <div class="tracking-header">
                    <span id="delivery-status-badge" class="delivery-badge">조회 완료</span>
                    <span id="delivery-info-text" class="delivery-info"></span>
                </div>
                
                <div class="timeline-container">
                    <ul class="timeline" id="timeline-list">
                        </ul>
                </div>
            </div>
        </section>
    </div>

    <script>
        // ==========================================
        // 1. 헤더 및 로그인 스크립트
        // ==========================================
        fetch('header.html')
            .then(res => {
                if (!res.ok) throw new Error('header.html 파일을 찾을 수 없습니다.');
                return res.text();
            })
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                updateHeader(); 
            })
            .catch(err => console.error(err));

        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const authButtons = document.querySelectorAll('.auth-only');
            const guestButtons = document.querySelectorAll('.guest-only');

            if (isLoggedIn) {
                authButtons.forEach(btn => btn.style.display = 'inline-block');
                guestButtons.forEach(btn => btn.style.display = 'none');
            } else {
                authButtons.forEach(btn => btn.style.display = 'none');
                guestButtons.forEach(btn => btn.style.display = 'inline-block');
            }
        }

        document.addEventListener('click', function(e) {
            if(e.target && e.target.id === 'logout-btn') {
                localStorage.removeItem('isLoggedIn');
                alert('로그아웃 되었습니다.');
                location.href = 'main_login.html'; 
            }
        });


    async function joinGroupBuy() {
    const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
    const userId = localStorage.getItem('userId');

    if (!isLoggedIn || !userId) {
        alert('로그인이 필요한 서비스입니다.');
        location.href = 'login.html';
        return;
    }

    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');

    if (!productId) {
        alert('상품 ID가 없습니다.');
        return;
    }

    if (!confirm('정말로 이 공동구매에 참여하시겠습니까?')) {
        return;
    }

    try {
        const response = await fetch('http://localhost:3000/participants/join', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                productId,
                userId
            })
        });

        const result = await response.json();

        if (!response.ok) {
            alert(result.message || '참여 실패');
            return;
        }

        let joinedGroups = JSON.parse(localStorage.getItem('joinedGroups') || '[]');

        if (!joinedGroups.includes(productId)) {
            joinedGroups.push(productId);
            localStorage.setItem('joinedGroups', JSON.stringify(joinedGroups));
        }

        alert('참여가 완료되었습니다.');
        location.reload();

    } catch (error) {
        console.error(error);
        alert('서버 연결 실패');
    }
}
        // ==========================================
        // 2. 상품 데이터 동적 로드 스크립트
        // ==========================================
        document.addEventListener('DOMContentLoaded', async () => {
            // URL에서 상품 ID 가져오기 (예: product.html?id=1)
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!productId) {
                alert('잘못된 접근입니다. 상품 ID가 없습니다.');
                return;
            }

            try {
                // main_login.html과 동일한 json-server 사용 가정
                // json-server를 안 쓰신다면 'products.json'으로 경로를 수정하세요.
                const response = await fetch('http://localhost:3000/products');
                const products = await response.json();
                
                // ID에 맞는 상품 찾기
                const product = products.find(p => p.id == productId);

                if (!product) {
                    alert('해당 상품을 찾을 수 없습니다.');
                    return;
                }

                // 이미지 업데이트
    const defaultImages = {
    '식재료 / 배달': 'images/default-food.png',
    '자취 / 생필품': 'images/default-living.png',
    '전공 / 문구': 'images/default-study.png',
    '기타 물품': 'images/default-etc.png'
};

const fallbackImage =
    defaultImages[product.category] || 'images/default-etc.png';

    <script>
    // [1] 동적 타이머용: "3분 5초 남음" 처럼 계산해주는 함수
function formatDynamic(expireAt) {
    const expire = Number(expireAt);
    const now = Math.floor(Date.now() / 1000);
    const diff = expire - now;

    if (isNaN(expire) || diff <= 0) return "모집 마감";

    const d = Math.floor(diff / 86400);
    const h = Math.floor((diff % 86400) / 3600);
    const m = Math.floor((diff % 3600) / 60);
    const s = diff % 60;

    if (d > 0) return `${d}일 ${h}시간 남음`;
    if (h > 0) return `${h}시간 ${m}분 남음`;
    return `${m}분 ${s}초 남음`;
}

// [2] 고정 날짜용: "5월 15일 18:30" 처럼 바꿔주는 함수
function formatStatic(expireAt) {
    const expire = Number(expireAt);
    const date = new Date(expire * 1000);
    if (isNaN(date.getTime())) return "정보 없음";

    const month = date.getMonth() + 1;
    const day = date.getDate();
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');

    return `${month}월 ${day}일 ${hours}:${minutes}까지`;
}

let tempConfirmedCount = 0; // DB가 없으므로 임시로 카운트하는 변수

async function confirmCompletion(productId, totalCurrentCount) {
    if (!confirm("실제로 물건을 수령하셨나요? 확인 후에는 취소가 불가능합니다.")) return;

    // [임시 프론트 로직] 카운트 증가
    tempConfirmedCount++;
    document.getElementById('confirmed-count').innerText = tempConfirmedCount;
    document.getElementById('complete-btn').disabled = true;
    document.getElementById('complete-btn').innerText = "확인 완료";

    // 👉 과반수 성공 조건 계산
    // 4명 이상일 때는 과반수(절반 초과), 그 미만은 전원 동의 시 성공
    let successThreshold;
    if (totalCurrentCount >= 4) {
        successThreshold = Math.floor(totalCurrentCount / 2) + 1; // 과반수
    } else {
        successThreshold = totalCurrentCount; // 3명 이하는 전원 동의
    }

    if (tempConfirmedCount >= successThreshold) {
        alert(`🎉 과반수 이상(${tempConfirmedCount}명)이 확인하여 공구가 성공했습니다!`);
    } else {
        alert(`확인되었습니다. (성공까지 ${successThreshold - tempConfirmedCount}명 남음)`);
    }
}

//삭제 버튼
async function deleteProduct(id) {
    if(confirm("공구방을 삭제하시겠습니까? 참여자들에게 알림이 전송됩니다.")) {
        try {
            const response = await fetch(`http://localhost:3000/products/${id}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                alert("삭제되었습니다.");
                location.href = 'main_login.html'; // 삭제 후 메인으로 이동
            } else {
                const errorData = await response.json();
                alert(errorData.message || '삭제 실패');
            }
        } catch (error) {
            console.error(error);
            alert("서버 오류로 삭제하지 못했습니다.");
        }
    }
}
//나중에 참여자 데이터베이스 필요함
async function leaveGroup(id) {
    if (!confirm("참여를 취소하시겠습니까?")) {
        return;
    }

    const userId = localStorage.getItem('userId');

    try {
        const response = await fetch('http://localhost:3000/participants/cancel', {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                productId: id,
                userId: userId
            })
        });

        const result = await response.json();

        if (!response.ok) {
            alert(result.message || '참여 취소 실패');
            return;
        }

        let joinedGroups = JSON.parse(localStorage.getItem('joinedGroups') || '[]');
        joinedGroups = joinedGroups.filter(item => String(item) !== String(id));
        localStorage.setItem('joinedGroups', JSON.stringify(joinedGroups));

        alert("참여가 취소되었습니다.");
        location.reload();

    } catch (error) {
        console.error(error);
        alert("서버 연결 실패");
    }
}

// 참여자 확인 및 노쇼 처리 함수
async function markStatus(participantId, userId, status) {
    // 상태에 따라 확인 메시지 다르게 출력
    const msg = status === 'noshow' 
        ? "노쇼로 등록하시겠습니까? (해당 학우의 신뢰도 점수가 하락합니다)" 
        : "참여 확인 처리하시겠습니까? (해당 학우의 신뢰도 점수가 상승합니다)";
        
    if (!confirm(msg)) {
        return; // 취소 누르면 아무 일도 안 일어남
    }

    try {
        // 백엔드 API로 데이터 전송
        const response = await fetch('http://localhost:3000/participants/status', {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                participantId: participantId,
                userId: userId,
                status: status
            })
        });

        if (response.ok) {
            alert("정상적으로 처리되었습니다.");
            location.reload(); // 새로고침해서 변경된 상태를 화면에 바로 반영
        } else {
            const errorData = await response.json();
            alert(errorData.message || "처리 중 오류가 발생했습니다.");
        }
    } catch (error) {
        console.error('상태 업데이트 에러:', error);
        alert("서버 연결에 실패했습니다.");
    }
}

            { time: "2026-05-10 10:10", location: "성북구대리점", status: "배송출발", details: "배송기사님이 배송을 시작했습니다. (14시~16시 도착 예정)" }
        ];

        renderTimeline(carrierName, trackingNumber, mockData);

    } catch (error) {
        console.error('배송 조회 에러:', error);
        alert('배송 정보를 불러오는 데 실패했습니다.');
    }
}

function renderTimeline(carrierName, trackingNumber, dataList) {
    const resultContainer = document.getElementById('tracking-result');
    const infoText = document.getElementById('delivery-info-text');
    const timelineList = document.getElementById('timeline-list');

    // 상단 정보 업데이트
    infoText.innerText = `${carrierName} [${trackingNumber}]`;
    timelineList.innerHTML = ''; // 기존 내역 초기화

    // 데이터가 역순(최신이 먼저)으로 오는지, 정순으로 오는지에 따라 배열 순서를 맞춰줍니다.
    // 여기서는 정순(과거->최신) 배열이라고 가정하고 화면에 그립니다.
    dataList.forEach((item, index) => {
        const isLastItem = (index === dataList.length - 1); // 가장 마지막 단계인지 확인
        
        const li = document.createElement('li');
        li.className = `timeline-item ${isLastItem ? 'active' : ''}`;
        
        li.innerHTML = `
            <div class="timeline-dot"></div>
            <span class="timeline-time">${item.time}</span>
            <div class="timeline-content">
                <strong>[${item.status}]</strong> ${item.location}<br>
                <span style="font-size: 13px; color: #666; margin-top: 4px; display: inline-block;">${item.details}</span>
            </div>
        `;
        
        // 최신 내역이 위로 올라오게 하려면 prepend, 아래로 내려가게 하려면 append 사용
        timelineList.prepend(li); 
    });

    // 결과 컨테이너 보여주기
    resultContainer.style.display = 'block';
}
</script>
