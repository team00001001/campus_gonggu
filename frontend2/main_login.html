<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="stylesheet" href="mobile.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU GONGGU | 고대공구</title>
    <!-- 트렌디하고 깔끔한 본고딕(Pretendard) 중심 사용 -->
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 활기차고 트렌디한 컬러 팔레트 */
            --ku-crimson: #8A1538;
            --ku-crimson-gradient: linear-gradient(135deg, #8A1538 0%, #D32F2F 100%);
            --bg-color: #F7F8FA; /* 시원하고 깔끔한 배경색 */
            --surface-color: #FFFFFF;
            --text-dark: #222222;
            --text-gray: #777777;
            --border-light: #F0F0F0;
            
            /* 카테고리 파스텔 톤 */
            --color-food: #FFF3E0;
            --color-living: #E3F2FD;
            --color-study: #E8F5E9;
            --color-etc: #F3E5F5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ==========================================
           1. 메인 화면 상단바 (Header) - 모던 앱 스타일
           ========================================== */
        header {
            background-color: var(--ku-crimson);
            backdrop-filter: blur(8px);
            height: 70px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .nav-inner {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        .logo {
            color:white;
            font-size: 1.6rem;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        nav a.menu-link {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a.menu-link:hover {
            color: var(--text-dark);
        }

        .btn-login-nav {
            background: var(--ku-crimson);
            color: white !important;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(138, 21, 56, 0.3);
            border: 2px solid white;
            cursor: pointer;
        }

        .btn-login-nav:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(138, 21, 56, 0.4);
        }

        /* ==========================================
           2. 히어로 섹션 (이미지와 컬러가 들어간 생동감 넘치는 레이아웃)
           ========================================== */
        main {
            margin-top: 100px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 24px 120px;
        }

        .hero-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface-color);
            border-radius: 24px;
            padding: 40px 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            margin-bottom: 60px;
            gap: 40px;
            overflow: hidden;
        }

        .hero-text-area {
            flex: 1;
        }

        .hero-badge {
            background-color: #FFEAEF;
            color: var(--ku-crimson);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 16px;
        }

        .hero-main-text {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.3;
            letter-spacing: -1px;
            margin-bottom: 16px;
        }

        .hero-main-text span {
            color: var(--ku-crimson);
        }

        .hero-sub-text {
            font-size: 1.1rem;
            color: var(--text-gray);
            font-weight: 500;
            margin-bottom: 30px;
        }

        .search-input-box {
            background: var(--bg-color);
            padding: 16px 24px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            border: 1px solid var(--border-light);
            transition: border-color 0.3s;
        }

        .search-input-box:focus-within {
            border-color: var(--ku-crimson);
        }

        .search-input-box input {
            width: 100%;
            border: none;
            background: none;
            outline: none;
            font-size: 1rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        .hero-image-area {
            flex: 1;
            height: 300px;
            border-radius: 20px;
            background-image: none;
            background-size: cover;
            background-position: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* ==========================================
           3. 카테고리 (파스텔톤 + 이모지 팝)
           ========================================== */
        .section-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 70px;
        }

        .cat-card {
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            border: none;
        }

        .cat-card:hover {
            transform: translateY(-8px);
        }

        .cat-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            display: block;
        }

        .cat-title {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-dark);
        }

        /* 각 카드별 배경색 */
        .cat-1 { background-color: var(--color-food); }
        .cat-2 { background-color: var(--color-living); }
        .cat-3 { background-color: var(--color-study); }
        .cat-4 { background-color: var(--color-etc); }

        /* ==========================================
           4. 공구방 리스트 (실제 이미지 + 화려한 태그)
           ========================================== */
        .room-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .room-item {
            background: var(--surface-color);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: 1px solid var(--border-light);
        }

        .room-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        .room-image {
            height: 200px;
            width: 100%;
            object-fit: cover;
        }

        .room-content {
            padding: 24px;
        }

        .tag-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .room-tag {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 12px;
        }

        .tag-hot { background-color: #FFF0F0; color: #FF4B4B; }
        .tag-official { background-color: #F0F7FF; color: #007AFF; }
        .tag-food { background-color: #FFF8E1; color: #FFB300; }
        .tag-study { background-color: var(--color-study); color: #2E7D32; }
        .tag-living { background-color: var(--color-living); color: #1565C0; }
        .tag-etc { background-color: var(--color-etc); color: #6A1B9A; } 

        .room-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.4;
            color: var(--text-dark);
        }

        .room-progress-bar {
            width: 100%;
            height: 6px;
            background-color: #EEEEEE;
            border-radius: 10px;
            margin: 16px 0 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--ku-crimson-gradient);
            border-radius: 10px;
        }

        .room-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .count-info {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-gray);
        }
        
        .count-info span {
            color: var(--ku-crimson);
        }

        /* ==========================================
           5. 플로팅 게시글 작성 버튼
           ========================================== */
        .write-fab {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 64px;
            height: 64px;
            background: var(--ku-crimson-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(138, 21, 56, 0.4);
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 900;
        }

        .write-fab:hover {
            transform: scale(1.1) rotate(10deg);
        }

        /* ==========================================
           6. 로그인 모달 (앱 스타일의 부드러운 팝업)
           ========================================== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .login-card {
            background: var(--surface-color);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            transform: translateY(30px) scale(0.95);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .login-card {
            transform: translateY(0) scale(1);
        }

        .btn-close-modal {
            position: absolute;
            top: 20px; right: 20px;
            background: #F5F5F5;
            border: none;
            width: 36px; height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            transition: background 0.2s;
        }

        .btn-close-modal:hover {
            background: #E0E0E0;
            color: var(--text-dark);
        }

        .login-logo {
            color: var(--ku-crimson);
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-desc {
            color: var(--text-gray);
            font-size: 0.95rem;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            background: #FAFAFA;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--ku-crimson);
            background: var(--surface-color);
            box-shadow: 0 0 0 4px rgba(138, 21, 56, 0.1);
        }

        .btn-login-submit {
            width: 100%;
            background: var(--ku-crimson-gradient);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(138, 21, 56, 0.3);
        }

        .btn-login-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(138, 21, 56, 0.4);
        }

    </style>
</head>
<body>

    <!-- 1. 상단바 -->
   <!-- index.html 상단 -->
<div id="header-placeholder"></div>

<script>
    // 1. 페이지 열리자마자 헤더 가져오기
    fetch('header.html')
        .then(res => {
            if (!res.ok) throw new Error('header.html 파일을 찾을 수 없습니다.');
            return res.text();
        })
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
            
            // 2. 헤더 조립 끝나자마자 버튼 상태 확인
            updateHeader();
        })
        .catch(err => console.error(err));

    // 1. 헤더 업데이트 (로그인/로그아웃 버튼 스위칭)
function updateHeader() {
    // 기준 통일: 'isLoggedIn' 키 하나만 사용
    const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
    
    const authButtons = document.querySelectorAll('.auth-only');
    const guestButtons = document.querySelectorAll('.guest-only');

    if (isLoggedIn) {
        authButtons.forEach(btn => btn.style.display = 'inline-block');
        guestButtons.forEach(btn => btn.style.display = 'none');
    } else {
        authButtons.forEach(btn => btn.style.display = 'none');
        guestButtons.forEach(btn => btn.style.display = 'inline-block');
    }
}

// 2. 접근 권한 체크 (클릭 차단용)
function checkAccess(targetUrl) {
    // 위와 동일하게 'isLoggedIn'으로 체크
    const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';

    if (!isLoggedIn) {
        alert("로그인이 필요한 서비스입니다! 로그인 페이지로 갈까요?");
        location.href = "login.html"; 
        return false;
    }

    if (targetUrl) {
        location.href = targetUrl;
    }
    return true;
}

    // 3. 로그아웃 기능 (버튼 클릭 감시)
    document.addEventListener('click', function(e) {
        // id가 logout-btn인 요소를 클릭했을 때만 실행
        if(e.target && e.target.id === 'logout-btn') {
            localStorage.removeItem('isLoggedIn'); // 기록 삭제
            alert('로그아웃 되었습니다.');
            location.href = 'main_login.html'; // 
        }
    });
</script>
    <!-- 2. 메인 컨텐츠 영역 -->
    <main>
        <!-- 다이나믹 히어로 섹션 -->
        <section class="hero-section">
            <div class="hero-text-area">
                <span class="hero-badge">🔥 실시간 트렌드</span>
                
                <h2 class="hero-main-text">
                    필요한 물건,<br>
                    고대생끼리 <span>스마트하게.</span>
                </h2>
                <p class="hero-sub-text">배달비 절약부터 대량구매 할인까지. 학우들과 함께하세요!</p>
                
                <div class="search-input-box">
                    <input type="text" placeholder="반가워요😊" id="main-search">
                </div>
            </div>
            <div class="hero-image-area"></div>
        </section>

        <!-- 카테고리 (파스텔 & 이모지) -->
        <div class="section-title">👀 카테고리 둘러보기</div>
        <section class="cat-grid">
            <div class="cat-card cat-1" onclick="if(checkAccess()) filterCategory('식재료 / 배달')">
                <span class="cat-icon">🍊</span>
                <div class="cat-title">식재료 / 배달</div>
            </div>
            <div class="cat-card cat-2" onclick="if(checkAccess())filterCategory('자취 / 생필품')">
                <span class="cat-icon">🧴</span>
                <div class="cat-title">자취 / 생필품</div>
            </div>
            <div class="cat-card cat-3" onclick="if(checkAccess()) filterCategory('전공 / 문구')">
                <span class="cat-icon">📚</span>
                <div class="cat-title">전공 / 문구</div>
            </div>
            <div class="cat-card cat-4" onclick="if(checkAccess())filterCategory('기타 물품')">
                <span class="cat-icon">📦</span>
                <div class="cat-title">기타 물품</div>
            </div>
        </section>

        <script>
        function filterCategory(categoryName) {
    // 카테고리 이름을 URL 파라미터로 담아서 이동
        location.href = `product_list.html?category=${encodeURIComponent(categoryName)}`;
    }
        </script>

        <!-- 공구방 리스트 -->
        <div class="section-title">⚡최근 올라온 공구방</div>
        <section class="room-grid" id="recent-room-grid">
        </section>
    </main>   
        <!-- 3. 플로팅 게시글 작성 버튼 (Pen Icon) -->
        <!-- style="display: none;"을 추가해 기본적으로 숨겨둡니다 -->
<a href="writefront.html" id="write-fab" class="write-fab" title="공구방 만들기" style="display: none;">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"></path>
        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
    </svg>
</a>
<script>
    window.onload = function() {
        // 1. 로그인 상태 확인 (예: 로컬 스토리지에 'isLoggedIn'이 'true'로 저장되어 있다고 가정)
        // 실제 프로젝트에서는 로그인 성공 시 localStorage.setItem('isLoggedIn', 'true')를 실행해줘야 합니다.
        const isLoggedIn = localStorage.getItem('isLoggedIn');
        const fabButton = document.getElementById('write-fab');

        // 2. 로그인 상태라면 버튼을 보여줌
        if (isLoggedIn === 'true') {
            fabButton.style.display = 'flex'; // 혹은 'block'
        } else {
            fabButton.style.display = 'none';
        }
    };
</script>
<script>
    async function loadRecentProducts() {
    const roomGrid = document.getElementById('recent-room-grid');

    try {
        const response = await fetch('http://localhost:3000/products');
        const products = await response.json();

        // [중요 수정] 마감되지 않은(시간 여유가 있고 인원이 남은) 공구만 필터링
        const openProducts = products.filter(product => {
            // 백엔드에서 준 시간 마감 여부(isClosed)가 false이고,
            // 현재 인원이 목표 인원보다 적어야 함
            return !product.isClosed && (product.currentCount < product.targetCount);
        });

        // 필터링된 "모집 중" 상품들 중에서 최신 3개만 선택
        const recentProducts = openProducts.slice(0, 3);

        roomGrid.innerHTML = '';

        // 만약 참여 가능한 공구가 하나도 없다면 안내 문구 출력
        if (recentProducts.length === 0) {
            roomGrid.innerHTML = '<p style="text-align:center; width:100%; padding:20px;">현재 참여 가능한 최근 공구가 없습니다.</p>';
            return;
        }

        recentProducts.forEach(product => {
            const percent = Math.min(
                Math.round((product.currentCount / product.targetCount) * 100),
                100
            );

            const cardHTML = `
                <div class="room-item" onclick="if(checkAccess()) location.href='product.html?id=${product.id}'">
                    <div class="room-content">
                        <div class="tag-group">
                            <span class="room-tag tag-study">${product.category}</span>
                        </div>
                        <h3 class="room-title">${product.title}</h3>
                        <div class="room-progress-bar">
                            <div class="progress-fill" style="width: ${percent}%;"></div>
                        </div>
                        <div class="room-footer">
                            <span class="count-info">
                                모집 <span>${product.currentCount}명</span> / ${product.targetCount}명
                            </span>
                        </div>
                    </div>
                </div>
            `;

            roomGrid.insertAdjacentHTML('beforeend', cardHTML);
        });

    } catch (error) {
        console.error(error);
        roomGrid.innerHTML = '<p>최근 공구방을 불러오지 못했습니다.</p>';
    }
}

loadRecentProducts();
</script>
<script>
    const mainSearch = document.getElementById('main-search');

    mainSearch.addEventListener('keydown', (e) => {

        if (e.key === 'Enter') {

            const keyword = mainSearch.value.trim();

            if (!keyword) return;

            location.href =
                `product_list.html?search=${encodeURIComponent(keyword)}`;
        }
    });
</script>
</body>
</html>
