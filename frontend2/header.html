<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU GONGGU | 고대공구</title>
    <!-- 트렌디하고 깔끔한 본고딕(Pretendard) 중심 사용 -->
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 활기차고 트렌디한 컬러 팔레트 */
            --ku-crimson: #8A1538;
            --ku-crimson-gradient: linear-gradient(135deg, #8A1538 0%, #D32F2F 100%);
            --bg-color: #F7F8FA; /* 시원하고 깔끔한 배경색 */
            --surface-color: #FFFFFF;
            --text-dark: #222222;
            --text-gray: #777777;
            --border-light: #F0F0F0;
            
            /* 카테고리 파스텔 톤 */
            --color-food: #FFF3E0;
            --color-living: #E3F2FD;
            --color-study: #E8F5E9;
            --color-etc: #F3E5F5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ==========================================
           1. 메인 화면 상단바 (Header) - 모던 앱 스타일
           ========================================== */
        header {
            background-color: var(--ku-crimson);
            backdrop-filter: blur(8px);
            height: 70px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .nav-inner {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        .logo {
            color:white;
            font-size: 1.6rem;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        nav a.menu-link {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a.menu-link:hover {
            color: var(--text-dark);
        }

        .btn-login-nav {
            background: var(--ku-crimson);
            color: white !important;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(138, 21, 56, 0.3);
            border: 2px solid white;
            cursor: pointer;
        }

        .btn-login-nav:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(138, 21, 56, 0.4);
        }
        /* ==========================================
           6. 로그인 모달 (앱 스타일의 부드러운 팝업)
           ========================================== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .login-card {
            background: var(--surface-color);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            transform: translateY(30px) scale(0.95);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .login-card {
            transform: translateY(0) scale(1);
        }

        .btn-close-modal {
            position: absolute;
            top: 20px; right: 20px;
            background: #F5F5F5;
            border: none;
            width: 36px; height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            transition: background 0.2s;
        }

        .btn-close-modal:hover {
            background: #E0E0E0;
            color: var(--text-dark);
        }

        .login-logo {
            color: var(--ku-crimson);
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-desc {
            color: var(--text-gray);
            font-size: 0.95rem;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            background: #FAFAFA;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--ku-crimson);
            background: var(--surface-color);
            box-shadow: 0 0 0 4px rgba(138, 21, 56, 0.1);
        }

        .btn-login-submit {
            width: 100%;
            background: var(--ku-crimson-gradient);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(138, 21, 56, 0.3);
        }

        .btn-login-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(138, 21, 56, 0.4);
        }

    </style>
</head>
<body>

    <!-- 1. 상단바 -->
    <header>
       <div class="nav-inner">
    <a href="main_login.html" class="logo">KU GONGGU</a>
    <nav>
        <!-- [로그인 전] 기본적으로 보여야 함 -->
        <button id="login-btn" class="btn-login-nav guest-only" onclick="location.href='login.html'">로그인</button>

        <!-- [로그인 후] 기본적으로 숨겨야 함 (display: none 추가!) -->
        <a href="mypage.html" class="menu-link auth-only" style="display: none;">마이페이지</a>
        <a href="product_list.html" class="menu-link auth-only" style="display: none;">검색창</a>
        <button id="logout-btn" class="btn-login-nav auth-only" style="display: none;">로그아웃</button>
    </nav>
</div>
    </header>


</body>
</html>
