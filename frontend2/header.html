<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU GONGGU | 고대공구</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="./mobile.css">
</head>
<body>

    <header>
        <div class="nav-inner">
            <a href="main_login.html" class="logo">KU GONGGU</a>
            <nav>
                <button id="login-btn" class="btn-login-nav guest-only" onclick="location.href='login.html'">로그인</button>

                <div class="notification-wrapper auth-only" style="display: none;">
                    <button class="btn-noti" onclick="location.href='notifications.html'">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                        <span class="noti-badge" style="display:none;"></span>
                    </button>
                </div> 

                <a href="#" class="menu-link" onclick="if(localStorage.getItem('isLoggedIn')==='true'){location.href='mypage.html';}else{alert('로그인이 필요합니다.');location.href='login.html';}">마이페이지</a>
                <a href="product_list.html" class="menu-link">검색창</a>
                <button id="logout-btn" class="btn-login-nav auth-only" style="display: none;">로그아웃</button>
            </nav>
        </div>
    </header>
<script>
async function updateHeaderNotificationBadge() {

    const userId = localStorage.getItem('userId');
    const badge = document.querySelector('.noti-badge');

    if (!badge || !userId) return;

    try {

        const response = await fetch(
            `https://campusgonggu-production.up.railway.app/notifications/${userId}`
        );

        const notifications = await response.json();

        const hasUnread = notifications.some(
            n => Number(n.is_read) === 0
        );

        badge.style.display = hasUnread ? 'block' : 'none';

    } catch (error) {

        console.error('알림 배지 로딩 실패:', error);

        badge.style.display = 'none';
    }
}

document.addEventListener(
    'DOMContentLoaded',
    updateHeaderNotificationBadge
);
</script>
<script>
async function updateHeaderNotificationBadge() {
    const userId = localStorage.getItem('userId');
    const badge = document.querySelector('.noti-badge');

    if (!badge || !userId) return;

    try {
        const res = await fetch(`https://campusgonggu-production.up.railway.app/notifications/${userId}`);
        const notifications = await res.json();

        const hasUnread = notifications.some(n => Number(n.is_read) === 0);

        badge.style.display = hasUnread ? 'block' : 'none';
    } catch (err) {
        console.error('헤더 알림 배지 확인 실패:', err);
        badge.style.display = 'none';
    }
}

updateHeaderNotificationBadge();
</script>
</body>
</html>
