<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU GONGGU | 고대공구</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ku-crimson: #8A1538;
            --ku-crimson-gradient: linear-gradient(135deg, #8A1538 0%, #D32F2F 100%);
            --bg-color: #F7F8FA;
            --surface-color: #FFFFFF;
            --text-dark: #222222;
            --text-gray: #777777;
            --border-light: #F0F0F0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        header {
            background-color: var(--ku-crimson);
            backdrop-filter: blur(8px);
            height: 70px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .nav-inner {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        .logo {
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        nav a.menu-link {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a.menu-link:hover {
            color: var(--text-dark);
        }

        .btn-login-nav {
            background: var(--ku-crimson);
            color: white !important;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(138, 21, 56, 0.3);
            border: 2px solid white;
            cursor: pointer;
        }

        .btn-login-nav:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(138, 21, 56, 0.4);
        }

        /* 알림 버튼 스타일 */
        .notification-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .btn-noti {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .btn-noti:hover { opacity: 0.7; }

        .noti-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            background-color: #FF3B30;
            border-radius: 50%;
            border: 2px solid var(--ku-crimson);
        }

        /* 로그인 모달 관련 스타일 유지 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
    </style>
</head>
<body>

    <header>
        <div class="nav-inner">
            <a href="main_login.html" class="logo">KU GONGGU</a>
            <nav>
                <button id="login-btn" class="btn-login-nav guest-only" onclick="location.href='login.html'">로그인</button>

                <div class="notification-wrapper auth-only" style="display: none;">
                    <button class="btn-noti" onclick="location.href='notifications.html'">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                        <span class="noti-badge" style="display:none;"></span>
                    </button>
                </div> 

                <a href="mypage.html" class="menu-link auth-only" style="display: none;">마이페이지</a>
                <a href="product_list.html" class="menu-link auth-only" style="display: none;">검색창</a>
                <button id="logout-btn" class="btn-login-nav auth-only" style="display: none;">로그아웃</button>
            </nav>
        </div>
    </header>
<script>
async function updateHeaderNotificationBadge() {

    const userId = localStorage.getItem('userId');
    const badge = document.querySelector('.noti-badge');

    if (!badge || !userId) return;

    try {

        const response = await fetch(
            `http://localhost:3000/notifications/${userId}`
        );

        const notifications = await response.json();

        const hasUnread = notifications.some(
            n => Number(n.is_read) === 0
        );

        badge.style.display = hasUnread ? 'block' : 'none';

    } catch (error) {

        console.error('알림 배지 로딩 실패:', error);

        badge.style.display = 'none';
    }
}

document.addEventListener(
    'DOMContentLoaded',
    updateHeaderNotificationBadge
);
</script>
<script>
async function updateHeaderNotificationBadge() {
    const userId = localStorage.getItem('userId');
    const badge = document.querySelector('.noti-badge');

    if (!badge || !userId) return;

    try {
        const res = await fetch(`http://localhost:3000/notifications/${userId}`);
        const notifications = await res.json();

        const hasUnread = notifications.some(n => Number(n.is_read) === 0);

        badge.style.display = hasUnread ? 'block' : 'none';
    } catch (err) {
        console.error('헤더 알림 배지 확인 실패:', err);
        badge.style.display = 'none';
    }
}

updateHeaderNotificationBadge();
</script>
</body>
</html>
