<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU GONGGU - 성공 공구 내역</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/success_products.css">
    <link rel="stylesheet" href="../css_mobile/success_products_mobile.css" media="(max-width: 768px)">
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">성공 공구 내역 <span id="count-badge">0</span></h1>
        </div>
        
        <div id="product-list" class="product-list">
            </div>

        <div id="empty-view" class="empty-state">
            <p>아직 성공한 공구 내역이 없습니다.<br>진행 중인 공구에 참여하여 목표를 달성해보세요!</p>
            <a href="main_login.html" class="btn-main">홈으로 가기</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. 헤더 불러오기
            fetch('header.html')
                .then(res => res.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                    updateHeader();
                });

            const listContainer = document.getElementById('product-list');
            const emptyView = document.getElementById('empty-view');
            const countBadge = document.getElementById('count-badge');
            const myId = localStorage.getItem('userId'); 

            if (!myId) {
                alert("로그인이 필요합니다.");
                location.href = 'main_login.html';
                return;
            }

            try {
                // 2. 백엔드에서 데이터 불러오기 (참여 내역 + 전체 공구)
                const [chatsRes, productsRes] = await Promise.all([
                    fetch(`http://localhost:3000/chats/my/${myId}`),
                    fetch('http://localhost:3000/products')
                ]);

                const chats = await chatsRes.json();
                const allProducts = await productsRes.json();

                const joinedIds = chats.map(c => String(c.product_id));
                const myCreatedIds = allProducts.filter(p => String(p.user_id) === String(myId)).map(p => String(p.id));

                // 3. 필터링: 내가 올렸거나 참여했으며, 목표 인원을 채운 공구
                const successProducts = allProducts.filter(p => {
                    const isMineOrJoined = joinedIds.includes(String(p.id)) || myCreatedIds.includes(String(p.id));
                    const isSuccess = p.currentCount >= p.targetCount;
                    return isMineOrJoined && isSuccess;
                }).sort((a, b) => b.id - a.id); // 최신순 정렬
                
                countBadge.innerText = successProducts.length;

                // 4. 화면 렌더링
                if (successProducts.length === 0) {
                    emptyView.style.display = 'block';
                } else {
                    emptyView.style.display = 'none';

                    // 💡 joined_products.html과 동일한 기본 이미지 매핑 정보 추가
                    const categoryMap = {
                        '식재료 / 배달': { emoji: '🍊', className: 'tag-food', defaultImg: 'images/default-food.png' },
                        '자취 / 생필품': { emoji: '🧴', className: 'tag-living', defaultImg: 'images/default-living.png' },
                        '전공 / 문구': { emoji: '📚', className: 'tag-study', defaultImg: 'images/default-study.png' },
                        '기타 물품': { emoji: '📦', className: 'tag-etc', defaultImg: 'images/default-etc.png' }
                    };
                    const defaultEtcImg = 'images/default-etc.png'; // 대체용 기타 이미지

                    successProducts.forEach(product => {
                        const card = document.createElement('div');
                        card.className = 'product-card';
                        
                        // 💡 카테고리별 기본 이미지 로직 적용
                        const catInfo = categoryMap[product.category] || { defaultImg: defaultEtcImg };
                        const displayImg = catInfo.defaultImg;

                        card.innerHTML = `
                            <img src="${displayImg}" alt="상품" class="product-img" onerror="this.onerror=null; this.src='${defaultEtcImg}';">
                            <div class="product-info">
                                <span class="status-badge status-success">공구 성공</span>
                                <a href="product.html?id=${product.id}" class="product-name" style="display:block;">${product.title}</a>
                                <div class="product-meta">
                                    <span>📍 ${product.location || '교내'}</span>
                                    <span>💰 ${Number(product.price).toLocaleString()}원</span>
                                    <span style="color: var(--text-dark); font-weight: 600;">👥 ${product.currentCount} / ${product.targetCount}명</span>
                                </div>
                            </div>
                            <div class="manage-btns">
                                <a href="product.html?id=${product.id}" class="btn-manage btn-detail">상세보기</a>
                                <a href="direct_chattings.html?id=${product.id}" class="btn-manage btn-chat">채팅방</a>
                            </div>
                        `;
                        listContainer.appendChild(card);
                    });
                }
            } catch (error) {
                console.error('데이터 로드 실패:', error);
                listContainer.innerHTML = '<p style="text-align:center; color:#999; padding: 40px 0;">내역을 불러오는 중 오류가 발생했습니다.</p>';
            }
        });

        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const authButtons = document.querySelectorAll('.auth-only');
            const guestButtons = document.querySelectorAll('.guest-only');
            if (isLoggedIn) {
                authButtons.forEach(btn => btn.style.display = 'inline-block');
                guestButtons.forEach(btn => btn.style.display = 'none');
            } else {
                authButtons.forEach(btn => btn.style.display = 'none');
                guestButtons.forEach(btn => btn.style.display = 'inline-block');
            }
        }
    </script>
</body>
</html>
