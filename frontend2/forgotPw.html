<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기 - 대학생 공동구매</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/forgotPw.css">
    <link rel="stylesheet" href="css_mobile/forgotPw_mobile.css" media="(max-width: 768px)">
</head>
<body>

    <div class="login-container">
        <h2>FIND PASSWORD</h2>
        <p class="description">가입 시 사용한 학교 이메일을 입력하시면,<br>해당 이메일로 임시 비밀번호를 발송해 드립니다.</p>
        
        <form id="forgot-pw-form">
            <div class="form-group">
                <label for="reset-id">학교 이메일</label>
                <div class="email-input-group" style="display: flex; align-items: center; gap: 8px;">
                    <input type="text" id="reset-id" placeholder="이메일 아이디" required style="flex: 1;">
                    <span style="font-weight: 600; color: #555;">@ korea.ac.kr</span>
                </div>
            </div>
            
            <button type="button" class="btn" style="margin-top: 15px;" onclick="requestPasswordReset()">임시 비밀번호 발송</button>
        </form>

        <button type="button" class="btn btn-back" onclick="location.href='login.html'">로그인으로 돌아가기</button>
    </div>

    <script>
        // 현재 배포된 백엔드 서버 주소 (로컬 테스트 시 http://localhost:3000 으로 변경)
        const API_BASE_URL = 'https://campusgonggu-production.up.railway.app';

        async function requestPasswordReset() {
            const emailId = document.getElementById('reset-id').value.trim();
            
            if (!emailId) {
                alert("이메일 아이디를 입력해주세요.");
                return;
            }
            
            const fullEmail = `${emailId}@korea.ac.kr`;

            try {
                // 안내 문구를 띄워주기 위해 버튼을 '처리중' 상태로 만들기
                const btn = document.querySelector('.btn');
                const originalText = btn.innerText;
                btn.innerText = "발송 중...";
                btn.disabled = true;

                // 백엔드 API 호출
                const response = await fetch(`${API_BASE_URL}/api/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: fullEmail })
                });

                const result = await response.json();

                if (response.ok) {
                    alert(`${fullEmail}로 임시 비밀번호가 발송되었습니다. 메일함을 확인해주세요!`);
                    location.href = 'login.html'; 
                } else {
                    alert(result.message || "오류가 발생했습니다.");
                    btn.innerText = originalText;
                    btn.disabled = false;
                }

            } catch (error) {
                console.error("에러 발생:", error);
                alert("서버 연결에 실패했습니다. 서버 상태를 확인해주세요.");
                
                document.querySelector('.btn').innerText = "임시 비밀번호 발송";
                document.querySelector('.btn').disabled = false;
            }
        }
    </script>
</body>
</html>
