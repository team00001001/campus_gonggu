<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="stylesheet" href="mobile.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>참여 중인 공고 | KU GONGGU</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ku-crimson: #8A1538;
            --text-dark: #222222;
            --bg-color: #F8F9FA;
            --surface-color: #FFFFFF;
            --border-color: #EAECEF;
            --text-primary: #1A1A1A;
            --text-secondary: #4A5056;
            --text-tertiary: #818991;
            --shadow-md: 0 4px 16px rgba(138, 21, 56, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding-top: 100px;
            min-height: 100vh;
        }

        /* 공통 헤더 CSS */
        header {
            background-color: var(--ku-crimson);
            backdrop-filter: blur(8px);
            height: 70px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .nav-inner {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        .logo {
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .page-title span {
            font-size: 1rem;
            font-weight: 600;
            color: var(--ku-crimson);
            margin-left: 8px;
        }

        /* 공고 카드 리스트 */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .product-card {
            background: var(--surface-color);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(0,0,0,0.02);
            transition: transform 0.2s;
        }

        .product-card:hover {
            transform: translateY(-3px);
        }

        .product-img {
            width: 100px;
            height: 100px;
            border-radius: 14px;
            object-fit: cover;
            background-color: #eee;
        }

        .product-info {
            flex: 1;
        }

        .status-badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: inline-block;
        }

        .status-recruiting { background: #FFF0F3; color: var(--ku-crimson); }
        .status-completed { background: #EEEEEE; color: #777777; }

        .product-name {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .product-meta {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            gap: 15px;
        }

        /* 관리 버튼 영역 */
        .manage-btns {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-manage {
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            text-decoration: none;
            text-align: center;
            background: white;
            transition: 0.2s;
            border: none; /* 테두리 제거 */
        }

        /* ✅ 채팅방 버튼 (노란색 톤) */
        .btn-chat { 
            color: #FFB300 !important; 
            background: rgba(255, 179, 0, 0.05) !important; 
        }

        .btn-chat:hover {
            background: rgba(255, 179, 0, 0.15) !important;
        }

        /* ✅ 참여 취소 버튼 (빨간색 톤) */
        .btn-cancel { 
            color: #bd514b !important; 
            background: #FF3B3005 !important; 
        }

        .btn-cancel:hover {
            background: #FF3B3015 !important;
        }

        /* 비어있을 때 */
        .empty-state {
            text-align: center;
            padding: 100px 20px;
            background: white;
            border-radius: 24px;
            box-shadow: var(--shadow-md);
        }

        .empty-state p {
            color: var(--text-tertiary);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .btn-go-main {
            display: inline-block;
            background: var(--ku-crimson);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">참여 중인 공고 <span id="count-badge">0</span></h1>
        </div>
        
        <div id="product-list" class="product-list">
            </div>

        <div id="empty-view" class="empty-state" style="display: none;">
            <p>현재 참여 중인 공동구매가 없습니다.<br>마음에 드는 공구를 찾아 참여해보세요!</p>
            <a href="main_login.html" class="btn-go-main">공구 둘러보기</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. 헤더 불러오기
            fetch('header.html')
                .then(res => res.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                    updateHeader();
                });

            const listContainer = document.getElementById('product-list');
            const emptyView = document.getElementById('empty-view');
            const countBadge = document.getElementById('count-badge');

            // 2. 참여한 상품 ID 목록 가져오기 (localStorage)
            const joinedIds = JSON.parse(localStorage.getItem('joinedGroups') || '[]');

            if (joinedIds.length === 0) {
                emptyView.style.display = 'block';
                return;
            }

            try {
                // 3. 전체 상품 데이터 불러오기
                const response = await fetch('http://localhost:3000/products');
                const allProducts = await response.json();

                // 4. 내가 참여한 상품만 필터링
                const joinedProducts = allProducts.filter(p => joinedIds.includes(p.id.toString()) || joinedIds.includes(p.id));
                
                countBadge.innerText = joinedProducts.length;

                if (joinedProducts.length === 0) {
                    emptyView.style.display = 'block';
                    return;
                }

                // 5. 화면에 리스트 그리기
                joinedProducts.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    
                    const isCompleted = product.currentCount >= product.targetCount;
                    const statusClass = isCompleted ? 'status-completed' : 'status-recruiting';
                    const statusText = isCompleted ? '모집완료' : '모집중';

                    card.innerHTML = `
                        <img src="${product.imageUrl || 'https://via.placeholder.com/100'}" alt="상품" class="product-img">
                        <div class="product-info">
                            <span class="status-badge ${statusClass}">${statusText}</span>
                            <div class="product-name" onclick="location.href='product.html?id=${product.id}'">${product.title}</div>
                            <div class="product-meta">
                                <span>💰 ${Number(product.price).toLocaleString()}원</span>
                                <span>👥 ${product.currentCount} / ${product.targetCount}명</span>
                            </div>
                        </div>
                        <div class="manage-btns">
                            <a href="direct_chattings.html?id=${product.id}" class="btn-manage btn-chat">채팅방</a>
                            <button class="btn-manage btn-cancel" onclick="cancelJoin(${product.id})">참여 취소</button>
                        </div>
                    `;
                    listContainer.appendChild(card);
                });

            } catch (error) {
                console.error('데이터 로드 실패:', error);
                listContainer.innerHTML = '<p style="text-align:center; color:#999; padding:40px;">목록을 불러오는 중 오류가 발생했습니다.</p>';
            }
        });

        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const authButtons = document.querySelectorAll('.auth-only');
            const guestButtons = document.querySelectorAll('.guest-only');
            if (isLoggedIn) {
                authButtons.forEach(btn => btn.style.display = 'inline-block');
                guestButtons.forEach(btn => btn.style.display = 'none');
            }
        }

        // 참여 취소 로직
        async function cancelJoin(id) {
    if (!confirm("정말로 이 공구 참여를 취소하시겠습니까?")) {
        return;
    }

    const userId = localStorage.getItem('userId');

    if (!userId) {
        alert('로그인이 필요합니다.');
        location.href = 'login.html';
        return;
    }

    try {
        const response = await fetch('http://localhost:3000/participants/cancel', {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                productId: id,
                userId: userId
            })
        });

        const result = await response.json();

        if (!response.ok) {
            alert(result.message || '참여 취소 실패');
            return;
        }

        let joinedIds = JSON.parse(localStorage.getItem('joinedGroups') || '[]');
        joinedIds = joinedIds.filter(item => String(item) !== String(id));
        localStorage.setItem('joinedGroups', JSON.stringify(joinedIds));

        alert("참여가 취소되었습니다.");
        location.reload();

    } catch (error) {
        console.error(error);
        alert("서버 연결 실패");
    }
}
    </script>
</body>
</html>
