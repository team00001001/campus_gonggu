<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>참여 중인 공고 | KU GONGGU</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/joined_products.css">
<link rel="stylesheet" href="css_mobile/joined_products_mobile.css" media="(max-width: 768px)">
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">참여 중인 공고 <span id="count-badge">0</span></h1>
        </div>
        
        <div id="product-list" class="product-list">
            </div>

        <div id="empty-view" class="empty-state" style="display: none;">
            <svg width="72" height="72" viewBox="0 0 72 72" fill="none" style="margin-bottom:16px; opacity:0.35;">
                <circle cx="36" cy="36" r="35" stroke="#8A1538" stroke-width="2"/>
                <path d="M22 28h28M22 36h28M22 44h18" stroke="#8A1538" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="52" cy="52" r="10" fill="#fff" stroke="#8A1538" stroke-width="2"/>
                <path d="M49 52l2 2 4-4" stroke="#8A1538" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <p style="font-size:1.05rem; font-weight:700; color:#333; margin-bottom:8px;">아직 참여 중인 공구가 없어요</p>
            <p>마음에 드는 공구를 찾아 참여해보세요!</p>
            <a href="product_list.html" class="btn-go-main">공구 둘러보기</a>
        </div>
    </div>

    <script>
        // 🚨 1. 알림 배지 업데이트 함수 추가
        async function updateHeaderNotificationBadge() {
            const userId = localStorage.getItem('userId');
            const badge = document.querySelector('.noti-badge');
            if (!badge || !userId) return;
            try {
                const res = await fetch(`https://campusgonggu-production.up.railway.app/notifications/${userId}`);
                const notifications = await res.json();
                const hasUnread = notifications.some(n => Number(n.is_read) === 0);
                badge.style.display = hasUnread ? 'block' : 'none';
            } catch (err) {
                badge.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // 2. 헤더 불러오기
            fetch('header.html')
                .then(res => res.text())
                .then(data => {
                    // HTML 삽입
                    document.getElementById('header-placeholder').innerHTML = data;
                    updateHeader();

                    // 🚨 2. 헤더 로드 직후 알림 배지 함수 실행
                    updateHeaderNotificationBadge();

                    // 로그아웃 버튼 연결
                    const logoutBtn = document.getElementById('logout-btn');
                    if (logoutBtn) {
                        logoutBtn.onclick = function() {
                            if (confirm('로그아웃 하시겠습니까?')) {
                                localStorage.removeItem('userId');
                                localStorage.removeItem('isLoggedIn');
                                alert('로그아웃 되었습니다.');
                                location.href = 'main_login.html';
                            }
                        };
                    }
                });

            const listContainer = document.getElementById('product-list');
            const emptyView = document.getElementById('empty-view');
            const countBadge = document.getElementById('count-badge');
            const userId = localStorage.getItem('userId');

            if (!userId) {
                alert('로그인이 필요합니다.');
                location.href = 'login.html';
                return;
            }

            try {
                // 1. 상세 정보(마감 시간 등)가 포함된 전체 상품 데이터를 먼저 가져옵니다.
                const productResponse = await fetch('https://campusgonggu-production.up.railway.app/products');
                const allProducts = await productResponse.json();

                // 2. 내가 참여 중인 채팅방 목록(ID)만 확인용으로 가져옵니다.
                const chatResponse = await fetch(`https://campusgonggu-production.up.railway.app/chats/my/${userId}`);
                const myChats = await chatResponse.json();
                const joinedIds = myChats.map(chat => String(chat.product_id));

                // 3. 전체 상품 중 [내가 올린 글]이거나 [내가 참여한 글]만 필터링합니다.
                // 모든 데이터가 상세 정보가 꽉 찬 allProducts에서 오기 때문에 마감 처리가 정확해집니다.
                const joinedProducts = allProducts.filter(p => {
                    const isMyPost = String(p.user_id) === String(userId);
                    const amIParticipant = joinedIds.includes(String(p.id));
                    return isMyPost || amIParticipant;
                }).map(p => ({
                    ...p,
                    product_id: p.id // 기존 UI 로직 변수명(product_id)에 맞춰줌
                }));

                // 최신순 정렬 및 개수 배지 업데이트
                joinedProducts.sort((a, b) => b.product_id - a.product_id);
                countBadge.innerText = joinedProducts.length;

                if (joinedProducts.length === 0) {
                    emptyView.style.display = 'block';
                    return;
                }

                // 카테고리별 기본 이미지 정보 (기존과 동일)
                const categoryMap = {
                    '식재료 / 배달': { emoji: '🍊', className: 'tag-food', defaultImg: 'images/default-food.png' },
                    '자취 / 생필품': { emoji: '🧴', className: 'tag-living', defaultImg: 'images/default-living.png' },
                    '전공 / 문구': { emoji: '📚', className: 'tag-study', defaultImg: 'images/default-study.png' },
                    '기타 물품': { emoji: '📦', className: 'tag-etc', defaultImg: 'images/default-etc.png' }
                };
                const defaultEtcImg = 'images/default-etc.png';

                // 4. 화면에 리스트 그리기
                joinedProducts.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    
                    const now = Math.floor(Date.now() / 1000);

                    // 이제 product.duration 정보가 확실히 들어있어서 마감 판단이 정확해집니다.
                    const isCompleted = (product.currentCount >= product.targetCount) || 
                                        product.isClosed || 
                                        (Number(product.duration) <= now);
                    
                    const statusClass = isCompleted ? 'status-completed' : 'status-recruiting';
                    const statusText = isCompleted ? '마감됨' : '모집중';

                    const isHost = String(product.user_id) === String(userId);
                    const cancelBtnHtml = isHost
                        ? `<span style="font-size: 0.8rem; color: #888; text-align: center; margin-top: 5px; padding: 10px 0;">내가 쓴 공고</span>`
                        : isCompleted
                            ? ''
                            : `<button class="btn-manage btn-cancel" onclick="cancelJoin(${product.product_id})">참여 취소</button>`;

                    const catInfo = categoryMap[product.category] || { defaultImg: defaultEtcImg };
                    const displayImg = catInfo.defaultImg;

                    card.innerHTML = `
                        <img src="${displayImg}" alt="상품" class="product-img" onerror="this.onerror=null; this.src='${defaultEtcImg}';">
                        <div class="product-info">
                            <span class="status-badge ${statusClass}">${statusText}</span>
                            <div class="product-name" onclick="location.href='product.html?id=${product.product_id}'">${product.title}</div>
                            <div class="product-meta">
                                <span>💰 ${Number(product.price).toLocaleString()}원</span>
                                <span>👥 ${product.currentCount} / ${product.targetCount}명</span>
                            </div>
                        </div>
                        <div class="manage-btns">
                            <a href="direct_chattings.html?id=${product.product_id}" class="btn-manage btn-chat">채팅방</a>
                            ${cancelBtnHtml}
                        </div>
                    `;
                    listContainer.appendChild(card);
                });
            } catch (error) {
                console.error('데이터 로드 실패:', error);
                listContainer.innerHTML = '<p style="text-align:center; color:#999; padding:40px;">목록을 불러오는 중 오류가 발생했습니다.</p>';
            }
        });

        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const authButtons = document.querySelectorAll('.auth-only');
            const guestButtons = document.querySelectorAll('.guest-only');
            if (isLoggedIn) {
                authButtons.forEach(btn => btn.style.display = 'inline-block');
                guestButtons.forEach(btn => btn.style.display = 'none');
            }
        }

        // 참여 취소 로직
        async function cancelJoin(id) {
            if (!confirm("정말로 이 공구 참여를 취소하시겠습니까?")) {
                return;
            }

            const userId = localStorage.getItem('userId');

            if (!userId) {
                alert('로그인이 필요합니다.');
                location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch('https://campusgonggu-production.up.railway.app/participants/cancel', {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        productId: id,
                        userId: userId
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    alert(result.message || '참여 취소 실패');
                    return;
                }

                alert("참여가 취소되었습니다.");
                location.reload();

            } catch (error) {
                console.error(error);
                alert("서버 연결 실패");
            }
        }
    </script>
</body>
</html>
