<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>참여 중인 공고 | KU GONGGU</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/joined_products.css">
    <link rel="stylesheet" href="./mobile.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">참여 중인 공고 <span id="count-badge">0</span></h1>
        </div>
        
        <div id="product-list" class="product-list">
            </div>

        <div id="empty-view" class="empty-state" style="display: none;">
            <p>현재 참여 중인 공동구매가 없습니다.<br>마음에 드는 공구를 찾아 참여해보세요!</p>
            <a href="main_login.html" class="btn-go-main">공구 둘러보기</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. 헤더 불러오기
            fetch('header.html')
                .then(res => res.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                    updateHeader();
                });

            const listContainer = document.getElementById('product-list');
            const emptyView = document.getElementById('empty-view');
            const countBadge = document.getElementById('count-badge');
            const userId = localStorage.getItem('userId');

            if (!userId) {
                alert('로그인이 필요합니다.');
                location.href = 'login.html';
                return;
            }

            try {
                // 1. 내가 '참여한' 공고 리스트 가져오기
                const response = await fetch(`http://localhost:3000/chats/my/${userId}`);
                let joinedProducts = await response.json();

                // 2. 전체 상품 가져와서 내가 '직접 올린' 공고 필터링하기
                const productResponse = await fetch('http://localhost:3000/products');
                const allProducts = await productResponse.json();
                const myCreatedProducts = allProducts.filter(p => String(p.user_id) === String(userId));

                // 3. 두 목록 병합 (중복 방지)
                const joinedProductIds = joinedProducts.map(p => String(p.product_id));
                myCreatedProducts.forEach(myProduct => {
                    if (!joinedProductIds.includes(String(myProduct.id))) {
                        joinedProducts.push({
                            ...myProduct,
                            product_id: myProduct.id // 아래 화면 그리기 로직에서 통일해서 쓰기 위함
                        });
                    }
                });

                // 최신 글이 위로 오도록 정렬
                joinedProducts.sort((a, b) => b.product_id - a.product_id);

                countBadge.innerText = joinedProducts.length;

                if (joinedProducts.length === 0) {
                    emptyView.style.display = 'block';
                    return;
                }

                // 💡 기본 이미지 매핑 정보 (product.html과 동일)
                const categoryMap = {
                    '식재료 / 배달': { emoji: '🍊', className: 'tag-food', defaultImg: 'images/default-food.png' },
                    '자취 / 생필품': { emoji: '🧴', className: 'tag-living', defaultImg: 'images/default-living.png' },
                    '전공 / 문구': { emoji: '📚', className: 'tag-study', defaultImg: 'images/default-study.png' },
                    '기타 물품': { emoji: '📦', className: 'tag-etc', defaultImg: 'images/default-etc.png' }
                };
                const defaultEtcImg = 'images/default-etc.png'; // 대체용 기타 이미지

                // 4. 화면에 리스트 그리기
                joinedProducts.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    
                    // 현재 시간 구하기 (초 단위)
                    const now = Math.floor(Date.now() / 1000);

                    // 1. 목표 인원 달성
                    // 2. 백엔드에서 넘겨준 isClosed 값이 true일 때
                    // 3. 또는 마감 시간(duration)이 현재 시간보다 과거일 때(조기마감 포함)
                    const isCompleted = (product.currentCount >= product.targetCount) || 
                                        product.isClosed || 
                                        (Number(product.duration) <= now);
                    
                    const statusClass = isCompleted ? 'status-completed' : 'status-recruiting';
                    const statusText = isCompleted ? '마감됨' : '모집중';

                    // 💡 방장(내가 올린 글)일 경우 '참여 취소' 버튼 대신 안내 텍스트 표시
                    const isHost = String(product.user_id) === String(userId);
                    const cancelBtnHtml = isHost 
                        ? `<span style="font-size: 0.8rem; color: #888; text-align: center; margin-top: 5px; padding: 10px 0;">내가 쓴 공고</span>` 
                        : `<button class="btn-manage btn-cancel" onclick="cancelJoin(${product.product_id})">참여 취소</button>`;

                    // 💡 카테고리별 기본 이미지 및 방어 로직 적용
                    const catInfo = categoryMap[product.category] || { defaultImg: defaultEtcImg };
                    const displayImg = catInfo.defaultImg;

                    card.innerHTML = `
                        <img src="${displayImg}" alt="상품" class="product-img" onerror="this.onerror=null; this.src='${defaultEtcImg}';">
                        <div class="product-info">
                            <span class="status-badge ${statusClass}">${statusText}</span>
                            <div class="product-name" onclick="location.href='product.html?id=${product.product_id}'">${product.title}</div>
                            <div class="product-meta">
                                <span>💰 ${Number(product.price).toLocaleString()}원</span>
                                <span>👥 ${product.currentCount} / ${product.targetCount}명</span>
                            </div>
                        </div>
                        <div class="manage-btns">
                            <a href="direct_chattings.html?id=${product.product_id}" class="btn-manage btn-chat">채팅방</a>
                            ${cancelBtnHtml}
                        </div>
                    `;
                    listContainer.appendChild(card);
                });

            } catch (error) {
                console.error('데이터 로드 실패:', error);
                listContainer.innerHTML = '<p style="text-align:center; color:#999; padding:40px;">목록을 불러오는 중 오류가 발생했습니다.</p>';
            }
        });

        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const authButtons = document.querySelectorAll('.auth-only');
            const guestButtons = document.querySelectorAll('.guest-only');
            if (isLoggedIn) {
                authButtons.forEach(btn => btn.style.display = 'inline-block');
                guestButtons.forEach(btn => btn.style.display = 'none');
            }
        }

        // 참여 취소 로직
        async function cancelJoin(id) {
            if (!confirm("정말로 이 공구 참여를 취소하시겠습니까?")) {
                return;
            }

            const userId = localStorage.getItem('userId');

            if (!userId) {
                alert('로그인이 필요합니다.');
                location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/participants/cancel', {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        productId: id,
                        userId: userId
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    alert(result.message || '참여 취소 실패');
                    return;
                }

                alert("참여가 취소되었습니다.");
                location.reload();

            } catch (error) {
                console.error(error);
                alert("서버 연결 실패");
            }
        }
    </script>
</body>
</html>
