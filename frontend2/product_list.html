<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KUgether - 검색 결과</title>

    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/product_list.css">
    <link rel="stylesheet" href="./css/skeleton.css">

    <link rel="stylesheet" href="css_mobile/product_list_mobile.css" media="(max-width: 768px)">
</head>

<body>

    <div id="header-placeholder"></div>

    <section class="search-hero">
        <div class="search-box-wrapper">
            <input type="text" id="main-search" class="custom-search-input" placeholder="어떤 물품을 찾고 계신가요?">
            
            <button id="search-btn" type="button" class="search-btn-custom">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888888" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>

        <div class="category-filter-row" id="category-buttons">
            <button class="filter-btn btn-food" onclick="filterCategory('식재료 / 배달')">🍊 식재료 / 배달</button>
            <button class="filter-btn btn-living" onclick="filterCategory('자취 / 생필품')">🧴 자취 / 생필품</button>
            <button class="filter-btn btn-study" onclick="filterCategory('전공 / 문구')">📚 전공 / 문구</button>
            <button class="filter-btn btn-etc" onclick="filterCategory('기타 물품')">📦 기타 물품</button>
            <button class="filter-btn" onclick="clearCategory()" style="background-color: #eee;">🏠 전체</button>
        </div>
    </section>

    <main class="container">
        <div class="filter-toggle-wrap" style="display: flex; justify-content: flex-end; margin-bottom: 15px;">
            <label for="hide-completed" class="custom-checkbox-label">
                <input type="checkbox" id="hide-completed">
                <span class="checkbox-icon"></span>
                모집완료 숨기기
            </label>
        </div>

        <!-- 검색 결과 문구 영역 -->
        <div id="resultText" class="result-info" style="display: none; margin-bottom: 20px"></div>

        <!-- 열 선택 버튼 (클릭마다 순환) -->
        <div class="cols-selector">
            <button class="col-cycle-btn" id="col-cycle-btn" onclick="cycleGridCols()">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor">
                    <rect x="0" y="0" width="3.5" height="3.5" rx="0.8"/>
                    <rect x="4.75" y="0" width="3.5" height="3.5" rx="0.8"/>
                    <rect x="9.5" y="0" width="3.5" height="3.5" rx="0.8"/>
                    <rect x="0" y="4.75" width="3.5" height="3.5" rx="0.8"/>
                    <rect x="4.75" y="4.75" width="3.5" height="3.5" rx="0.8"/>
                    <rect x="9.5" y="4.75" width="3.5" height="3.5" rx="0.8"/>
                    <rect x="0" y="9.5" width="3.5" height="3.5" rx="0.8"/>
                    <rect x="4.75" y="9.5" width="3.5" height="3.5" rx="0.8"/>
                    <rect x="9.5" y="9.5" width="3.5" height="3.5" rx="0.8"/>
                </svg>
                <span id="col-label">3열</span>
            </button>
        </div>

        <!-- 3. 공구방 카드 리스트 영역 -->
        <div id="roomGrid" class="product-grid cols-3"></div>

        <!-- 4. 더보기 버튼 영역 -->
        <div id="loadMoreArea" style="text-align: center; margin-top: 40px; display: none;">
            <button id="loadMoreBtn"
                style="padding: 12px 40px; border-radius: 30px; border: 1px solid #ccc; background: white; cursor: pointer; font-weight: 700; transition: all 0.2s;">
                더보기 ▾
            </button>
        </div>
    </main>

    <script>
        // [함수] 카테고리 및 검색 해제 (전체보기)
        function clearCategory() {
            location.href = 'product_list.html';
        }

        // [함수] 특정 카테고리로 필터링 이동
        function filterCategory(categoryName) {
            location.href = `product_list.html?category=${encodeURIComponent(categoryName)}`;
        }

        // [함수] 로그인 상태에 따른 헤더 버튼 제어
        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const authElements = document.querySelectorAll('.auth-only');
            const guestElements = document.querySelectorAll('.guest-only');

            if (isLoggedIn) {
                authElements.forEach(el => el.style.display = 'inline-block');
                guestElements.forEach(el => el.style.display = 'none');
            } else {
                authElements.forEach(el => el.style.display = 'none');
                guestElements.forEach(el => el.style.display = 'inline-block');
            }
        }

        // 열 순환 기능
        const DESKTOP_COLS = [2, 3, 4, 6];
        const MOBILE_COLS  = [1, 2, 3];

        function isMobile() { return window.innerWidth <= 768; }

        function setGridCols(cols) {
            const grid = document.getElementById('roomGrid');
            grid.className = grid.className.replace(/\bcols-\d+\b/, '').trim();
            grid.classList.add(`cols-${cols}`);
            localStorage.setItem(isMobile() ? 'gridColsMobile' : 'gridColsDesktop', cols);
            document.getElementById('col-label').textContent = `${cols}열`;
            // 열 변경 시 2행 분량으로 재설정 후 재렌더링
            if (typeof displayCount !== 'undefined' && typeof renderGrid === 'function') {
                displayCount = cols * 2;
                renderGrid();
            }
        }

        function cycleGridCols() {
            const cols = isMobile() ? MOBILE_COLS : DESKTOP_COLS;
            const grid = document.getElementById('roomGrid');
            const m = grid.className.match(/cols-(\d+)/);
            const cur = m ? Number(m[1]) : cols[0];
            const idx = cols.indexOf(cur);
            setGridCols(cols[(idx + 1) % cols.length]);
        }

        function initGridCols() {
            const mobile = isMobile();
            const cols   = mobile ? MOBILE_COLS : DESKTOP_COLS;
            let saved    = Number(localStorage.getItem(mobile ? 'gridColsMobile' : 'gridColsDesktop'));
            if (!cols.includes(saved)) saved = mobile ? 2 : 3;
            setGridCols(saved);
        }

        document.addEventListener('DOMContentLoaded', () => {
            initGridCols();
    // 1. 헤더 불러오기
    fetch('header.html')
        .then(res => {
            if (!res.ok) throw new Error('header.html 파일을 찾을 수 없습니다.');
            return res.text();
        })
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
            updateHeader();
        })
        .catch(err => console.error('헤더 로딩 에러:', err));

    // 2. URL 파라미터 읽어오기
    const urlParams = new URLSearchParams(window.location.search);
    const category = urlParams.get('category');
    const searchTerm = urlParams.get('search');
    const hideClosed = urlParams.get('hideClosed');

    const searchInput = document.getElementById('main-search');
    const searchBtn = document.getElementById('search-btn'); // 돋보기 버튼
    const hideCheckbox = document.getElementById('hide-completed'); // 체크박스

    // 3. 검색어 상태 복구
    if (searchTerm && searchInput) {
        searchInput.value = searchTerm;
    }

    // 4. 모집완료 숨기기 체크박스 상태 복구
    if (hideClosed === 'true' && hideCheckbox) {
        hideCheckbox.checked = true;
    }

    // 5. 현재 선택된 카테고리 버튼 강조 (프로젝트 포인트 컬러 적용)
    if (category) {
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => {
            if (btn.innerText.includes(category)) {
                btn.style.backgroundColor = '#8A1538';
                btn.style.color = 'white';
            }
        });
    }

    // 6. 이벤트 리스너 연결
    // 6-1. 검색창에서 엔터키 눌렀을 때
    if (searchInput) {
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                performSearch(); 
            }
        });
    }

    // 6-2. 돋보기 버튼 눌렀을 때
    if (searchBtn) {
        searchBtn.addEventListener('click', () => {
            performSearch(); 
        });
    }

    // 6-3. 체크박스 상태를 변경했을 때 바로 필터링 적용
    if (hideCheckbox) {
        hideCheckbox.addEventListener('change', () => {
            performSearch();
        });
    }
});


function performSearch() {
    const searchInput = document.getElementById('main-search');
    const hideCheckbox = document.getElementById('hide-completed'); // 체크박스 가져오기
    if (!searchInput) return;

    const keyword = searchInput.value.trim();
    const isHideClosed = hideCheckbox ? hideCheckbox.checked : false;
    const urlParams = new URLSearchParams(window.location.search);
    const currentCat = urlParams.get('category');

    // 1. 검색어 포함
    let targetUrl = `product_list.html?search=${encodeURIComponent(keyword)}`;
    
    // 2. 카테고리 유지
    if (currentCat) {
        targetUrl += `&category=${encodeURIComponent(currentCat)}`;
    }

    // 3. ✅ 모집완료 숨기기 상태 포함
    if (isHideClosed) {
        targetUrl += `&hideClosed=true`;
    }

    location.href = targetUrl;
}
        // [로직] 로그아웃 버튼 클릭 처리
        document.addEventListener('click', function (e) {
            const logoutBtn = e.target.closest('#logout-btn');
            if (logoutBtn) {
                localStorage.removeItem('isLoggedIn');
                alert('로그아웃 되었습니다.');
                location.href = 'main_login.html';
            }
        });
    </script>

    <!-- 5. 모든 비즈니스 로직이 담긴 외부 JS 파일 연결 -->
    <script src="script.js"></script>

</body>

</html>
