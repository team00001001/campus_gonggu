<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알림 | KU GONGGU</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/notifications.css">
    <link rel="stylesheet" href="css_mobile/notifications_mobile.css" media="(max-width: 768px)">
</head>

<body>

    <div id="header-placeholder"></div>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">알림</h1>
            <button class="btn-read-all" onclick="markAllAsRead()">모두 읽음 처리</button>
        </div>

        <div class="noti-list" id="noti-list">
        </div>

        <div class="empty-state" id="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <p>새로운 알림이 없습니다.</p>
        </div>
    </div>

    <script>
        // 1. 헤더 로드
        fetch('header.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                updateHeader();
                loadNotifications();
            });

        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const authButtons = document.querySelectorAll('.auth-only');
            const guestButtons = document.querySelectorAll('.guest-only');

            if (isLoggedIn) {
                authButtons.forEach(btn => btn.style.display = 'inline-block');
                guestButtons.forEach(btn => btn.style.display = 'none');
            } else {
                authButtons.forEach(btn => btn.style.display = 'none');
                guestButtons.forEach(btn => btn.style.display = 'inline-block');

                alert('로그인이 필요한 서비스입니다.');
                location.href = 'login.html';
            }
        }

        // 로그아웃 이벤트
        document.addEventListener('click', function (e) {
            if (e.target && e.target.id === 'logout-btn') {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('userNickname');
                localStorage.removeItem('userId');
                alert('로그아웃 되었습니다.');
                location.href = 'main_login.html';
            }
        });

        let notifications = [];

        async function loadNotifications() {
            const userId = localStorage.getItem('userId');
            if (!userId) return;

            try {
                const response = await fetch(`https://campusgonggu-production.up.railway.app/notifications/${userId}`);
                notifications = await response.json();

                console.log('현재 로그인 userId:', userId);
                console.log('불러온 알림:', notifications);
                renderNotifications();
                updateNotificationBadge();
            } catch (error) {
                console.error('알림 불러오기 실패:', error);
            }
        }

        function updateNotificationBadge() {
            const badge = document.querySelector('.noti-badge');
            if (!badge) return;

            const hasUnread = notifications.some(n => Number(n.is_read) === 0);
            badge.style.display = hasUnread ? 'block' : 'none';
        }

        // 3. 알림 화면 렌더링 함수 (삭제 버튼 추가됨)
        function renderNotifications() {
            const listContainer = document.getElementById('noti-list');
            const emptyState = document.getElementById('empty-state');

            listContainer.innerHTML = ''; // 초기화

            if (notifications.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            notifications.forEach(noti => {
                let iconClass = '';
                let iconEmoji = '';

                if (noti.type === 'chat') { iconClass = 'icon-chat'; iconEmoji = '💬'; }
                else if (noti.type === 'success') { iconClass = 'icon-success'; iconEmoji = '🎉'; }
                else { iconClass = 'icon-notice'; iconEmoji = '📢'; }

                let chatLink = '#';
                if (noti.product_id) {
                    if (noti.type === 'chat') {
                        chatLink = `direct_chattings.html?id=${noti.product_id}`;
                    } else {
                        chatLink = `product.html?id=${noti.product_id}`;
                    }
                }

                const notiHTML = `
                    <div class="noti-item ${noti.is_read ? '' : 'unread'}" ${chatLink !== '#' ? 'style="cursor:pointer;"' : ''}
                        onclick="readAndGo(${noti.id}, '${chatLink}')">

                        <div class="noti-icon ${iconClass}">
                            ${iconEmoji}
                        </div>

                        <div class="noti-content">
                            <div class="noti-header">
                                <span class="noti-title">${noti.title}</span>

                                <div style="display:flex; align-items:center; gap: 8px;">
                                    <span class="noti-time">
                                        ${new Date(noti.created_at).toLocaleString()}
                                    </span>
                                    <button class="btn-delete-noti" onclick="deleteNotification(event, ${noti.id})">삭제</button>
                                </div>
                            </div>

                            <div class="noti-desc">
                                ${noti.message}
                            </div>

                            ${noti.is_read ? '' : '<div class="noti-dot"></div>'}
                        </div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', notiHTML);
            });
        }

        // 4. 클릭 시 읽음 처리 후 이동
        function readAndGo(id, link) {
            fetch(`https://campusgonggu-production.up.railway.app/notifications/${id}/read`, { method: 'PATCH' });
            
            notifications = notifications.map(n => {
                return n.id === id ? { ...n, is_read: 1 } : n;
            });
            renderNotifications();
            updateNotificationBadge();

            if (link !== '#') location.href = link;
        }

        // 5. 모두 읽음 처리
        async function markAllAsRead() {
            const userId = localStorage.getItem('userId');
            try {
                await fetch(`https://campusgonggu-production.up.railway.app/notifications/user/${userId}/read-all`, {
                    method: 'PATCH'
                });

                notifications = notifications.map(n => ({ ...n, is_read: 1 }));
                renderNotifications();
                updateNotificationBadge();

            } catch (error) {
                console.error('모두 읽음 처리 실패:', error);
            }
        }

        // 6. 💡 알림 삭제 처리 로직 (새로 추가됨)
        async function deleteNotification(event, id) {
            // 부모 요소인 알림 박스의 클릭(readAndGo) 이벤트가 작동하지 않도록 막습니다.
            event.stopPropagation();

            if (!confirm('이 알림을 삭제하시겠습니까?')) return;

            // 프론트엔드에서 즉시 숨김 처리
            notifications = notifications.filter(n => n.id !== id);
            renderNotifications();
            updateNotificationBadge();

            // 백엔드에 삭제 요청
            try {
                const response = await fetch(`https://campusgonggu-production.up.railway.app/notifications/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    console.error('백엔드에서 알림 삭제를 실패했습니다.');
                }
            } catch (error) {
                console.error('알림 삭제 요청 중 에러 발생:', error);
            }
        }

        // 페이지 로드 시 렌더링 실행
        document.addEventListener('DOMContentLoaded', loadNotifications);
    </script>
</body>

</html>
