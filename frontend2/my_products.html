<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 공고 관리 | KU GONGGU</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="css/my_products.css">
<link rel="stylesheet" href="css_mobile/my_products_mobile.css" media="(max-width: 768px)">
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">내가 올린 공고 <span id="count-badge">0</span></h1>
        </div>
        
        <div id="product-list" class="product-list"></div>

        <div id="empty-view" class="empty-state" style="display: none;">
            <p>아직 올린 공동구매 공고가 없네요!<br>직접 공구를 열어 학우들을 모아보세요.</p>
            <a href="writefront.html" class="btn-write">공구 글 쓰기</a>
        </div>
    </div>

    <script>
        // 🚨 1. 알림 배지 업데이트 함수 추가
        async function updateHeaderNotificationBadge() {
            const userId = localStorage.getItem('userId');
            const badge = document.querySelector('.noti-badge');
            if (!badge || !userId) return;
            try {
                const res = await fetch(`https://campusgonggu-production.up.railway.app/notifications/${userId}`);
                const notifications = await res.json();
                const hasUnread = notifications.some(n => Number(n.is_read) === 0);
                badge.style.display = hasUnread ? 'block' : 'none';
            } catch (err) {
                badge.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // 2. 헤더 불러오기 (로그아웃 기능 및 알림 배지 기능 포함)
            fetch('header.html')
                .then(res => res.text())
                .then(data => {
                    // HTML 삽입
                    document.getElementById('header-placeholder').innerHTML = data;
                    updateHeader();
                    
                    // 🚨 2. 헤더 로드 직후 알림 배지 함수 실행
                    updateHeaderNotificationBadge();

                    // 로그아웃 버튼 연결
                    const logoutBtn = document.getElementById('logout-btn');
                    if (logoutBtn) {
                        logoutBtn.onclick = function() {
                            if (confirm('로그아웃 하시겠습니까?')) {
                                localStorage.removeItem('userId');
                                localStorage.removeItem('isLoggedIn');
                                alert('로그아웃 되었습니다.');
                                location.href = 'main_login.html';
                            }
                        };
                    }
                });

            const listContainer = document.getElementById('product-list');
            const emptyView = document.getElementById('empty-view');
            const countBadge = document.getElementById('count-badge');

            // 2. 현재 로그인한 사용자 고유 ID 확인 (localStorage에 userId가 저장되어 있어야 합니다)
            const myId = localStorage.getItem('userId'); 

            if (!myId) {
                alert("로그인이 필요합니다.");
                location.href = 'login.html';
                return;
            }

            try {
                // 3. 백엔드에서 데이터 불러오기
                const response = await fetch('https://campusgonggu-production.up.railway.app/products'); 
                const allProducts = await response.json();

                // 4. 내가 올린 글만 필터링 (백엔드에서 주는 user_id 필드와 비교)
                // 숫자인지 문자열인지 확실하지 않을 때는 == 를 쓰거나 Number()를 씌워주면 안전합니다.
                const myProducts = allProducts.filter(p => p.user_id == myId);
                
                countBadge.innerText = myProducts.length;

                // 💡 기본 이미지 매핑 정보 (product.html과 동일)
                const categoryMap = {
                    '식재료 / 배달': { emoji: '🍊', className: 'tag-food', defaultImg: 'images/default-food.png' },
                    '자취 / 생필품': { emoji: '🧴', className: 'tag-living', defaultImg: 'images/default-living.png' },
                    '전공 / 문구': { emoji: '📚', className: 'tag-study', defaultImg: 'images/default-study.png' },
                    '기타 물품': { emoji: '📦', className: 'tag-etc', defaultImg: 'images/default-etc.png' }
                };
                const defaultEtcImg = 'images/default-etc.png'; // 대체용 기타 이미지

                // 5. 화면에 렌더링
                myProducts.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    
                    // 현재 시간 구하기 (초 단위)
                    const now = Math.floor(Date.now() / 1000);

                    // 1. 목표 인원 달성
                    // 2. 백엔드에서 넘겨준 isClosed 값이 true일 때
                    // 3. 또는 마감 시간(duration)이 현재 시간보다 과거일 때(조기마감 포함)
                    const isCompleted = (product.currentCount >= product.targetCount) || 
                                        product.isClosed || 
                                        (Number(product.duration) <= now);
                    
                    const statusClass = isCompleted ? 'status-completed' : 'status-recruiting';
                    // 조기마감이나 기한 만료도 고려하여 텍스트를 마감/모집완료 등으로 적절히 표시
                    const statusText = isCompleted ? '마감됨' : '모집중';

                    // 💡 카테고리별 기본 이미지 및 방어 로직 적용
                    const catInfo = categoryMap[product.category] || { defaultImg: defaultEtcImg };
                    const displayImg = catInfo.defaultImg;

                    card.innerHTML = `
                        <img src="${displayImg}" alt="상품" class="product-img" onerror="this.onerror=null; this.src='${defaultEtcImg}';">
                        <div class="product-info">
                            <span class="status-badge ${statusClass}">${statusText}</span>
                            <div class="product-name" onclick="location.href='product.html?id=${product.id}'">${product.title}</div>
                            <div class="product-meta">
                                <span>💰 ${Number(product.price).toLocaleString()}원</span>
                                <span>👥 ${product.currentCount} / ${product.targetCount}명</span>
                            </div>
                        </div>
                        <div class="manage-btns">
                            <a href="direct_chattings.html?id=${product.id}" class="btn-manage btn-chat">채팅방</a>
                            ${!isCompleted ? `<a href="edit.html?id=${product.id}" class="btn-manage btn-edit">수정</a>` : ''}
                            <a href="#" class="btn-manage  btn-danger btn-delete" onclick="deleteProduct(${product.id})">삭제</a>
                        </div>
                    `;
                    listContainer.appendChild(card);
                });
            } catch (error) {
                console.error('데이터 로드 실패:', error);
                listContainer.innerHTML = '<p style="text-align:center; color:#999; padding: 40px 0;">공고 목록을 불러오는 중 오류가 발생했습니다.<br>서버(백엔드)가 켜져 있는지 확인해주세요.</p>';
            }
        });

        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const authButtons = document.querySelectorAll('.auth-only');
            const guestButtons = document.querySelectorAll('.guest-only');
            if (isLoggedIn) {
                authButtons.forEach(btn => btn.style.display = 'inline-block');
                guestButtons.forEach(btn => btn.style.display = 'none');
            }
        }

    async function deleteProduct(id) {
    try {
        // 1. 서버에서 해당 상품의 최신 정보를 먼저 가져옴
        const res = await fetch(`https://campusgonggu-production.up.railway.app/products/${id}`);
        const product = await res.json();

        // 2. 참여자 체크 (작성자 본인 포함 currentCount가 1보다 크면 참여자가 있는 것)
        if (product.currentCount > 1) {
            alert("현재 참여자가 있어 게시글을 삭제할 수 없습니다.");
            return; // 삭제 중단
        }

        // 3. 참여자가 없을 때만 최종 삭제 확인 및 요청
        if(confirm("정말로 이 공고를 삭제하시겠습니까?")) {
            const response = await fetch(`https://campusgonggu-production.up.railway.app/products/${id}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                alert("삭제되었습니다.");
                location.reload(); 
            } else {
                const errorData = await response.json();
                alert(errorData.message || '삭제 실패');
            }
        }
    } catch (error) {
        console.error(error);
        alert("데이터 확인 중 오류가 발생했습니다.");
    }
}
    </script>
</body>
</html>
