<!DOCTYPE html>

<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공동구매 글 작성</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquareRound@1.0/nanumsquareround.css">
    <link rel="stylesheet" href="css/writefront.css">
    <link rel="stylesheet" href="css_mobile/writefront_mobile.css" media="(max-width: 768px)">
    <style>
        .info-text {
            font-size: 0.85rem;
            color: #888;
            font-weight: normal;
            margin-left: 8px;
        }
        .price-type-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .price-type-btn {
            padding: 6px 18px;
            border-radius: 20px;
            border: 1.5px solid #ccc;
            background: white;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: #888;
            transition: all 0.18s;
        }
        .price-type-btn.active {
            border-color: #8A1538;
            background: #8A1538;
            color: white;
        }
        .calc-result-box {
            margin-top: 10px;
            padding: 12px 16px;
            background: #fff5f7;
            border: 1.5px solid #f5c0cc;
            border-radius: 10px;
            font-size: 0.92rem;
            color: #8A1538;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <a href="main_login.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>
        <div class="header-title">메인 페이지</div>
    </header>

    <main>
        <form class="write-form">
            <div class="input-group">
                <label for="category" class="required">카테고리 선택</label>
                <select id="category" name="category">
                    <option value="food">🍊 식재료 / 배달</option>
                    <option value="living">🧴 자취 / 생필품</option>
                    <option value="study">📚 전공 / 문구</option>
                    <option value="etc">📦 기타 물품</option>
                </select>
            </div>

            <div class="input-group">
                <label for="productName" class="required">상품명</label>
                <input type="text" id="productName" placeholder="예) 유기농 햇감자 3kg 나눌 분!" required>
            </div>
            
            <div class="input-group short-input">
                <label for="people" class="required">모집 인원 (본인 포함)</label>
                <input type="number" id="people" placeholder="예) 5" min="2" required oninput="updateCalc()">
            </div>

            <div class="input-group">
                <label class="required">상품 가격 (원)</label>
                <div class="price-type-row">
                    <button type="button" id="btn-total" class="price-type-btn active" onclick="setPriceType('total')">전체 가격</button>
                    <button type="button" id="btn-per" class="price-type-btn" onclick="setPriceType('per')">개당 가격</button>
                </div>
                <input type="number" id="productPrice" placeholder="예) 25000" min="0" required oninput="updateCalc()">
            </div>

            <div class="input-group short-input">
                <label for="shippingFee">배송비 (원) <span class="info-text">없으면 0</span></label>
                <input type="number" id="shippingFee" placeholder="예) 3000" min="0" value="0" oninput="updateCalc()">
            </div>

            <div class="calc-result-box" id="calc-result-box" style="display:none;">
                인당 예상 금액: <strong id="calc-amount">0원</strong>
                <span id="calc-formula" style="font-weight:400; color:#aaa; font-size:0.8rem; margin-left:8px;"></span>
            </div>

            <div class="input-group">
                <label for="periodValue" class="required">모집 기간 (최대 1년)</label>
                <div style="width: 60%; display: flex; gap: 0.5rem;">
                    <input type="number" id="periodValue" placeholder="예) 3" min="1" required style="flex: 1;">
                    <select id="periodUnit" style="flex: 1;">
                        <option value="minute">분 (Minute)</option>
                        <option value="hour">시간 (Hour)</option>
                        <option value="day" selected>일 (Day)</option>
                        <option value="month">개월 (Month)</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label for="location" class="required">수령/배분 장소</label>
                <input type="text" id="location" placeholder="예) 정보관 1층 라운지" required>
            </div>

            <div class="input-group">
                <label for="productUrl">상품 URL <span class="info-text">(온라인 구매 상품인 경우 작성)</span></label>
                <input type="url" id="productUrl" placeholder="예) https://...">
            </div>

            <div class="input-group">
                <label>상품 이미지 (선택)</label>
                <div id="upload-area" style="border:2px dashed #ddd; border-radius:12px; padding:24px; text-align:center; cursor:pointer; transition:border-color 0.2s;" onclick="document.getElementById('imageFile').click()" onmouseover="this.style.borderColor='#8A1538'" onmouseout="this.style.borderColor='#ddd'">
                    <div id="upload-placeholder">
                        <div style="font-size:2rem;">📷</div>
                        <div style="font-size:0.9rem; font-weight:600; margin-top:6px;">클릭하여 이미지 업로드</div>
                        <div style="font-size:0.78rem; color:#bbb; margin-top:4px;">JPG · PNG · WEBP</div>
                    </div>
                    <img id="image-preview" src="" style="display:none; max-width:100%; max-height:220px; border-radius:8px; object-fit:cover;">
                </div>
                <input type="file" id="imageFile" accept="image/*" style="display:none" onchange="uploadImage(this)">
                <input type="hidden" id="imageUrl">
                <div id="upload-status" style="font-size:0.83rem; margin-top:6px; color:#888;"></div>
            </div>

            <div class="input-group">
                <label for="description" class="required">상세 설명</label>
                <textarea id="description" placeholder="어떤 상품인지, 왜 같이 사고 싶은지 자세히 적어주세요!&#10;예) 배송비 아끼려고 공구 엽니다." required></textarea>
            </div>

            <button type="submit" class="submit-btn">공동구매 등록하기</button>
        </form>
    </main>

    <script>
        // ✅ ImgBB API 키 (api.imgbb.com 에서 발급)
        const IMGBB_API_KEY = 'd98a8a334081db95d243580679916426';

        async function uploadImage(input) {
            const file = input.files[0];
            if (!file) return;

            const statusEl = document.getElementById('upload-status');
            const previewEl = document.getElementById('image-preview');
            const placeholderEl = document.getElementById('upload-placeholder');

            statusEl.textContent = '⏳ 업로드 중...';
            statusEl.style.color = '#888';

            // 파일을 base64로 변환
            const base64 = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result.split(',')[1]);
                reader.readAsDataURL(file);
            });

            const formData = new FormData();
            formData.append('key', IMGBB_API_KEY);
            formData.append('image', base64);

            try {
                const res = await fetch('https://api.imgbb.com/1/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (data.success) {
                    const url = data.data.url;
                    document.getElementById('imageUrl').value = url;
                    previewEl.src = url;
                    previewEl.style.display = 'block';
                    placeholderEl.style.display = 'none';
                    statusEl.textContent = '✅ 업로드 완료';
                    statusEl.style.color = '#8A1538';
                } else {
                    statusEl.textContent = '업로드 실패: ' + (data.error?.message || '알 수 없는 오류');
                    statusEl.style.color = '#e00';
                }
            } catch (err) {
                console.error(err);
                statusEl.textContent = '업로드 실패. API 키를 확인해주세요.';
                statusEl.style.color = '#e00';
            }
        }

        let priceType = 'total';

        function setPriceType(type) {
            priceType = type;
            document.getElementById('btn-total').classList.toggle('active', type === 'total');
            document.getElementById('btn-per').classList.toggle('active', type === 'per');
            updateCalc();
        }

        function updateCalc() {
            const price = Number(document.getElementById('productPrice').value) || 0;
            const shipping = Number(document.getElementById('shippingFee').value) || 0;
            const people = Number(document.getElementById('people').value) || 1;

            const box = document.getElementById('calc-result-box');
            const amountEl = document.getElementById('calc-amount');
            const formulaEl = document.getElementById('calc-formula');

            if (price <= 0) { box.style.display = 'none'; return; }
            box.style.display = 'block';

            let perPerson;
            if (priceType === 'total') {
                perPerson = Math.ceil((price + shipping) / people);
                formulaEl.textContent = `(${price.toLocaleString()} + 배송비${shipping.toLocaleString()}) ÷ ${people}명`;
            } else {
                perPerson = Math.ceil(price + shipping / people);
                formulaEl.textContent = `개당 ${price.toLocaleString()} + 배송비${shipping.toLocaleString()} ÷ ${people}명`;
            }
            amountEl.textContent = perPerson.toLocaleString() + '원';
        }

        document.querySelector('.write-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const categoryMap = {
                food: '식재료 / 배달',
                living: '자취 / 생필품',
                study: '전공 / 문구',
                etc: '기타 물품'
            };

            const pValue = Number(document.getElementById('periodValue').value);
            const pUnit = document.getElementById('periodUnit').value;

            const expireDate = new Date();

            if (pUnit === 'minute') {
                expireDate.setMinutes(expireDate.getMinutes() + pValue);
            } else if (pUnit === 'hour') {
                expireDate.setHours(expireDate.getHours() + pValue);
            } else if (pUnit === 'day') {
                expireDate.setDate(expireDate.getDate() + pValue);
            } else if (pUnit === 'month') {
                expireDate.setMonth(expireDate.getMonth() + pValue);
            }

            const expireAt = Math.floor(expireDate.getTime() / 1000);

            const productData = {
                title: document.getElementById('productName').value,
                category: categoryMap[document.getElementById('category').value],
                targetCount: Number(document.getElementById('people').value),
                price: Number(document.getElementById('productPrice').value),
                shipping_fee: Number(document.getElementById('shippingFee').value) || 0,
                price_type: priceType,
                duration: expireAt,
                location: document.getElementById('location').value,
                productUrl: document.getElementById('productUrl').value || '',
                imageUrl: document.getElementById('imageUrl').value,
                description: document.getElementById('description').value,
                user_id: localStorage.getItem('userId')
            };

            try {
                const response = await fetch('https://campusgonggu-production.up.railway.app/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(productData)
                });

                const result = await response.json();

                if (!response.ok) {
                    alert(result.error || '상품 등록 실패');
                    return;
                }

                alert('상품 등록 성공!');
                location.href = 'product_list.html';

            } catch (error) {
                console.error(error);
                alert('서버 연결 실패. 백엔드 서버가 켜져 있는지 확인해줘.');
            }
        });
    </script>
</body>
</html>
