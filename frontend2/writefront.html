<!DOCTYPE html>

<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공동구매 글 작성</title>
    <!-- 나눔스퀘어라운드 폰트 불러오기 (무료/저작권 자유) -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquareRound@1.0/nanumsquareround.css">
    <style>
        /* 기본 스타일 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* 둥근 글씨체 적용 */
            font-family: 'NanumSquareRound', sans-serif;
            background-color: #fff5f5; /* 연한 빨강 배경 */
            color: #333;
            line-height: 1.6;
        }

        /* 상단 헤더 */
        header {
            display: flex;
            align-items: center;
            padding: 1rem 2rem;
            background-color: #8A1538;
            border-bottom: 1px solid #ffeded;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            margin-right: 1rem;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #4e0404;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
        }

        /* 메인 폼 영역 */
        main {
            padding: 2rem 1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .write-form {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 25px; /* 전체적으로 둥글게 */
            box-shadow: 0 8px 20px rgba(220, 20, 60, 0.05);
            border: 1px solid #ffeded;
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        /* 개별 입력 그룹 */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }

        .input-group label {
            font-size: 0.95rem;
            font-weight: 700;
            color: #444;
        }

        .required::after {
            content: " *";
            color: #8A1538;
        }

        /* 입력칸 (Input, Textarea, Select) 공통 스타일 */
        .input-group input,
        .input-group textarea,
        .input-group select {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 1.5px solid #eee;
            border-radius: 15px; /* 입력창도 둥글게 */
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
            background-color: #fafafa;
        }

        /* 드롭다운(Select) 화살표 스타일링을 위해 기본 브라우저 스타일 제거 후 커스텀 */
        .input-group select {
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }

        .input-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .input-group input:focus,
        .input-group textarea:focus,
        .input-group select:focus {
            outline: none;
            border-color: #8A1538;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(220, 20, 60, 0.1);
        }

        .short-input input {
            width: 60%;
        }

        /* 등록하기 버튼 */
        .submit-btn {
            margin-top: 1rem;
            padding: 1.1rem;
            background-color: #8A1538;
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            text-align: center;
            width: 100%;
            box-shadow: 0 4px 12px rgba(220, 20, 60, 0.2);
        }

        .submit-btn:hover {
            background-color: #8A1538;
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <header>
        <a href="main_login.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>
        <div class="header-title">메인 페이지</div>
    </header>

    <main>
        <form class="write-form">
            <!-- 드롭다운으로 돌아온 카테고리 -->
            <div class="input-group">
                <label for="category" class="required">카테고리 선택</label>
                <select id="category" name="category">
                    <option value="food">🍊 식재료 / 배달</option>
                    <option value="living">🧴 자취 / 생필품</option>
                    <option value="study">📚 전공 / 문구</option>
                    <option value="etc">📦 기타 물품</option>
                </select>
            </div>

            <div class="input-group">
                <label for="productName" class="required">상품명</label>
                <input type="text" id="productName" placeholder="예) 유기농 햇감자 3kg 나눌 분!" required>
            </div>
            
            <div class="input-group short-input">
                <label for="people" class="required">모집 인원 (본인 포함)</label>
                <input type="number" id="people" placeholder="예) 5" min="2" required>
            </div>

            <div class="input-group short-input">
                <label for="price" class="required">1인당 예상 가격 (원)</label>
                <input type="number" id="price" placeholder="예) 8500" required>
            </div>

            <!-- 모집 기간 입력 -->
            <div class="input-group">
                <label for="periodValue" class="required">모집 기간 (최대 1년)</label>
                <!-- 전체 너비를 '모집 인원' 칸과 동일한 60%로 설정 -->
                <div style="width: 60%; display: flex; gap: 0.5rem;">
                    <!-- flex: 1을 주어 두 칸이 60% 공간 안에서 1:1로 똑같은 너비를 가지게 함 -->
                    <input type="number" id="periodValue" placeholder="예) 3" min="1" required style="flex: 1;">
                    <select id="periodUnit" style="flex: 1;">
                        <option value="minute">분 (Minute)</option>
                        <option value="hour">시간 (Hour)</option>
                        <option value="day" selected>일 (Day)</option>
                        <option value="month">개월 (Month)</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label for="location" class="required">수령/배분 장소</label>
                <input type="text" id="location" placeholder="예) 정보관 1층 라운지" required>
            </div>

            <div class="input-group">
                <label for="imageUrl">상품 이미지 URL (선택)</label>
                <input type="url" id="imageUrl" placeholder="예) https://...">
            </div>


            <div class="input-group">
                <label for="description" class="required">상세 설명</label>
                <textarea id="description" placeholder="어떤 상품인지, 왜 같이 사고 싶은지 자세히 적어주세요!&#10;예) 배송비 아끼려고 공구 엽니다." required></textarea>
            </div>

            <button type="submit" class="submit-btn">공동구매 등록하기</button>
        </form>
    </main>


    <script>
        document.querySelector('.write-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const categoryMap = {
                food: '식재료 / 배달',
                living: '자취 / 생필품',
                study: '전공 / 문구',
                etc: '기타 물품'
            };

        const pValue = Number(document.getElementById('periodValue').value); // 입력한 숫자
        const pUnit = document.getElementById('periodUnit').value;           // 선택한 단위 (minute, hour, day, month)

        // 1. 현재 시각 (초 단위)
        const now = Math.floor(Date.now() / 1000); 
        let secondsToAdd = 0;

        // 2. 단위에 따라 더할 초(sec) 계산
        if (pUnit === 'minute') secondsToAdd = pValue * 60;
        else if (pUnit === 'hour') secondsToAdd = pValue * 3600;
        else if (pUnit === 'day') secondsToAdd = pValue * 86400;
        else if (pUnit === 'month') secondsToAdd = pValue * 86400 * 30;

        // 3. 최종 마감 시각 (타임스탬프)
        const expireAt = now + secondsToAdd;

            const productData = {
    title: document.getElementById('productName').value,
    category: categoryMap[document.getElementById('category').value],
    targetCount: Number(document.getElementById('people').value),
    price: Number(document.getElementById('price').value),
    
    // [수정 포인트!] 계산해둔 'expireAt'을 여기에 넣어야 합니다.
    duration: expireAt, 
    
    location: document.getElementById('location').value,
    imageUrl: document.getElementById('imageUrl').value,
    description: document.getElementById('description').value,
    user_id: localStorage.getItem('userId')
};

            try {
                const response = await fetch('http://localhost:3000/products', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(productData)
                });

                const result = await response.json();

                if (!response.ok) {
                    alert(result.error || '상품 등록 실패');
                    return;
                }

                alert('상품 등록 성공!');
                location.href = 'product_list.html';

            } catch (error) {
                console.error(error);
                alert('서버 연결 실패. 백엔드 서버가 켜져 있는지 확인해줘.');
            }
        });
    </script>
</body>
</html>
