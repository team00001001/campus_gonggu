<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU GONGGU | 고대공구</title>
    <!-- 트렌디하고 깔끔한 본고딕(Pretendard) 중심 사용 -->
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 활기차고 트렌디한 컬러 팔레트 */
            --ku-crimson: #8A1538;
            --ku-crimson-gradient: linear-gradient(135deg, #8A1538 0%, #D32F2F 100%);
            --bg-color: #F7F8FA; /* 시원하고 깔끔한 배경색 */
            --surface-color: #FFFFFF;
            --text-dark: #222222;
            --text-gray: #777777;
            --border-light: #F0F0F0;
            
            /* 카테고리 파스텔 톤 */
            --color-food: #FFF3E0;
            --color-living: #E3F2FD;
            --color-study: #E8F5E9;
            --color-etc: #F3E5F5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ==========================================
           1. 메인 화면 상단바 (Header) - 모던 앱 스타일
           ========================================== */
        header {
            background-color: var(--ku-crimson);
            backdrop-filter: blur(8px);
            height: 70px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .nav-inner {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        .logo {
            color:white;
            font-size: 1.6rem;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        nav a.menu-link {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a.menu-link:hover {
            color: var(--text-dark);
        }

        .btn-login-nav {
            background: var(--ku-crimson);
            color: white !important;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(138, 21, 56, 0.3);
            border: 2px solid white;
            cursor: pointer;
        }

        .btn-login-nav:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(138, 21, 56, 0.4);
        }

        /* ==========================================
           2. 히어로 섹션 (이미지와 컬러가 들어간 생동감 넘치는 레이아웃)
           ========================================== */
        main {
            margin-top: 100px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 24px 120px;
        }

        .hero-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface-color);
            border-radius: 24px;
            padding: 40px 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            margin-bottom: 60px;
            gap: 40px;
            overflow: hidden;
        }

        .hero-text-area {
            flex: 1;
        }

        .hero-badge {
            background-color: #FFEAEF;
            color: var(--ku-crimson);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 16px;
        }

        .hero-main-text {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.3;
            letter-spacing: -1px;
            margin-bottom: 16px;
        }

        .hero-main-text span {
            color: var(--ku-crimson);
        }

        .hero-sub-text {
            font-size: 1.1rem;
            color: var(--text-gray);
            font-weight: 500;
            margin-bottom: 30px;
        }

        .search-input-box {
            background: var(--bg-color);
            padding: 16px 24px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            border: 1px solid var(--border-light);
            transition: border-color 0.3s;
        }

        .search-input-box:focus-within {
            border-color: var(--ku-crimson);
        }

        .search-input-box input {
            width: 100%;
            border: none;
            background: none;
            outline: none;
            font-size: 1rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        .hero-image-area {
            flex: 1;
            height: 300px;
            border-radius: 20px;
            background-image: none;
            background-size: cover;
            background-position: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* ==========================================
           3. 카테고리 (파스텔톤 + 이모지 팝)
           ========================================== */
        .section-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 70px;
        }

        .cat-card {
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            border: none;
        }

        .cat-card:hover {
            transform: translateY(-8px);
        }

        .cat-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            display: block;
        }

        .cat-title {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-dark);
        }

        /* 각 카드별 배경색 */
        .cat-1 { background-color: var(--color-food); }
        .cat-2 { background-color: var(--color-living); }
        .cat-3 { background-color: var(--color-study); }
        .cat-4 { background-color: var(--color-etc); }

        /* ==========================================
           4. 공구방 리스트 (실제 이미지 + 화려한 태그)
           ========================================== */
        .room-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .room-item {
            background: var(--surface-color);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: 1px solid var(--border-light);
        }

        .room-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        .room-image {
            height: 200px;
            width: 100%;
            object-fit: cover;
        }

        .room-content {
            padding: 24px;
        }

        .tag-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .room-tag {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 12px;
        }

        .tag-hot { background-color: #FFF0F0; color: #FF4B4B; }
        .tag-official { background-color: #F0F7FF; color: #007AFF; }
        .tag-food { background-color: #FFF8E1; color: #FFB300; }

        .room-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.4;
            color: var(--text-dark);
        }

        .room-progress-bar {
            width: 100%;
            height: 6px;
            background-color: #EEEEEE;
            border-radius: 10px;
            margin: 16px 0 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--ku-crimson-gradient);
            border-radius: 10px;
        }

        .room-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .count-info {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-gray);
        }
        
        .count-info span {
            color: var(--ku-crimson);
        }
    </style>
</head>
<body>

    <!-- 동적으로 헤더가 삽입될 영역 -->
    <div id="header-placeholder"></div>

    <!-- 메인 컨텐츠 영역 -->
    <main>
        <!-- 다이나믹 히어로 섹션 -->
        <section class="hero-section">
            <div class="hero-text-area">
                <span class="hero-badge">🔥 실시간 트렌드</span>
                <h2 class="hero-main-text">
                    필요한 물건,<br>
                    고대생끼리 <span>스마트하게.</span>
                </h2>
                <p class="hero-sub-text">배달비 절약부터 대량구매 할인까지. 학우들과 함께하세요!</p>
                
                <div class="search-input-box">
                    <input type="text" placeholder="어떤 물품을 찾고 계신가요? (ex. 아이패드 필름)">
                </div>
            </div>
            <div class="hero-image-area"></div>
        </section>

        <!-- 카테고리 (파스텔 & 이모지) -->
        <div class="section-title">👀 카테고리 둘러보기</div>
        <section class="cat-grid">
            <div class="cat-card cat-1">
                <span class="cat-icon">🍕</span>
                <div class="cat-title">식재료 / 배달</div>
            </div>
            <div class="cat-card cat-2">
                <span class="cat-icon">🧴</span>
                <div class="cat-title">자취 / 생필품</div>
            </div>
            <div class="cat-card cat-3">
                <span class="cat-icon">📚</span>
                <div class="cat-title">전공 / 문구</div>
            </div>
            <div class="cat-card cat-4">
                <span class="cat-icon">📦</span>
                <div class="cat-title">기타 물품</div>
            </div>
        </section>

        <!-- 공구방 리스트 -->
        <div class="section-title">⚡ 지금 뜨고 있는 공구방</div>
        <section class="room-grid">
            <!-- 공구방 예시 1 -->
            <div class="room-item">
                <div class="room-content">
                    <div class="tag-group">
                        <span class="room-tag tag-hot">🔥 마감임박</span>
                        <span class="room-tag tag-official">✓ 신뢰도 인증</span>
                    </div>
                    <h3 class="room-title">아이패드 종이질감 필름 공동구매 (배송비 N빵)</h3>
                    <div class="room-progress-bar">
                        <div class="progress-fill" style="width: 80%;"></div>
                    </div>
                    <div class="room-footer">
                        <span class="count-info">모집 <span>24명</span> / 30명</span>
                    </div>
                </div>
            </div>

            <!-- 공구방 예시 2 -->
            <div class="room-item">
                <div class="room-content">
                    <div class="tag-group">
                        <span class="room-tag tag-official">📚 스터디/전공</span>
                    </div>
                    <h3 class="room-title">경영/경제 전공 서적 공동 제본 신청받아요</h3>
                    <div class="room-progress-bar">
                        <div class="progress-fill" style="width: 45%;"></div>
                    </div>
                    <div class="room-footer">
                        <span class="count-info">모집 <span>9명</span> / 20명</span>
                    </div>
                </div>
            </div>

            <!-- 공구방 예시 3 -->
            <div class="room-item">
                <div class="room-content">
                    <div class="tag-group">
                        <span class="room-tag tag-food">🍊 식재료</span>
                    </div>
                    <h3 class="room-title">자취생 필수! 제주 감귤 10kg 박스 나누실 분</h3>
                    <div class="room-progress-bar">
                        <div class="progress-fill" style="width: 25%;"></div>
                    </div>
                    <div class="room-footer">
                        <span class="count-info">모집 <span>1명</span> / 4명</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 1. 페이지 열리자마자 헤더 가져오기
        fetch('header.html')
            .then(res => {
                if (!res.ok) throw new Error('header.html 파일을 찾을 수 없습니다.');
                return res.text();
            })
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                
                // 2. 헤더 조립 끝나자마자 버튼 상태 확인
                updateHeader();
            })
            .catch(err => console.error(err));

        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            
            // 헤더 안의 버튼 뭉치들 찾기
            const authButtons = document.querySelectorAll('.auth-only');
            const guestButtons = document.querySelectorAll('.guest-only');

            if (isLoggedIn) {
                authButtons.forEach(btn => btn.style.display = 'inline-block');
                guestButtons.forEach(btn => btn.style.display = 'none');
            } else {
                authButtons.forEach(btn => btn.style.display = 'none');
                guestButtons.forEach(btn => btn.style.display = 'inline-block');
            }
        }

        // 3. 로그아웃 기능 (버튼 클릭 감시)
        document.addEventListener('click', function(e) {
            if(e.target && e.target.id === 'logout-btn') {
                localStorage.removeItem('isLoggedIn'); 
                alert('로그아웃 되었습니다.');
                
                // 메인 초기화면으로 이동 (파일명이 다를 경우 수정)
                location.href = 'main_beforelogin.html'; 
            }
        });
    </script>
</body>
</html>
